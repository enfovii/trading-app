<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Projection Calculator</title>

<style>
:root {
    --bg: #050913;
    --card: rgba(18, 28, 48, 0.70);
    --card2: rgba(10, 14, 28, 0.55);
    --text: #eaf1ff;
    --muted: #8ea2bb;
}

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:var(--bg);
    color:var(--text);
    padding:16px;
}

h1{
    text-align:center;
    margin:10px 0 18px;
}

.card{
    background:linear-gradient(145deg,var(--card),var(--card2));
    border:1px solid rgba(120,170,255,0.14);
    border-radius:18px;
    padding:14px;
    backdrop-filter: blur(14px);
    box-shadow:0 10px 28px rgba(0,0,0,0.35);
}

select, input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid rgba(120,170,255,0.25);
    background:rgba(8,12,25,0.65);
    color:var(--text);
    margin-top:10px;
    font-size:16px;
    outline:none;
}

button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#1f6feb,#144a99);
    color:white;
    font-weight:600;
}

#projectionResults{
    margin-top:12px;
}

.month{
    margin-top:10px;
    padding:14px;
    border-radius:16px;
    background:linear-gradient(145deg, rgba(20,30,50,0.75), rgba(10,15,30,0.55));
    border:1px solid rgba(120,170,255,0.14);
    box-shadow:0 10px 28px rgba(0,0,0,0.35);
}
</style>
</head>

<body>

<h1>📈 Projection Calculator</h1>

<div class="card">

    <select id="accountSelect">
        <option value="">Choose account</option>
    </select>

    <input
        type="number"
        id="manualBalance"
        placeholder="Or enter custom balance"
        inputmode="decimal"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
    >

    <button onclick="runProjection()">
        Calculate 12 Month Projection
    </button>
    <button onclick="location.href='index.html'"
        style="background:rgba(255,255,255,0.08); margin-top:10px;">
    🏠 Home
</button>

</div>

<div id="projectionResults"></div>

<script src="projection.js"></script>

</body>
</html>
