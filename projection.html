<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projection Calculator</title>

<style>
:root {
    --bg: #050913;
    --card: rgba(18, 28, 48, 0.70);
    --card2: rgba(10, 14, 28, 0.55);
    --text: #eaf1ff;
    --muted: #8ea2bb;
    --primary: #4da3ff;
    --profit: #2ee59d;
}

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:var(--bg);
    color:var(--text);
    padding:18px;
}

h1{
    text-align:center;
    margin:10px 0 20px;
}

select, input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid rgba(120,170,255,0.25);
    background:rgba(8,12,25,0.65);
    color:var(--text);
    margin-top:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#1f6feb,#144a99);
    color:white;
    font-weight:600;
}

.month{
    margin-top:10px;
    padding:12px;
    border-radius:12px;
    background:rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<h1>📈 Projection Calculator</h1>

<!-- Account selector (matches JS) -->
<select id="accountSelect">
    <option value="">Choose account</option>
</select>

<!-- Manual input (matches JS) -->
<input
    type="number"
    id="manualBalance"
    placeholder="Or enter custom balance"
/>

<!-- Button (calls JS function) -->
<button onclick="runProjection()">
    Calculate Projection
</button>

<!-- OUTPUT AREA (THIS MUST MATCH JS) -->
<div id="projectionResults"></div>

<!-- JS FILE -->
<script src="projection.js"></script>

</body>
</html>
