<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projection Calculator</title>

<link rel="stylesheet" href="style.css">

<style>
.page {
    padding: 20px;
}

.projection-card {
    background: #1e1e1e;
    border-radius: 18px;
    padding: 20px;
    margin-top: 20px;
}

.projection-title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 15px;
}

select, input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    margin-bottom: 12px;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #2ecc71;
    color: white;
    font-size: 18px;
    font-weight: bold;
}

.result-box {
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="page">

    <h1>📈 Projection Calculator</h1>

    <div class="projection-card">

        <div class="projection-title">
            12 Month Projection
        </div>

        <select id="accountSelect">
            <option value="">Choose account</option>
        </select>

        <input
            type="number"
            id="manualBalance"
            placeholder="Or enter custom balance"
        >

        <button onclick="runProjection()">
            Calculate Projection
        </button>

        <div id="projectionResults" class="result-box">
        </div>

    </div>

</div>

<script src="projection.js"></script>

</body>
</html>
