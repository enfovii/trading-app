<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Trading Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    margin: 0;
    padding: 14px;
    padding-bottom: 90px;
    color: #eaf1ff;
    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 15% 20%, rgba(0,140,255,0.20), transparent 45%),
        radial-gradient(circle at 85% 25%, rgba(80,180,255,0.12), transparent 50%),
        #050913;
    z-index: -1;
}

.title {
    text-align: center;
    margin: 12px 0 16px;
}

.page { display:none; }
.active { display:block; }

.statsRow {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.stat {
    background: rgba(20,30,50,0.5);
    border: 1px solid rgba(120,170,255,0.15);
    padding: 12px;
    border-radius: 14px;
    text-align: center;
}

.account {
    padding: 14px;
    margin-top: 10px;
    border-radius: 16px;
    background: rgba(20,30,50,0.55);
    border: 1px solid rgba(120,170,255,0.18);
    display: flex;
    justify-content: space-between;
    gap: 12px;
    cursor: pointer; /* FIX click feedback */
}

.small { font-size: 11px; color: #93a4b8; }
.big { font-size: 20px; font-weight: 700; }

.green { color: #2ee59d; }

button {
    width: calc(100% - 24px);
    margin-left: 12px;
    margin-right: 12px;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #1f6feb, #144a99);
    color: white;
    border: none;
    border-radius: 12px;
}

</style>
</head>

<body>

<div class="title">
    <h2>Pro Trading Dashboard</h2>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="statsRow">
    <div class="stat">
        <div class="small">Daily</div>
        <div class="big green" id="daily">$0</div>
    </div>

    <div class="stat">
        <div class="small">Weekly</div>
        <div class="big green" id="weeklyHome">$0</div>
    </div>

    <div class="stat">
        <div class="small">Monthly</div>
        <div class="big green" id="monthlyHome">$0</div>
    </div>
</div>

<div id="accounts"></div>

<button onclick="openPortfolio()">Portfolio</button>

</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">
<h2>Portfolio</h2>
<button onclick="backHome()">Back</button>
</div>

<!-- ACCOUNT -->
<div id="account" class="page">
<h2 id="accName"></h2>
<button onclick="back()">Back</button>
</div>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let current = null;

function num(v){
    if(!v) return 0;
    v = v.toString().toLowerCase().replace(/,/g,'');
    if(v.includes("k")) return parseFloat(v)*1000;
    if(v.includes("m")) return parseFloat(v)*1000000;
    return isNaN(Number(v)) ? 0 : Number(v);
}

function money(v){
    return "$" + Number(v).toLocaleString();
}

function mult(b){
    b = num(b);
    if (b < 90000) return b / 30000;
    if (b < 140000) return 3;
    if (b < 160000) return 3.5;
    if (b < 200000) return 4;
    let base = 5;
    base += Math.floor((b - 200000) / 20000) * 0.5;
    return base;
}

function daily(b){ return mult(b)*800; }

/* FIXED: uniform scaling system */
function getNextTier(b){

    if(b < 90000) return 90000;
    if(b < 140000) return 140000;
    if(b < 160000) return 160000;
    if(b < 200000) return 200000;

    return b + 20000;
}

/* CLICK FIXED */
function openAccount(i){
    current = i;
    document.getElementById("accName").innerText = accounts[i].name;
    show("account");
}

function openPortfolio(){
    show("portfolio");
}

function back(){
    show("home");
}

function backHome(){
    show("home");
}

function show(p){
    document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
    document.getElementById(p).classList.add("active");
}

/* MAIN RENDER */
function render(){

    let el = document.getElementById("accounts");
    let html = "";

    let t=0,d=0;

    accounts.forEach((a,i)=>{

        let b = num(a.balance);
        t += b;
        d += daily(b);

        let next = getNextTier(b);
        let needed = Math.max(next - b, 0);
        let progress = Math.min((b / next) * 100, 100);

        html += `
        <div class="account" onclick="openAccount(${i})">

            <div>
                <b>${a.name}</b><br>
                ${money(b)}<br>
                <span class="green">${mult(b).toFixed(2)}x</span><br>
                <span class="small">Daily ${money(daily(b))}</span>
            </div>

            <div style="text-align:right; min-width:120px;">
                <div class="small">Next scaling</div>
                <div class="small">${money(next)}</div>
                <div class="green">${money(needed.toFixed(0))}</div>

                <div style="height:6px;background:rgba(255,255,255,0.08);border-radius:10px;margin-top:6px;overflow:hidden;">
                    <div style="height:100%;width:${progress}%;background:linear-gradient(90deg,#1f6feb,#2ee59d);"></div>
                </div>
            </div>

        </div>`;
    });

    el.innerHTML = html;

    document.getElementById("daily").innerText = money(d.toFixed(0));
    document.getElementById("weeklyHome").innerText = money((d*5).toFixed(0));
    document.getElementById("monthlyHome").innerText = money((d*22).toFixed(0));
}

window.onload = render;

</script>

</body>
</html>
