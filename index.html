<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pro Trading Dashboard">

<title>Pro Trading Dashboard</title>

<style>

* {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    margin: 0;
    padding: 14px;
    padding-bottom: 90px;
    color: #eaf1ff;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    -webkit-text-size-adjust: 100%;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 15% 20%, rgba(0,140,255,0.20), transparent 45%),
        radial-gradient(circle at 85% 25%, rgba(80,180,255,0.12), transparent 50%),
        radial-gradient(circle at 50% 90%, rgba(0,90,255,0.10), transparent 55%),
        #050913;
    z-index: -1;
}

.title {
    display: flex;
    justify-content: center;
    margin: 12px 0 16px;
}

h2 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    text-align: center;
    letter-spacing: 0.5px;
}

.page {
    display: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s ease, transform 0.2s ease;
}

.page.active {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

.topbar {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.portfolioBox {
    background: linear-gradient(145deg, rgba(20,30,50,0.75), rgba(10,15,30,0.55));
    border: 1px solid rgba(120,170,255,0.25);
    backdrop-filter: blur(16px);
    padding: 18px;
    border-radius: 18px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    will-change: transform;
}

.statsRow {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.stat {
    background: linear-gradient(145deg, rgba(20,30,50,0.65), rgba(10,15,30,0.45));
    border: 1px solid rgba(120,170,255,0.18);
    backdrop-filter: blur(14px);
    padding: 12px;
    border-radius: 16px;
    text-align: center;
    will-change: transform;
}

.small { font-size: 11px; color: #93a4b8; }

.big {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.3px;
}

.account {
    padding: 14px;
    margin-top: 10px;
    border-radius: 16px;
    background: linear-gradient(145deg, rgba(20,30,50,0.6), rgba(10,15,30,0.4));
    border: 1px solid rgba(120,170,255,0.18);
    scroll-margin-bottom: 120px;
}

.green { color: #2ee59d; }
.red { color: #ff5c7a; }

</style>
</head>

<body>

<div class="title">
    <h2>Pro Trading Dashboard</h2>
</div>

<div id="home" class="page active">

<div class="topbar">

    <div class="portfolioBox" onclick="openPortfolio()">
        <div class="small">Portfolio</div>
        <div class="big" id="total">$0</div>
    </div>

    <div class="statsRow">

        <div class="stat">
            <div class="small">Daily</div>
            <div class="big green" id="daily">$0</div>
        </div>

        <div class="stat">
            <div class="small">Weekly</div>
            <div class="big green" id="weeklyHome">$0</div>
        </div>

        <div class="stat">
            <div class="small">Monthly</div>
            <div class="big green" id="monthlyHome">$0</div>
        </div>

    </div>

</div>

<div id="accounts"></div>
</div>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let current = null;

function num(v){
    if(!v) return 0;
    v = v.toString().toLowerCase().replace(/,/g,'');
    if(v.includes("k")) return parseFloat(v)*1000;
    if(v.includes("m")) return parseFloat(v)*1000000;
    return isNaN(Number(v)) ? 0 : Number(v);
}

function money(v){
    return "$" + Number(v).toLocaleString();
}

/* ===================== ONLY REPLACED FUNCTION ===================== */

function render(){

    let el = document.getElementById("accounts");
    if(!el) return;

    let html = "";
    let t = 0;
    let d = 0;

    accounts.forEach((a,i)=>{

        try {

            let b = num(a?.balance);
            if(isNaN(b)) b = 0;

            t += b;

            let currentMult = mult(b) || 0;
            let dailyVal = daily(b) || 0;
            d += dailyVal;

            function nextTargetFromBalance(x){
                if (x < 90000) return 90000;
                if (x < 140000) return 140000;
                if (x < 160000) return 160000;
                if (x < 180000) return 180000;
                if (x < 200000) return 200000;
                let steps = Math.floor((x - 200000) / 20000) + 1;
                return 200000 + (steps * 20000);
            }

            let nextTarget = nextTargetFromBalance(b);
            let nextMult = mult(nextTarget) || 0;

            let needed = Math.max(0, nextTarget - b);

            let tierStart;
            if (b < 90000) tierStart = 0;
            else if (b < 140000) tierStart = 90000;
            else if (b < 160000) tierStart = 140000;
            else if (b < 180000) tierStart = 160000;
            else if (b < 200000) tierStart = 180000;
            else {
                let steps = Math.floor((b - 200000) / 20000);
                tierStart = 200000 + (steps * 20000);
            }

            let progress = 0;
            if(nextTarget > tierStart){
                progress = ((b - tierStart) / (nextTarget - tierStart)) * 100;
            }
            progress = Math.max(0, Math.min(100, progress));

            html += `
            <div class="account" onclick="openAccount(${i})"
                style="display:flex;justify-content:space-between;gap:12px;align-items:center;">

                <div>
                    <b>${a?.name || "Account"}</b><br>
                    ${money(b)}<br>
                    <span class="green">${currentMult.toFixed(2)}x</span><br>
                    <span class="small">Daily ${money(dailyVal)}</span>
                </div>

                <div style="min-width:140px;text-align:right;">
                    <div class="small">Next ${nextMult.toFixed(2)}x</div>
                    <div class="small">Need ${money(needed)}</div>

                    <div style="width:100%;height:10px;background:rgba(255,255,255,0.06);border-radius:12px;margin-top:8px;overflow:hidden;">
                        <div style="width:${progress}%;height:100%;background:linear-gradient(90deg,#1f6feb,#2ee59d);"></div>
                    </div>

                </div>

            </div>`;
        }
        catch(e){
            console.log("Render skipped account:", e);
        }
    });

    el.innerHTML = html;

    document.getElementById("total").innerText = money(t.toFixed(0));
    document.getElementById("daily").innerText = money(d.toFixed(0));
    document.getElementById("weeklyHome").innerText = money((d*5).toFixed(0));
    document.getElementById("monthlyHome").innerText = money((d*22).toFixed(0));
}

/* ================= ORIGINAL LOGIC (UNCHANGED) ================= */

function mult(b){
    if (b < 90000) return 3;
    if (b < 140000) return 3;
    if (b < 160000) return 3.5;
    if (b < 180000) return 4;
    if (b < 200000) return 4.5;
    let steps = Math.floor((b - 200000) / 20000);
    return 5 + (steps * 0.5);
}

function daily(b){
    return mult(b) * 800;
}

function openAccount(i){
    current=i;
    document.getElementById("name").innerText=accounts[i].name;
    document.getElementById("balance").value=accounts[i].balance;
    document.getElementById("home").classList.remove("active");
    document.getElementById("account").classList.add("active");
}

window.onload=function(){
    render();
};

</script>

</body>
</html>
