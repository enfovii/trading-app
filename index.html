<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: radial-gradient(circle at top, #0f1b33, #070b14);
    color: #e6eaf2;
    margin: 0;
    padding: 18px;
}

h2 { font-size: 22px; font-weight: 800; }

.card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    padding: 16px;
    margin-top: 12px;
    border-radius: 18px;
    overflow: hidden;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #2f81f7, #22c55e);
    color: white;
    border: none;
    border-radius: 14px;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    margin-top: 8px;
    background: rgba(255,255,255,0.04);
    color: white;
}

.big { font-size: 26px; font-weight: 800; }
.lime { color: #22c55e; }
.red { color: #ff4d4d; }
.small { font-size: 12px; color: rgba(230,234,242,0.6); }

.hidden { display:none; }

.account {
    padding: 14px;
    background: rgba(255,255,255,0.03);
    margin-top: 12px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
}
</style>
</head>

<body>

<h2>📊 Trading Dashboard</h2>

<div class="card">
<button onclick="showHome()">🏠 Accounts</button>
<button onclick="showJournal()">📅 Journal</button>
</div>

<!-- HOME -->
<div id="home">

<div class="card">
<div>Total Portfolio Balance</div>
<div id="totalBalance" class="big lime">$0</div>
<div class="small">Total Daily Profit: $<span id="totalDaily">0</span></div>
<div class="small">Total Weekly Profit: $<span id="totalWeekly">0</span></div>
<div class="small red">Max Drawdown: $<span id="totalDD">0</span></div>
</div>

<div id="accounts"></div>

</div>

<!-- DETAIL -->
<div id="detail" class="hidden">

<div class="card">
<h3 id="accName"></h3>

<input id="editBalance" oninput="updateAccount()">

<div class="card">
<div>Multiplier</div>
<div id="mult" class="big lime">0x</div>
</div>

<div class="card">
<div>Daily Profit</div>
<div id="daily"></div>
</div>

<div class="card">
<div>Weekly Profit</div>
<div id="weekly"></div>
</div>

<div class="card">
<div>Monthly Profit</div>
<div id="monthly"></div>
</div>

<div class="card">
<div>Next Tier</div>
<div id="nextTier"></div>
</div>

<div class="card">
<div>Drawdown</div>
<div id="dd" class="big red"></div>
</div>

<button onclick="back()">Back</button>

</div>

<!-- JOURNAL -->
<div id="journal" class="hidden">

<div class="card">
<h3>📅 Journal</h3>

<div style="display:flex;gap:10px;">
<button style="flex:1" onclick="changeMonth(-1)">⬅ Prev</button>
<button style="flex:1" onclick="changeMonth(1)">Next ➡</button>
</div>

<div class="big" id="monthLabel" style="text-align:center;margin-top:10px;"></div>

<div class="card">
<div>Monthly P/L</div>
<div id="monthlyPL" class="big lime">$0</div>
</div>

<div id="calendar"></div>

</div>

<div class="card">
<h3>Selected Day</h3>
<div id="selectedDay">None</div>
<input id="dayProfit" placeholder="Enter profit">
<button onclick="saveDay()">Save</button>
</div>

</div>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let journal = JSON.parse(localStorage.getItem("journal") || "{}");

let viewDate = new Date();
let selectedDate = null;
let currentIndex = null;

/* NAV */
function showHome(){
    document.getElementById("home").classList.remove("hidden");
    document.getElementById("detail").classList.add("hidden");
    document.getElementById("journal").classList.add("hidden");
    renderHome();
}

function showJournal(){
    document.getElementById("home").classList.add("hidden");
    document.getElementById("detail").classList.add("hidden");
    document.getElementById("journal").classList.remove("hidden");

    setTimeout(() => renderCalendar(), 0);
}

/* SAVE */
function save(){
    localStorage.setItem("accounts", JSON.stringify(accounts));
}

/* HOME */
function renderHome(){

    let container = document.getElementById("accounts");
    container.innerHTML = "";

    let total = 0;
    let totalDaily = 0;
    let totalWeekly = 0;
    let totalDD = 0;

    accounts.forEach((a,i)=>{

        let b = a.balance;

        let mult;
        if (b < 90000) mult = b / 30000;
        else if (b < 140000) mult = 3;
        else if (b < 160000) mult = 3.5;
        else if (b < 200000) mult = 4;
        else mult = 5;

        let dd = b * 0.4;

        total += b;
        totalDaily += mult * 800;
        totalWeekly += mult * 800 * 7;
        totalDD += dd;

        container.innerHTML += `
            <div class="account" onclick="openAccount(${i})">
                <b>${a.name}</b><br>
                <span class="small">$${b.toLocaleString()}</span><br>
                <span class="small">${mult.toFixed(2)}x</span>
            </div>
        `;
    });

    document.getElementById("totalBalance").innerText = "$" + total.toLocaleString();
    document.getElementById("totalDaily").innerText = totalDaily.toFixed(0);
    document.getElementById("totalWeekly").innerText = totalWeekly.toFixed(0);
    document.getElementById("totalDD").innerText = totalDD.toFixed(0);
}

/* DETAIL */
function openAccount(i){
    currentIndex = i;

    document.getElementById("home").classList.add("hidden");
    document.getElementById("journal").classList.add("hidden");
    document.getElementById("detail").classList.remove("hidden");

    let acc = accounts[i];
    document.getElementById("accName").innerText = acc.name;
    document.getElementById("editBalance").value = acc.balance;

    updateAccount();
}

function updateAccount(){

    let b = parseFloat(document.getElementById("editBalance").value);
    accounts[currentIndex].balance = b;

    save();

    let mult;
    if (b < 90000) mult = b / 30000;
    else if (b < 140000) mult = 3;
    else if (b < 160000) mult = 3.5;
    else if (b < 200000) mult = 4;
    else mult = 5;

    let dd = b * 0.4;

    document.getElementById("mult").innerText = mult.toFixed(2) + "x";
    document.getElementById("daily").innerText = "$" + (mult*800).toFixed(0);
    document.getElementById("weekly").innerText = "$" + (mult*800*7).toFixed(0);
    document.getElementById("monthly").innerText = "$" + (mult*800*30).toFixed(0);
    document.getElementById("nextTier").innerText = getNextTier(b);
    document.getElementById("dd").innerText = "$" + dd.toFixed(0);
}

/* NEXT TIER FIX */
function getNextTier(b){

    if (b < 90000) return "$90,000";
    if (b < 140000) return "$140,000";
    if (b < 160000) return "$160,000";
    if (b < 200000) return "$200,000";

    let steps = Math.floor((b - 200000) / 20000) + 1;
    let next = 200000 + (steps * 20000);

    return "$" + next.toLocaleString();
}

/* JOURNAL */
function changeMonth(dir){
    viewDate.setMonth(viewDate.getMonth() + dir);
    renderCalendar();
}

function renderCalendar(){

    let year = viewDate.getFullYear();
    let month = viewDate.getMonth();

    let html = "";
    let total = 0;

    document.getElementById("monthLabel").innerText =
        viewDate.toLocaleString('default', { month:'long', year:'numeric' });

    for(let d=1; d<=31; d++){

        let date = new Date(year, month, d);
        if(date.getMonth() !== month) break;
        if(date.getDay() === 0 || date.getDay() === 6) continue;

        let key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        let val = journal[key] || 0;

        total += Number(val);

        html += `
        <div onclick="selectDay('${key}')"
            style="display:inline-block;width:30%;margin:1%;padding:14px;border-radius:12px;
            background:rgba(255,255,255,0.05);text-align:center;">
            <b>${d}</b><br>
            <span class="small">$${val}</span>
        </div>`;
    }

    document.getElementById("calendar").innerHTML = html;
    document.getElementById("monthlyPL").innerText = "$" + total.toFixed(2);
}

function selectDay(key){
    selectedDate = key;
    document.getElementById("selectedDay").innerText = key;
    document.getElementById("dayProfit").value = journal[key] || "";
}

function saveDay(){
    if(!selectedDate) return;

    journal[selectedDate] = parseFloat(document.getElementById("dayProfit").value) || 0;
    localStorage.setItem("journal", JSON.stringify(journal));
    renderCalendar();
}

/* INIT */
showHome();

</script>

</body>
</html>
