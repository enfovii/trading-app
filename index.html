<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Trading Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    margin: 0;
    padding: 14px;
    padding-bottom: 90px;
    color: #eaf1ff;
    overflow-x: hidden;
}

/* Background */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 15% 20%, rgba(0,140,255,0.20), transparent 45%),
        radial-gradient(circle at 85% 25%, rgba(80,180,255,0.12), transparent 50%),
        #050913;
    z-index: -1;
}

.title {
    display: flex;
    justify-content: center;
    margin: 12px 0 16px;
}

h2 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    text-align: center;
}

.page { display:none; }
.active { display:block; }

/* HOME LAYOUT (NEW) */
.homeLayout{
    display: flex;
    gap: 12px;
    align-items: flex-start;
}

.mainLeft{
    flex: 1;
}

.sidePanel{
    width: 260px;
    position: sticky;
    top: 10px;
}

@media(max-width: 900px){
    .homeLayout{
        flex-direction: column;
    }
    .sidePanel{
        width: 100%;
        position: relative;
    }
}

.topbar {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.portfolioBox {
    background: linear-gradient(145deg, rgba(20,30,50,0.75), rgba(10,15,30,0.55));
    border: 1px solid rgba(120,170,255,0.25);
    padding: 18px;
    border-radius: 18px;
    text-align: center;
    cursor: pointer;
}

.statsRow {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.stat {
    background: rgba(20,30,50,0.55);
    border: 1px solid rgba(120,170,255,0.18);
    padding: 12px;
    border-radius: 16px;
    text-align: center;
}

.small { font-size: 11px; color: #93a4b8; }

.big {
    font-size: 20px;
    font-weight: 700;
}

.card {
    background: rgba(20,30,50,0.55);
    border: 1px solid rgba(120,170,255,0.18);
    padding: 14px;
    margin-top: 10px;
    border-radius: 16px;
}

/* SIDE PANEL CARD */
.sideCard{
    background: rgba(20,30,50,0.65);
    border: 1px solid rgba(120,170,255,0.25);
    padding: 14px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
}

.progressBar{
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    overflow: hidden;
    margin-top: 10px;
}

.progressFill{
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #1f6feb, #2ee59d);
}

.green { color: #2ee59d; }
.red { color: #ff5c7a; }

.account {
    padding: 14px;
    margin-top: 10px;
    border-radius: 16px;
    background: rgba(20,30,50,0.55);
    border: 1px solid rgba(120,170,255,0.18);
}

.addBtn {
    position: fixed;
    bottom: 18px;
    left: 12px;
    right: 12px;
    z-index: 10;
}

button {
    width: calc(100% - 24px);
    margin-left: 12px;
    margin-right: 12px;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #1f6feb, #144a99);
    color: white;
    border: none;
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="title">
    <h2>Pro Trading Dashboard</h2>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="homeLayout">

    <!-- LEFT -->
    <div class="mainLeft">

        <div class="topbar">

            <div class="portfolioBox" onclick="openPortfolio()">
                <div class="small">Portfolio</div>
                <div class="big" id="total">$0</div>
            </div>

            <div class="statsRow">

                <div class="stat">
                    <div class="small">Daily</div>
                    <div class="big green" id="daily">$0</div>
                </div>

                <div class="stat">
                    <div class="small">Weekly</div>
                    <div class="big green" id="weeklyHome">$0</div>
                </div>

                <div class="stat">
                    <div class="small">Monthly</div>
                    <div class="big green" id="monthlyHome">$0</div>
                </div>

            </div>

        </div>

        <div id="accounts"></div>

    </div>

    <!-- RIGHT SIDE PANEL (NEW FEATURE) -->
    <div class="sidePanel">
        <div class="sideCard">
            <div class="small">NEXT MULTIPLIER</div>

            <div class="big" id="curMult">--</div>
            <div class="small" id="nextMult">--</div>

            <br>

            <div class="small">Balance needed</div>
            <div class="big green" id="needed">$0</div>

            <div class="progressBar">
                <div class="progressFill" id="progress"></div>
            </div>
        </div>
    </div>

</div>
</div>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let current = null;

function num(v){
    if(!v) return 0;
    v = v.toString().toLowerCase().replace(/,/g,'');
    if(v.includes("k")) return parseFloat(v)*1000;
    if(v.includes("m")) return parseFloat(v)*1000000;
    return isNaN(Number(v)) ? 0 : Number(v);
}

function money(v){
    return "$" + Number(v).toLocaleString();
}

function mult(b){
    b = num(b);
    if (b < 90000) return b / 30000;
    if (b < 140000) return 3;
    if (b < 160000) return 3.5;
    if (b < 200000) return 4;
    let base = 5;
    base += Math.floor((b - 200000) / 20000) * 0.5;
    return base;
}

function daily(b){ return mult(b)*800; }
function dd(b){ return b*0.4; }

function getNextTierInfo(total){

    let b = total;

    if(b < 90000){
        return {next:90000, label:"3.0x tier"};
    }
    if(b < 140000){
        return {next:140000, label:"3.5x tier"};
    }
    if(b < 160000){
        return {next:160000, label:"4.0x tier"};
    }
    if(b < 200000){
        return {next:200000, label:"5.0x tier"};
    }

    return {next:b + 20000, label:"next scaling tier"};
}

function updateSidePanel(total){

    let cur = mult(total);
    let nextInfo = getNextTierInfo(total);

    let needed = Math.max(nextInfo.next - total, 0);
    let progress = Math.min((total / nextInfo.next) * 100, 100);

    document.getElementById("curMult").innerText = cur.toFixed(2) + "x";
    document.getElementById("nextMult").innerText = "Next: " + nextInfo.label;
    document.getElementById("needed").innerText = money(needed.toFixed(0));
    document.getElementById("progress").style.width = progress + "%";
}

function render(){

    let el=document.getElementById("accounts");
    let html = "";

    let t=0,d=0;

    accounts.forEach((a,i)=>{
        let b=num(a.balance);
        t+=b;
        d+=daily(b);

        html += `
        <div class="account" onclick="openAccount(${i})">
            <b>${a.name}</b><br>
            ${money(b)}<br>
            <span class="green">${mult(b).toFixed(2)}x</span><br>
            <span class="small">Daily ${money(daily(b))}</span>
        </div>`;
    });

    el.innerHTML = html;

    document.getElementById("total").innerText=money(t.toFixed(0));
    document.getElementById("daily").innerText=money(d.toFixed(0));
    document.getElementById("weeklyHome").innerText=money((d*5).toFixed(0));
    document.getElementById("monthlyHome").innerText=money((d*22).toFixed(0));

    updateSidePanel(t);
}

window.onload=function(){
    render();
};

</script>

</body>
</html>
