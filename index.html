<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: #0b0f14;
    color: #e8ecf3;
    margin: 0;
    padding: 18px;
}

h2 { font-size: 22px; font-weight: 700; }

.card {
    background: #111823;
    border: 1px solid #1e2a3a;
    padding: 16px;
    margin-top: 12px;
    border-radius: 14px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: #1f6feb;
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #263445;
    margin-top: 8px;
    background: #0f1622;
    color: #e8ecf3;
}

.big { font-size: 26px; font-weight: 700; }
.small { font-size: 12px; color: #93a4b8; }

.lime { color: #22c55e; }
.red { color: #ef4444; }

.hidden { display:none; }

.account {
    padding: 14px;
    background: #111823;
    margin-top: 12px;
    border-radius: 14px;
    border: 1px solid #1e2a3a;
    cursor: pointer;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-top: 10px;
}

.day {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #1e2a3a;
    text-align: center;
    font-size: 12px;
    cursor: pointer;
    transition: 0.2s;
}
</style>
</head>

<body>

<h2>📊 Trading Dashboard</h2>

<div class="card">
<button onclick="SafeUI.show('home')">Accounts</button>
<button onclick="SafeUI.show('journal')">Journal</button>
</div>

<!-- HOME -->
<div id="home" class="page">

<div class="card">
<div>Total Portfolio Balance</div>
<div id="totalBalance" class="big">$0</div>

<div class="small">Daily: $<span id="totalDaily">0</span></div>
<div class="small red">Drawdown: $<span id="totalDD">0</span></div>
</div>

<div id="accounts"></div>

</div>

<!-- DETAIL -->
<div id="detail" class="page hidden">

<div class="card">
<h3 id="accName"></h3>

<input id="editBalance" oninput="SafeAccounts.update()">

<div class="card">
<div>Multiplier</div>
<div id="mult" class="big lime"></div>
</div>

<div class="card">
<div>Daily Profit</div>
<div id="daily"></div>
</div>

<div class="card">
<div>Weekly Profit</div>
<div id="weekly"></div>
</div>

<div class="card">
<div>Monthly Profit</div>
<div id="monthly"></div>
</div>

<div class="card">
<div>Next Tier</div>
<div id="nextTier"></div>
</div>

<div class="card">
<div>Drawdown</div>
<div id="dd" class="big red"></div>
</div>

<button onclick="SafeUI.show('home')">Back</button>

</div>

<!-- JOURNAL -->
<div id="journal" class="page hidden">

<div class="card">
<div class="big" id="monthLabel"></div>

<button onclick="SafeJournal.changeMonth(-1)">⬅ Prev</button>
<button onclick="SafeJournal.changeMonth(1)">Next ➡</button>

<div class="card">
<div>Monthly P/L</div>
<div class="big lime" id="monthlyPL">$0</div>
</div>

<div id="calendar" class="calendar-grid"></div>
</div>

<div class="card">
<div id="selectedDay">Select a day</div>
<input id="profitInput" placeholder="Enter profit">
<button onclick="SafeJournal.save()">Save</button>
</div>

</div>

<script>

/* =========================
   SAFE BOOT SYSTEM
========================= */

function safe(fn, label){
    try {
        return fn();
    } catch(e){
        console.error("SAFE ERROR:", label, e);
        return null;
    }
}

/* =========================
   STORAGE
========================= */

const Store = {
    get(k,f){
        try {
            return JSON.parse(localStorage.getItem(k)) || f;
        } catch {
            return f;
        }
    },
    set(k,v){
        localStorage.setItem(k, JSON.stringify(v));
    }
};

/* =========================
   ACCOUNTS (ISOLATED)
========================= */

const SafeAccounts = {
    data: Store.get("accounts", []),
    current: null,

    mult(b){
        if (b < 90000) return b / 30000;
        if (b < 140000) return 3;
        if (b < 160000) return 3.5;
        if (b < 200000) return 4;
        return 5;
    },

    render(){
        safe(() => {

            let c = document.getElementById("accounts");
            if(!c) return;

            let total=0, daily=0, dd=0;

            c.innerHTML="";

            this.data.forEach((a,i)=>{

                let b=a.balance;

                let m=this.mult(b);
                let d=m*800;
                let draw=b*0.4;

                total+=b; daily+=d; dd+=draw;

                c.innerHTML+=`
                <div class="account" onclick="SafeAccounts.open(${i})">
                    <b>${a.name}</b><br>
                    <span class="small">$${b}</span><br>
                    <span class="small">${m.toFixed(2)}x</span><br>
                    <span class="small lime">Daily $${d.toFixed(0)}</span>
                </div>`;
            });

            document.getElementById("totalBalance").innerText="$"+total;
            document.getElementById("totalDaily").innerText=daily.toFixed(0);
            document.getElementById("totalDD").innerText=dd.toFixed(0);
        },"accounts.render");
    },

    open(i){
        safe(()=>{
            this.current=i;
            SafeUI.show('detail');

            let a=this.data[i];

            document.getElementById("accName").innerText=a.name;
            document.getElementById("editBalance").value=a.balance;

            this.update();
        },"accounts.open");
    },

    update(){
        safe(()=>{
            let b=parseFloat(document.getElementById("editBalance").value)||0;

            this.data[this.current].balance=b;
            Store.set("accounts",this.data);

            let m=this.mult(b);
            let d=m*800;

            document.getElementById("mult").innerText=m.toFixed(2)+"x";
            document.getElementById("daily").innerText="$"+d.toFixed(0);
            document.getElementById("weekly").innerText="$"+(d*7).toFixed(0);
            document.getElementById("monthly").innerText="$"+(d*30).toFixed(0);
            document.getElementById("nextTier").innerText=b;
            document.getElementById("dd").innerText="$"+(b*0.4).toFixed(0);

        },"accounts.update");
    }
};

/* =========================
   JOURNAL (FULLY SAFE)
========================= */

const SafeJournal = {
    data: Store.get("journal", {}),
    date: new Date(),
    selected:null,

    safe(n){
        n=Number(n);
        return isNaN(n)?0:n;
    },

    changeMonth(d){
        this.date.setMonth(this.date.getMonth()+d);
        this.render();
    },

    render(){
        safe(()=>{

            let y=this.date.getFullYear();
            let m=this.date.getMonth();

            document.getElementById("monthLabel").innerText=
                this.date.toLocaleString('default',{month:'long',year:'numeric'});

            let html="";
            let total=0;

            for(let i=1;i<=31;i++){

                let date=new Date(y,m,i);
                if(date.getMonth()!=m) break;

                let key=`${y}-${m+1}-${i}`;
                let val=this.safe(this.data[key]);

                total+=val;

                html+=`
                <div class="day"
                     onclick="SafeJournal.select('${key}')"
                     style="background:rgba(34,197,94,${Math.min(val/500,0.8)})">
                    ${i}<br><span class="small">$${val}</span>
                </div>`;
            }

            document.getElementById("calendar").innerHTML=html;
            document.getElementById("monthlyPL").innerText="$"+total.toFixed(2);

        },"journal.render");
    },

    select(k){
        this.selected=k;
        document.getElementById("selectedDay").innerText="Selected "+k;
        document.getElementById("profitInput").value=this.safe(this.data[k]);
    },

    save(){
        safe(()=>{
            if(!this.selected) return;

            this.data[this.selected]=this.safe(document.getElementById("profitInput").value);
            Store.set("journal",this.data);
            this.render();

        },"journal.save");
    }
};

/* =========================
   SAFE UI ROUTER
========================= */

const SafeUI = {
    show(page){

        safe(()=>{

            document.querySelectorAll(".page")
            .forEach(p=>p.classList.add("hidden"));

            document.getElementById(page).classList.remove("hidden");

            if(page==="home") SafeAccounts.render();
            if(page==="journal") SafeJournal.render();

        },"UI.show");
    }
};

/* =========================
   BOOT APP
========================= */

safe(()=>SafeAccounts.render(),"boot");

</script>

</body>
</html>
