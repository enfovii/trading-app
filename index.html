<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Accounts</title>

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    margin: 0;
    padding: 20px;
}

.card {
    background: #1c1c1c;
    padding: 16px;
    margin-top: 12px;
    border-radius: 10px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #333;
    color: white;
    border: none;
    border-radius: 8px;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    margin-top: 8px;
}

.big {
    font-size: 22px;
    font-weight: bold;
    color: lime;
}

.small {
    font-size: 13px;
    color: #aaa;
    margin-top: 4px;
    display: block;
}

.hidden { display: none; }

.account {
    padding: 12px;
    background: #222;
    margin-top: 10px;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>📊 Trading Accounts</h2>

<!-- HOME -->
<div id="home">

<div class="card">
<button onclick="showAdd()">➕ Add New Account</button>
</div>

<div id="accounts"></div>

<div class="card">
<div>Total Balance</div>
<div id="totalBalance" class="big">£0</div>
<div class="small">Total Multiplier: <span id="totalX">0x</span></div>
</div>

<!-- PORTFOLIO PROJECTIONS -->
<div class="card">
<div>Portfolio Projection</div>
<div class="big" id="portfolioDaily">£0 - £0 / day</div>
<div class="small" id="portfolioWeekly"></div>
<div class="small" id="portfolioMonthly"></div>
</div>

<div class="card">
<div style="color:red;">Portfolio Max Drawdown (40%)</div>
<div id="portfolioDD" style="color:red; font-size:22px; font-weight:bold;">£0</div>
</div>

</div>

<!-- ADD -->
<div id="addScreen" class="hidden">

<div class="card">
<h3>Add Account</h3>
<input id="name" placeholder="Account name">
<input id="balance" placeholder="Balance (e.g. 20k)">
<button onclick="addAccount()">Create</button>
<button onclick="back()">Back</button>
</div>

</div>

<!-- DETAIL -->
<div id="detail" class="hidden">

<div class="card">
<h3 id="accName"></h3>

<input id="editBalance" oninput="updateAccount()">

<div class="card">
<div>Multiplier</div>
<div id="mult" class="big">0x</div>
<div id="tier" class="small"></div>
</div>

<div class="card">
<div>Daily</div>
<div id="daily" class="big">£0</div>
</div>

<!-- ACCOUNT PROJECTIONS -->
<div class="card">
<div>Projections</div>
<div id="dailyRange" class="big">£0 - £0</div>
<div id="weekly" class="small"></div>
<div id="monthly" class="small"></div>
</div>

<div class="card">
<div style="color:red;">Max Drawdown (40%)</div>
<div id="dd" style="color:red; font-size:22px; font-weight:bold;">£0</div>
</div>

<button onclick="deleteAccount()">Delete Account</button>
<button onclick="back()">Back</button>

</div>

</div>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let currentIndex = null;

// SAVE
function save() {
    localStorage.setItem("accounts", JSON.stringify(accounts));
}

// MULTIPLIER
function getMultiplier(b) {
    if (b <= 90000) return b / 30000;
    if (b <= 140000) return 3 + ((b - 90000) / 100000);
    if (b <= 160000) return 3.5 + ((b - 140000) / 20000) * 0.5;
    if (b <= 200000) return 4 + ((b - 160000) / 40000);
    return 5;
}

// HOME RENDER (UPDATED)
function renderHome() {

    document.getElementById("home").classList.remove("hidden");
    document.getElementById("addScreen").classList.add("hidden");
    document.getElementById("detail").classList.add("hidden");

    let container = document.getElementById("accounts");
    container.innerHTML = "";

    let totalBalance = 0;
    let totalX = 0;

    let portfolioDailyMin = 0;
    let portfolioDailyMax = 0;

    accounts.forEach((a, i) => {

        let b = a.balance;
        let mult = getMultiplier(b);

        totalBalance += b;
        totalX += mult;

        let dailyMin = mult * 800;
        let dailyMax = mult * 1000;

        portfolioDailyMin += dailyMin;
        portfolioDailyMax += dailyMax;

        container.innerHTML += `
            <div class="account" onclick="openAccount(${i})">
                <b>${a.name}</b><br>
                £${b.toLocaleString()}<br>
                <span class="small">${mult.toFixed(2)}x</span>
            </div>
        `;
    });

    let portfolioWeeklyMin = portfolioDailyMin * 7;
    let portfolioWeeklyMax = portfolioDailyMax * 7;

    let portfolioMonthlyMin = portfolioDailyMin * 30;
    let portfolioMonthlyMax = portfolioDailyMax * 30;

    let portfolioDD = totalBalance * 0.4;

    document.getElementById("totalBalance").innerText =
        "£" + totalBalance.toLocaleString();

    document.getElementById("totalX").innerText =
        totalX.toFixed(2) + "x";

    document.getElementById("portfolioDaily").innerText =
        "£" + portfolioDailyMin.toFixed(0) + " - £" + portfolioDailyMax.toFixed(0) + " / day";

    document.getElementById("portfolioWeekly").innerText =
        "Weekly: £" + portfolioWeeklyMin.toFixed(0) + " - £" + portfolioWeeklyMax.toFixed(0);

    document.getElementById("portfolioMonthly").innerText =
        "Monthly: £" + portfolioMonthlyMin.toFixed(0) + " - £" + portfolioMonthlyMax.toFixed(0);

    document.getElementById("portfolioDD").innerText =
        "£" + portfolioDD.toFixed(0);
}

// ADD
function showAdd() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("addScreen").classList.remove("hidden");
}

function addAccount() {

    let name = document.getElementById("name").value;
    let input = document.getElementById("balance").value.toLowerCase().trim();

    let b;

    if (input.includes("k")) {
        b = parseFloat(input.replace("k", "")) * 1000;
    } else {
        b = parseFloat(input);
    }

    if (!name || isNaN(b)) return;

    accounts.push({ name, balance: b });

    save();
    renderHome();
}

// OPEN
function openAccount(i) {

    currentIndex = i;

    document.getElementById("home").classList.add("hidden");
    document.getElementById("detail").classList.remove("hidden");

    let acc = accounts[i];

    document.getElementById("accName").innerText = acc.name;
    document.getElementById("editBalance").value = acc.balance;

    updateAccount();
}

// UPDATE ACCOUNT (FIXED)
function updateAccount() {

    let input = document.getElementById("editBalance").value;
    let b = parseFloat(input);

    if (isNaN(b)) return;

    accounts[currentIndex].balance = b;
    save();

    let mult = getMultiplier(b);

    let dailyMin = mult * 800;
    let dailyMax = mult * 1000;

    let weeklyMin = dailyMin * 7;
    let weeklyMax = dailyMax * 7;

    let monthlyMin = dailyMin * 30;
    let monthlyMax = dailyMax * 30;

    let dd = b * 0.4;

    document.getElementById("mult").innerText = mult.toFixed(2) + "x";

    document.getElementById("daily").innerText =
        "£" + dailyMax.toFixed(0);

    document.getElementById("dailyRange").innerText =
        "£" + dailyMin.toFixed(0) + " - £" + dailyMax.toFixed(0);

    document.getElementById("weekly").innerText =
        "Weekly: £" + weeklyMin.toFixed(0) + " - £" + weeklyMax.toFixed(0);

    document.getElementById("monthly").innerText =
        "Monthly: £" + monthlyMin.toFixed(0) + " - £" + monthlyMax.toFixed(0);

    document.getElementById("dd").innerText =
        "£" + dd.toFixed(0);
}

// DELETE
function deleteAccount() {
    accounts.splice(currentIndex, 1);
    save();
    renderHome();
}

// BACK
function back() {
    renderHome();
}

// INIT
renderHome();

</script>

</body>
</html>
