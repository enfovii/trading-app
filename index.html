<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Accounts</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: radial-gradient(circle at top, #0f1b33, #070b14);
    color: #e6eaf2;
    margin: 0;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
}

h2 {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 16px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    padding: 16px;
    margin-top: 12px;
    border-radius: 18px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #2f81f7, #22c55e);
    color: white;
    border: none;
    border-radius: 14px;
    font-weight: 600;
}

/* INPUT */
input {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    margin-top: 8px;
    background: rgba(255,255,255,0.04);
    color: white;
}

/* TEXT */
.big { font-size: 26px; font-weight: 800; }
.lime { color: #22c55e; }
.red { color: #ff4d4d; }
.small { font-size: 12px; color: rgba(230,234,242,0.6); }

/* ACCOUNT */
.account {
    padding: 14px;
    background: rgba(255,255,255,0.03);
    margin-top: 10px;
    border-radius: 16px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.06);
}

.hidden { display:none; }

/* PROGRESS BAR */
.progress-wrap {
    margin-top: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    height: 10px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #2f81f7, #22c55e);
    transition: 0.3s ease;
}
</style>
</head>

<body>

<h2>📊 Trading Dashboard</h2>

<!-- HOME -->
<div id="home">

<div class="card">
<button onclick="showAdd()">➕ Add New Account</button>
</div>

<div id="accounts"></div>

<div class="card">
<div>Total Portfolio Balance</div>
<div id="totalBalance" class="big lime">$0</div>

<div class="small">Portfolio Daily Profit: $<span id="portfolioDaily">0</span></div>
<div class="small">Portfolio Max Drawdown: $<span id="portfolioDD">0</span></div>
</div>

</div>

<!-- ADD -->
<div id="addScreen" class="hidden">
<div class="card">
<h3>Add Account</h3>
<input id="name" placeholder="Account name">
<input id="balance" placeholder="Balance (e.g. 20k)">
<button onclick="addAccount()">Create</button>
<button onclick="back()">Back</button>
</div>
</div>

<!-- DETAIL -->
<div id="detail" class="hidden">
<div class="card">
<h3 id="accName"></h3>

<input id="editBalance" oninput="updateAccount()">

<!-- PROGRESS BAR (ONLY DETAIL PAGE) -->
<div class="small">Progress to next X tier</div>
<div class="progress-wrap">
    <div id="progressBar" class="progress-bar"></div>
</div>

<div class="card">
<div>Multiplier</div>
<div id="mult" class="big lime">0x</div>
</div>

<div class="card">
<div>Daily Profit</div>
<div id="daily" class="big lime">$0</div>
</div>

<div class="card">
<div>Weekly Profit</div>
<div id="weekly" class="big lime">$0</div>
</div>

<div class="card">
<div>Monthly Profit</div>
<div id="monthly" class="big lime">$0</div>
</div>

<div class="card">
<div>Max Drawdown</div>
<div id="dd" class="big red">$0</div>
</div>

<button onclick="deleteAccount()">Delete Account</button>
<button onclick="back()">Back</button>

</div>
</div>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let currentIndex = null;

/* SETTINGS */
const MIN_PER_X = 800;
const MAX_PER_X = 1000;
const DD_RATE = 0.40;

/* SAVE */
function save(){
    localStorage.setItem("accounts", JSON.stringify(accounts));
}

/* MULTIPLIER SYSTEM (FIXED TIERS) */
function getMultiplier(b) {
    if (b < 90000) return b / 30000;
    if (b < 140000) return 3;
    if (b < 160000) return 3.5;
    return 4 + ((b - 160000) / 40000);
}

/* NEXT TIER LOGIC */
function getNextTier(b) {
    if (b < 90000) return 90000;
    if (b < 140000) return 140000;
    if (b < 160000) return 160000;
    return null;
}

/* PROGRESS % */
function getProgress(b) {
    let next = getNextTier(b);
    if (!next) return 100;

    let prev =
        next === 90000 ? 0 :
        next === 140000 ? 90000 :
        next === 160000 ? 140000 : 160000;

    return Math.min(100, ((b - prev) / (next - prev)) * 100);
}

/* PROFIT */
function getProfit(mult){
    return {
        dailyMin: mult * MIN_PER_X,
        dailyMax: mult * MAX_PER_X
    };
}

/* DRAW DOWN */
function getDD(b){
    return b * DD_RATE;
}

/* HOME */
function renderHome(){

    document.getElementById("home").classList.remove("hidden");
    document.getElementById("addScreen").classList.add("hidden");
    document.getElementById("detail").classList.add("hidden");

    let container = document.getElementById("accounts");
    container.innerHTML = "";

    let total = 0;
    let daily = 0;
    let ddTotal = 0;

    accounts.forEach((a,i)=>{

        let b = a.balance;
        let mult = getMultiplier(b);
        let profit = getProfit(mult);
        let dd = getDD(b);

        total += b;
        daily += profit.dailyMin;
        ddTotal += dd;

        container.innerHTML += `
            <div class="account" onclick="openAccount(${i})">
                <b>${a.name}</b><br>
                $${b.toLocaleString()}<br>
                <span class="small">${mult.toFixed(2)}x • $${profit.dailyMin.toFixed(0)}/day</span>
            </div>
        `;
    });

    document.getElementById("totalBalance").innerText = "$" + total.toLocaleString();
    document.getElementById("portfolioDaily").innerText = daily.toFixed(0);
    document.getElementById("portfolioDD").innerText = ddTotal.toFixed(0);
}

/* ADD */
function showAdd(){
    document.getElementById("home").classList.add("hidden");
    document.getElementById("addScreen").classList.remove("hidden");
}

function addAccount(){

    let name = document.getElementById("name").value;
    let input = document.getElementById("balance").value.toLowerCase();

    let b = input.includes("k")
        ? parseFloat(input.replace("k","")) * 1000
        : parseFloat(input);

    accounts.push({name, balance:b});
    save();
    renderHome();
}

/* OPEN */
function openAccount(i){

    currentIndex = i;

    document.getElementById("home").classList.add("hidden");
    document.getElementById("detail").classList.remove("hidden");

    let acc = accounts[i];

    document.getElementById("accName").innerText = acc.name;
    document.getElementById("editBalance").value = acc.balance;

    updateAccount();
}

/* UPDATE */
function updateAccount(){

    let b = parseFloat(document.getElementById("editBalance").value);
    accounts[currentIndex].balance = b;

    save();

    let mult = getMultiplier(b);
    let profit = getProfit(mult);
    let dd = getDD(b);

    document.getElementById("mult").innerText = mult.toFixed(2) + "x";

    document.getElementById("daily").innerText =
        "$" + profit.dailyMin.toFixed(0) + " - $" + profit.dailyMax.toFixed(0);

    document.getElementById("weekly").innerText =
        "$" + (profit.dailyMin * 7).toFixed(0);

    document.getElementById("monthly").innerText =
        "$" + (profit.dailyMin * 30).toFixed(0);

    document.getElementById("dd").innerText =
        "$" + dd.toFixed(0);

    /* PROGRESS BAR */
    document.getElementById("progressBar").style.width =
        getProgress(b) + "%";
}

/* DELETE */
function deleteAccount(){
    accounts.splice(currentIndex,1);
    save();
    renderHome();
}

/* BACK */
function back(){
    renderHome();
}

renderHome();

</script>

</body>
</html>
