<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pro Trading Dashboard">

<title>Pro Trading Dashboard</title>

<style>

* {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    margin: 0;
    padding: 14px;
    padding-bottom: 90px;
    color: #eaf1ff;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    -webkit-text-size-adjust: 100%;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 15% 20%, rgba(0,140,255,0.20), transparent 45%),
        radial-gradient(circle at 85% 25%, rgba(80,180,255,0.12), transparent 50%),
        radial-gradient(circle at 50% 90%, rgba(0,90,255,0.10), transparent 55%),
        #050913;
    z-index: -1;
}

.title {
    display: flex;
    justify-content: center;
    margin: 12px 0 16px;
}

h2 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    text-align: center;
    letter-spacing: 0.5px;
}

.page {
    display: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s ease, transform 0.2s ease;
}

.page.active {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

.topbar {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.portfolioBox {
    background: linear-gradient(145deg, rgba(20,30,50,0.75), rgba(10,15,30,0.55));
    border: 1px solid rgba(120,170,255,0.25);
    backdrop-filter: blur(16px);
    padding: 18px;
    border-radius: 18px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    will-change: transform;
}

.statsRow {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.stat {
    background: linear-gradient(145deg, rgba(20,30,50,0.65), rgba(10,15,30,0.45));
    border: 1px solid rgba(120,170,255,0.18);
    backdrop-filter: blur(14px);
    padding: 12px;
    border-radius: 16px;
    text-align: center;
    will-change: transform;
}

.small { font-size: 11px; color: #93a4b8; }

.big {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.3px;
}

.card {
    background: linear-gradient(145deg, rgba(20,30,50,0.65), rgba(10,15,30,0.45));
    border: 1px solid rgba(120,170,255,0.18);
    backdrop-filter: blur(14px);
    padding: 14px;
    margin-top: 10px;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    will-change: transform;
}

.account {
    padding: 14px;
    margin-top: 10px;
    border-radius: 16px;
    background: linear-gradient(145deg, rgba(20,30,50,0.6), rgba(10,15,30,0.4));
    border: 1px solid rgba(120,170,255,0.18);
    scroll-margin-bottom: 120px;
    will-change: transform;
}

.green { color: #2ee59d; }
.red { color: #ff5c7a; }

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(120,170,255,0.25);
    margin-top: 8px;
    background: rgba(8,12,25,0.65);
    color: #eaf1ff;
    box-sizing: border-box;
    font-size: 16px;
}

input:focus {
    outline: none;
    border: 1px solid #2ee59d;
    box-shadow: 0 0 12px rgba(46,229,157,0.25);
}

button {
    width: calc(100% - 24px);
    margin-left: 12px;
    margin-right: 12px;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #1f6feb, #144a99);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
    box-shadow: 0 8px 20px rgba(0,120,255,0.25);
}

.addBtn {
    position: fixed;
    bottom: 18px;
    left: 12px;
    right: 12px;
    z-index: 10;
    backdrop-filter: blur(12px);
}

.modal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.65);
    padding: 16px;
    z-index: 20;
}

.modal-content {
    width: 100%;
    max-width: 360px;
    background: rgba(15,20,35,0.9);
    border: 1px solid rgba(120,170,255,0.25);
    backdrop-filter: blur(16px);
    padding: 16px;
    border-radius: 16px;
}

.danger {
    background: #ff5c7a !important;
}

.nameRow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
}

.nameRow h3 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
}

.editBtn {
    background: transparent;
    border: none;
    color: #93a4b8;
    font-size: 18px;
    width: auto;
    margin: 0;
    padding: 6px 8px;
    border-radius: 8px;
}

</style>
</head>

<body>

<div class="title">
    <h2>Pro Trading Dashboard</h2>
</div>

<!-- YOUR FULL UI REMAINS UNTOUCHED -->

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let current = null;

function num(v){
    if(!v) return 0;
    v = v.toString().toLowerCase().replace(/,/g,'');
    if(v.includes("k")) return parseFloat(v)*1000;
    if(v.includes("m")) return parseFloat(v)*1000000;
    return isNaN(Number(v)) ? 0 : Number(v);
}

function money(v){
    return "$" + Number(v).toLocaleString();
}

/* ===================================================== */
/* ONLY CHANGE: renameAccount (REPLACED WITH IOS MODAL)  */
/* ===================================================== */

function renameAccount(){
    if(current === null) return;

    let modal = document.createElement("div");
    modal.className = "modal";
    modal.style.display = "flex";
    modal.id = "renameTempModal";

    modal.innerHTML = `
        <div class="modal-content">
            <div class="big">Rename Account</div>
            <input id="renameInput" value="${accounts[current].name}">
            <button onclick="saveRename()">Save</button>
            <button onclick="this.closest('.modal').remove()" style="background:rgba(255,255,255,0.08);">Cancel</button>
        </div>
    `;

    document.body.appendChild(modal);
}

function saveRename(){
    let val = document.getElementById("renameInput").value.trim();
    if(!val) return;

    accounts[current].name = val;
    localStorage.setItem("accounts", JSON.stringify(accounts));

    let nameEl = document.getElementById("name");
    if(nameEl) nameEl.innerText = val;

    let m = document.getElementById("renameTempModal");
    if(m) m.remove();

    render();
}

</script>

</body>
</html>
