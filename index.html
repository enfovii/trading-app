<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: #0b0f14;
    color: #e8ecf3;
    margin: 0;
    padding: 18px;
}

h2 { font-size: 22px; font-weight: 700; }

.card {
    background: #111823;
    border: 1px solid #1e2a3a;
    padding: 16px;
    margin-top: 12px;
    border-radius: 14px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: #1f6feb;
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #263445;
    margin-top: 8px;
    background: #0f1622;
    color: #e8ecf3;
}

.big { font-size: 26px; font-weight: 700; }
.small { font-size: 12px; color: #93a4b8; }

.lime { color: #22c55e; }
.red { color: #ef4444; }

.hidden { display:none; }

.account {
    padding: 14px;
    background: #111823;
    margin-top: 12px;
    border-radius: 14px;
    border: 1px solid #1e2a3a;
    cursor: pointer;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-top: 10px;
}

.day {
    padding: 10px;
    border-radius: 10px;
    background: #0f1622;
    border: 1px solid #1e2a3a;
    text-align: center;
    font-size: 12px;
    cursor: pointer;
}

.day.has-data {
    border-color: #1f6feb;
}
</style>
</head>

<body>

<h2>📊 Trading Dashboard</h2>

<div class="card">
<button onclick="UI.show('home')">Accounts</button>
<button onclick="UI.show('journal')">Journal</button>
</div>

<!-- HOME -->
<div id="home" class="page">

<div class="card">
<div>Total Portfolio Balance</div>
<div id="totalBalance" class="big">$0</div>

<div class="small">Daily: $<span id="totalDaily">0</span></div>
<div class="small red">Drawdown: $<span id="totalDD">0</span></div>
</div>

<div id="accounts"></div>

</div>

<!-- DETAIL -->
<div id="detail" class="page hidden">

<div class="card">
<h3 id="accName"></h3>

<input id="editBalance" oninput="Accounts.updateCurrent()">

<div class="card">
<div>Multiplier</div>
<div id="mult" class="big lime"></div>
</div>

<div class="card">
<div>Daily Profit</div>
<div id="daily"></div>
</div>

<div class="card">
<div>Weekly Profit</div>
<div id="weekly"></div>
</div>

<div class="card">
<div>Monthly Profit</div>
<div id="monthly"></div>
</div>

<div class="card">
<div>Next Tier</div>
<div id="nextTier"></div>
</div>

<div class="card">
<div>Drawdown</div>
<div id="dd" class="big red"></div>
</div>

<button onclick="UI.show('home')">Back</button>

</div>

<!-- JOURNAL -->
<div id="journal" class="page hidden">

<div class="card">
<div class="big" id="monthLabel"></div>

<button onclick="Journal.changeMonth(-1)">⬅ Prev</button>
<button onclick="Journal.changeMonth(1)">Next ➡</button>

<div class="card">
<div>Monthly P/L</div>
<div class="big lime" id="monthlyPL">$0</div>
</div>

<div id="calendar" class="calendar-grid"></div>
</div>

<div class="card">
<div id="selectedDay">Select a day</div>
<input id="profitInput" placeholder="Enter profit">
<button onclick="Journal.saveDay()">Save</button>
</div>

</div>

<script>

/* =========================
   STORAGE LAYER
========================= */

const Store = {
    get(key, fallback){
        return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
    },
    set(key, value){
        localStorage.setItem(key, JSON.stringify(value));
    }
};

/* =========================
   ACCOUNTS MODULE
========================= */

const Accounts = {
    data: Store.get("accounts", []),
    currentIndex: null,

    save(){
        Store.set("accounts", this.data);
    },

    getMultiplier(b){
        if (b < 90000) return b / 30000;
        if (b < 140000) return 3;
        if (b < 160000) return 3.5;
        if (b < 200000) return 4;
        return 5;
    },

    getNextTier(b){
        if (b < 90000) return "$90,000";
        if (b < 140000) return "$140,000";
        if (b < 160000) return "$160,000";
        if (b < 200000) return "$200,000";

        let steps = Math.floor((b - 200000) / 20000) + 1;
        return "$" + (200000 + steps * 20000).toLocaleString();
    },

    renderHome(){

        let container = document.getElementById("accounts");
        container.innerHTML = "";

        let total = 0;
        let totalDaily = 0;
        let totalDD = 0;

        this.data.forEach((a,i)=>{

            let b = a.balance;

            let mult = this.getMultiplier(b);
            let daily = mult * 800;
            let dd = b * 0.4;

            total += b;
            totalDaily += daily;
            totalDD += dd;

            container.innerHTML += `
                <div class="account" onclick="Accounts.open(${i})">
                    <b>${a.name}</b><br>
                    <span class="small">$${b.toLocaleString()}</span><br>
                    <span class="small">${mult.toFixed(2)}x</span><br>
                    <span class="small lime">Daily $${daily.toFixed(0)}</span>
                    <span class="small red">Drawdown $${dd.toFixed(0)}</span>
                </div>
            `;
        });

        document.getElementById("totalBalance").innerText = "$" + total.toLocaleString();
        document.getElementById("totalDaily").innerText = totalDaily.toFixed(0);
        document.getElementById("totalDD").innerText = totalDD.toFixed(0);
    },

    open(i){
        this.currentIndex = i;

        UI.show('detail');

        let acc = this.data[i];

        document.getElementById("accName").innerText = acc.name;
        document.getElementById("editBalance").value = acc.balance;

        this.updateCurrent();
    },

    updateCurrent(){

        let b = parseFloat(document.getElementById("editBalance").value);
        this.data[this.currentIndex].balance = b;
        this.save();

        let mult = this.getMultiplier(b);
        let daily = mult * 800;

        document.getElementById("mult").innerText = mult.toFixed(2) + "x";
        document.getElementById("daily").innerText = "$" + daily.toFixed(0);
        document.getElementById("weekly").innerText = "$" + (daily*7).toFixed(0);
        document.getElementById("monthly").innerText = "$" + (daily*30).toFixed(0);
        document.getElementById("nextTier").innerText = this.getNextTier(b);
        document.getElementById("dd").innerText = "$" + (b * 0.4).toFixed(0);
    }
};

/* =========================
   JOURNAL MODULE
========================= */

const Journal = {
    data: Store.get("journal", {}),
    viewDate: new Date(),
    selectedDate: null,

    save(){
        Store.set("journal", this.data);
    },

    changeMonth(dir){
        this.viewDate.setMonth(this.viewDate.getMonth() + dir);
        this.render();
    },

    render(){

        let y = this.viewDate.getFullYear();
        let m = this.viewDate.getMonth();

        document.getElementById("monthLabel").innerText =
            this.viewDate.toLocaleString('default',{month:'long',year:'numeric'});

        let html = "";
        let total = 0;

        for(let d=1; d<=31; d++){

            let date = new Date(y,m,d);
            if(date.getMonth() !== m) break;

            let day = date.getDay();
            if(day === 0 || day === 6) continue;

            let key = `${y}-${m+1}-${d}`;
            let val = this.data[key] ?? 0;

            total += Number(val);

            html += `
            <div class="day ${val?'has-data':''}" onclick="Journal.selectDay('${key}')">
                ${d}<br><span class="small">$${val}</span>
            </div>`;
        }

        document.getElementById("calendar").innerHTML = html;
        document.getElementById("monthlyPL").innerText = "$" + total.toFixed(2);
    },

    selectDay(key){
        this.selectedDate = key;
        document.getElementById("selectedDay").innerText = "Selected: " + key;
        document.getElementById("profitInput").value = this.data[key] || "";
    },

    saveDay(){
        if(!this.selectedDate) return;

        this.data[this.selectedDate] =
            parseFloat(document.getElementById("profitInput").value) || 0;

        this.save();
        this.render();
    }
};

/* =========================
   UI CONTROLLER
========================= */

const UI = {
    show(page){

        document.querySelectorAll(".page")
            .forEach(p => p.classList.add("hidden"));

        document.getElementById(page).classList.remove("hidden");

        if(page === "home") Accounts.renderHome();
        if(page === "journal") Journal.render();
    }
};

/* INIT */
Accounts.renderHome();

</script>

</body>
</html>
