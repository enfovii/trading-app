<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pro Trading Dashboard">

<title>Pro Trading Dashboard</title>

<style>

* {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    margin: 0;
    padding: 14px;
    padding-bottom: 90px;
    color: #eaf1ff;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    -webkit-text-size-adjust: 100%;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 15% 20%, rgba(0,140,255,0.20), transparent 45%),
        radial-gradient(circle at 85% 25%, rgba(80,180,255,0.12), transparent 50%),
        radial-gradient(circle at 50% 90%, rgba(0,90,255,0.10), transparent 55%),
        #050913;
    z-index: -1;
}

.title {
    display: flex;
    justify-content: center;
    margin: 12px 0 16px;
}

h2 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    text-align: center;
    letter-spacing: 0.5px;
}

.page {
    display: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s ease, transform 0.2s ease;
}

.page.active {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

.topbar {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.portfolioBox {
    background: linear-gradient(145deg, rgba(20,30,50,0.75), rgba(10,15,30,0.55));
    border: 1px solid rgba(120,170,255,0.25);
    backdrop-filter: blur(16px);
    padding: 18px;
    border-radius: 18px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
}

.statsRow {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.stat {
    background: linear-gradient(145deg, rgba(20,30,50,0.65), rgba(10,15,30,0.45));
    border: 1px solid rgba(120,170,255,0.18);
    backdrop-filter: blur(14px);
    padding: 12px;
    border-radius: 16px;
    text-align: center;
}

.small { font-size: 11px; color: #93a4b8; }

.big {
    font-size: 20px;
    font-weight: 700;
}

.card {
    background: linear-gradient(145deg, rgba(20,30,50,0.65), rgba(10,15,30,0.45));
    border: 1px solid rgba(120,170,255,0.18);
    backdrop-filter: blur(14px);
    padding: 14px;
    margin-top: 10px;
    border-radius: 16px;
}

.account {
    padding: 14px;
    margin-top: 10px;
    border-radius: 16px;
    background: linear-gradient(145deg, rgba(20,30,50,0.6), rgba(10,15,30,0.4));
    border: 1px solid rgba(120,170,255,0.18);
}

.green { color: #2ee59d; }
.red { color: #ff5c7a; }

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(120,170,255,0.25);
    margin-top: 8px;
    background: rgba(8,12,25,0.65);
    color: #eaf1ff;
    box-sizing: border-box;
    font-size: 16px;
}

button {
    width: calc(100% - 24px);
    margin-left: 12px;
    margin-right: 12px;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #1f6feb, #144a99);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
}

.addBtn {
    position: fixed;
    bottom: 18px;
    left: 12px;
    right: 12px;
}

.danger {
    background: #ff5c7a !important;
}

/* ===== RENAMING ===== */

.nameWrap{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
}

.renameInput{
    font-size:20px;
    font-weight:700;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(120,170,255,0.3);
    color:#eaf1ff;
    border-radius:8px;
    padding:4px 8px;
    width:100%;
}

.editBtn{
    background:transparent;
    border:none;
    color:#93a4b8;
    font-size:18px;
    width:auto;
    margin:0;
    padding:6px;
}

</style>
</head>

<body>

<div class="title">
    <h2>Pro Trading Dashboard</h2>
</div>

<div id="home" class="page active">

<div class="topbar">

    <div class="portfolioBox" onclick="openPortfolio()">
        <div class="small">Portfolio</div>
        <div class="big" id="total">$0</div>
    </div>

    <div class="statsRow">

        <div class="stat">
            <div class="small">Daily</div>
            <div class="big green" id="daily">$0</div>
        </div>

        <div class="stat">
            <div class="small">Weekly</div>
            <div class="big green" id="weeklyHome">$0</div>
        </div>

        <div class="stat">
            <div class="small">Monthly</div>
            <div class="big green" id="monthlyHome">$0</div>
        </div>

    </div>

</div>

<div id="accounts"></div>
</div>

<div id="account" class="page">
<div class="card">

    <div class="nameWrap">
        <h3 id="name"></h3>
        <button class="editBtn" onclick="startRename()">✏️</button>
    </div>

    <input id="balance"
       inputmode="decimal"
       pattern="[0-9]*"
       autocomplete="off"
       autocorrect="off"
       autocapitalize="none"
       spellcheck="false"
       onfocus="this.select()"
       oninput="formatBalanceInput(this)">

    <button onclick="back()">Back</button>
    <button class="danger" onclick="confirmDelete()">Delete Account</button>

</div>
</div>

<button class="addBtn" onclick="openModal()">+ Add Account</button>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let current = null;

function num(v){
    if(!v) return 0;
    v = v.toString().toLowerCase().replace(/,/g,'');
    if(v.includes("k")) return parseFloat(v)*1000;
    if(v.includes("m")) return parseFloat(v)*1000000;
    return isNaN(Number(v)) ? 0 : Number(v);
}

/* ===== SAFE INLINE RENAME ===== */

function startRename(){
    if(current === null) return;

    const nameEl = document.getElementById("name");
    const oldName = accounts[current].name;

    const input = document.createElement("input");
    input.className = "renameInput";
    input.value = oldName;

    nameEl.replaceWith(input);
    input.focus();
    input.select();

    const save = () => {
        let val = input.value.trim();

        if(val){
            accounts[current].name = val;
            localStorage.setItem("accounts", JSON.stringify(accounts));
            render();
        }

        const h3 = document.createElement("h3");
        h3.id = "name";
        h3.textContent = accounts[current].name;

        input.replaceWith(h3);
    };

    input.addEventListener("blur", save);

    input.addEventListener("keydown", (e) => {
        if(e.key === "Enter") input.blur();
        if(e.key === "Escape"){
            input.value = oldName;
            input.blur();
        }
    });
}

/* ===== ORIGINAL LOGIC (UNCHANGED) ===== */

function openAccount(i){
    current = i;
    let a = accounts[i];

    document.getElementById("name").textContent = a.name;
    document.getElementById("balance").value = a.balance;

    show("account");
}

function render(){
    document.getElementById("accounts").innerHTML =
    accounts.map((a,i)=>`
        <div class="account" onclick="openAccount(${i})">
            <b>${a.name}</b><br>
            $${Number(a.balance).toLocaleString()}
        </div>
    `).join("");
}

function show(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function back(){ show("home"); }
function backHome(){ show("home"); }

window.onload = render;

</script>

</body>
</html>
