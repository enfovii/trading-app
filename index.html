<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pro Trading Dashboard">

<title>Pro Trading Dashboard</title>

<style>

/* (all your existing CSS unchanged) */

* {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    margin: 0;
    padding: 14px;
    padding-bottom: 90px;
    color: #eaf1ff;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    -webkit-text-size-adjust: 100%;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 15% 20%, rgba(0,140,255,0.20), transparent 45%),
        radial-gradient(circle at 85% 25%, rgba(80,180,255,0.12), transparent 50%),
        radial-gradient(circle at 50% 90%, rgba(0,90,255,0.10), transparent 55%),
        #050913;
    z-index: -1;
}

/* rest unchanged... */

</style>
</head>

<body>

<div class="title">
    <h2>Pro Trading Dashboard</h2>
</div>

<div id="home" class="page active">

<div class="topbar">

    <div class="portfolioBox" onclick="openPortfolio()">
        <div class="small">Portfolio</div>
        <div class="big" id="total">$0</div>
    </div>

    <div class="statsRow">

        <div class="stat">
            <div class="small">Daily</div>
            <div class="big green" id="daily">$0</div>
        </div>

        <div class="stat">
            <div class="small">Weekly</div>
            <div class="big green" id="weeklyHome">$0</div>
        </div>

        <div class="stat">
            <div class="small">Monthly</div>
            <div class="big green" id="monthlyHome">$0</div>
        </div>

    </div>

</div>

<div id="accounts"></div>
</div>

<div id="portfolio" class="page">
<div class="card">
    <h3>Portfolio Overview</h3>
    <button onclick="backHome()">Back</button>
</div>
</div>

<div id="account" class="page">
<div class="card">

    <!-- ✅ CHANGED: name now has clickable pen icon -->
    <h3 id="name" style="display:flex;align-items:center;gap:8px;">
        <span id="nameText"></span>
        <span onclick="renameAccount()" style="cursor:pointer;font-size:16px;opacity:0.8;">
            ✏️
        </span>
    </h3>

    <input id="balance"
       inputmode="decimal"
       pattern="[0-9]*"
       autocomplete="off"
       autocorrect="off"
       autocapitalize="none"
       spellcheck="false"
       onfocus="this.select()"
       oninput="formatBalanceInput(this)">

    <div class="card">
        <div class="small">Multiplier</div>
        <div class="big green" id="mult"></div>
    </div>

    <div class="card">
        <div class="small">Daily Profit</div>
        <div id="dailyP"></div>
    </div>

    <div class="card">
        <div class="small">Weekly</div>
        <div id="weekly"></div>
    </div>

    <div class="card">
        <div class="small">Monthly</div>
        <div id="monthly"></div>
    </div>

    <div class="card">
        <div class="small">Drawdown</div>
        <div class="big red" id="accdd"></div>
    </div>

    <button onclick="back()">Back</button>
    <button class="danger" onclick="confirmDelete()">Delete Account</button>
</div>
</div>

<button class="addBtn" onclick="openModal()">+ Add Account</button>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let current = null;

/* --- ALL YOUR FUNCTIONS UNCHANGED ABOVE THIS POINT --- */

function openAccount(i){
    current=i;
    let a=accounts[i];

    document.getElementById("nameText").innerText = a.name; // ✅ changed line
    document.getElementById("balance").value=num(a.balance);

    show("account");
    updateAccount();

    setTimeout(() => {
        let input = document.getElementById("balance");
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
        input.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 100);
}

function renameAccount(){
    if(current===null) return;

    let newName = prompt("Enter new account name", accounts[current].name);
    if(!newName) return;

    accounts[current].name = newName.trim();
    localStorage.setItem("accounts", JSON.stringify(accounts));

    document.getElementById("nameText").innerText = accounts[current].name;
    render();
}

/* --- everything else unchanged --- */

window.onload=function(){
    show("home");
    render();
};

</script>

</body>
</html>
