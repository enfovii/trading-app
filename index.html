<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: radial-gradient(circle at top, #0f1b33, #070b14);
    color: #e6eaf2;
    margin: 0;
    padding: 18px;
}

h2 { font-size: 22px; font-weight: 800; }

.card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    padding: 16px;
    margin-top: 12px;
    border-radius: 18px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #2f81f7, #22c55e);
    color: white;
    border: none;
    border-radius: 14px;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    margin-top: 8px;
    background: rgba(255,255,255,0.04);
    color: white;
}

.big { font-size: 26px; font-weight: 800; }
.lime { color: #22c55e; }
.red { color: #ff4d4d; }
.small { font-size: 12px; color: rgba(230,234,242,0.6); }

.hidden { display:none; }

.account {
    padding: 14px;
    background: rgba(255,255,255,0.03);
    margin-top: 12px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
}

.dayBox {
    width: 22%;
    display:inline-block;
    margin: 1%;
    padding: 10px;
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    text-align:center;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>📊 Trading Dashboard</h2>

<!-- NAV -->
<div class="card">
<button onclick="showHome()">🏠 Accounts</button>
<button onclick="showJournal()">📅 Journal</button>
</div>

<!-- HOME -->
<div id="home">

<div class="card">
<div>Total Portfolio Balance</div>
<div id="totalBalance" class="big lime">$0</div>

<div class="small">Total Daily Profit: $<span id="totalDaily">0</span></div>
<div class="small">Total Weekly Profit: $<span id="totalWeekly">0</span></div>
</div>

<div class="card">
<button onclick="showAdd()">➕ Add New Account</button>
</div>

<div id="accounts"></div>

</div>

<!-- JOURNAL -->
<div id="journal" class="hidden">

<div class="card">
<h3>📅 Trading Journal (Days)</h3>
<div id="days"></div>
</div>

<div class="card">
<h3>Selected Day</h3>
<div id="selectedDay" class="big">-</div>
<input id="dayProfit" placeholder="Enter profit for day">
<button onclick="saveDay()">Save Day</button>
</div>

</div>

<!-- ADD -->
<div id="addScreen" class="hidden">
<div class="card">
<h3>Add Account</h3>
<input id="name" placeholder="Account name">
<input id="balance" placeholder="Balance (e.g. 20k)">
<button onclick="addAccount()">Create</button>
<button onclick="back()">Back</button>
</div>
</div>

<!-- DETAIL -->
<div id="detail" class="hidden">
<div class="card">
<h3 id="accName"></h3>

<input id="editBalance" oninput="updateAccount()">

<div class="card">
<div>Multiplier</div>
<div id="mult" class="big lime">0x</div>
</div>

<div class="card">
<div>Next Tier</div>
<div id="nextMilestone" class="big">-</div>
</div>

<div class="card">
<div>Daily Profit</div>
<div id="daily" class="big lime">$0</div>
</div>

<div class="card">
<div>Weekly Profit</div>
<div id="weekly" class="big lime">$0</div>
</div>

<div class="card">
<div>Monthly Profit</div>
<div id="monthly" class="big lime">$0</div>
</div>

<div class="card">
<div>Max Drawdown</div>
<div id="dd" class="big red">$0</div>
</div>

<button onclick="deleteAccount()">Delete Account</button>
<button onclick="back()">Back</button>

</div>
</div>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let journal = JSON.parse(localStorage.getItem("journal") || "{}");

let currentIndex = null;
let selectedDate = null;

function save(){
    localStorage.setItem("accounts", JSON.stringify(accounts));
}

function saveJournal(){
    localStorage.setItem("journal", JSON.stringify(journal));
}

/* ================= MULTIPLIER (your extended logic kept) ================= */

function getMultiplier(b) {

    if (b < 90000) return b / 30000;
    if (b < 140000) return 3;
    if (b < 160000) return 3.5;
    if (b < 200000) return 4;

    let extra = b - 200000;

    let fullSteps = Math.floor(extra / 40000);
    let halfSteps = Math.floor(extra / 20000);

    let halfOnly = halfSteps - fullSteps * 2;

    return 4 + (fullSteps * 1) + (halfOnly * 0.5);
}

function getProfit(mult){
    return {
        dailyMin: mult * 800,
        dailyMax: mult * 1000
    };
}

function getDD(b){
    return b * 0.40;
}

/* ================= HOME ================= */

function renderHome(){

    document.getElementById("home").classList.remove("hidden");
    document.getElementById("journal").classList.add("hidden");
    document.getElementById("addScreen").classList.add("hidden");
    document.getElementById("detail").classList.add("hidden");

    let container = document.getElementById("accounts");
    container.innerHTML = "";

    let total = 0;
    let totalDaily = 0;
    let totalWeekly = 0;

    accounts.forEach((a,i)=>{

        let b = a.balance;
        let mult = getMultiplier(b);
        let profit = getProfit(mult);

        total += b;
        totalDaily += profit.dailyMin;
        totalWeekly += profit.dailyMin * 7;

        container.innerHTML += `
            <div class="account" onclick="openAccount(${i})">
                <b>${a.name}</b><br>
                <span class="small">$${b.toLocaleString()}</span><br>
                <span class="small">${mult.toFixed(2)}x • $${profit.dailyMin.toFixed(0)}/day</span>
            </div>
        `;
    });

    document.getElementById("totalBalance").innerText = "$" + total.toLocaleString();
    document.getElementById("totalDaily").innerText = totalDaily.toFixed(0);
    document.getElementById("totalWeekly").innerText = totalWeekly.toFixed(0);
}

/* ================= JOURNAL ================= */

function showJournal(){
    document.getElementById("home").classList.add("hidden");
    document.getElementById("journal").classList.remove("hidden");

    let days = document.getElementById("days");
    days.innerHTML = "";

    for(let i=1;i<=31;i++){

        let dateKey = "2026-06-" + String(i).padStart(2,"0");
        let val = journal[dateKey] || 0;

        days.innerHTML += `
            <div class="dayBox" onclick="selectDay('${dateKey}', ${i})">
                ${i}<br>
                <span class="small">$${val}</span>
            </div>
        `;
    }
}

function selectDay(dateKey, day){

    selectedDate = dateKey;

    document.getElementById("selectedDay").innerText = "Day " + day;
    document.getElementById("dayProfit").value = journal[dateKey] || "";
}

function saveDay(){

    if(!selectedDate) return;

    let val = parseFloat(document.getElementById("dayProfit").value) || 0;

    journal[selectedDate] = val;
    saveJournal();

    showJournal();
}

/* ================= ADD / DETAIL ================= */

function showAdd(){
    document.getElementById("home").classList.add("hidden");
    document.getElementById("addScreen").classList.remove("hidden");
}

function addAccount(){

    let name = document.getElementById("name").value;
    let input = document.getElementById("balance").value.toLowerCase();

    let b = input.includes("k")
        ? parseFloat(input.replace("k","")) * 1000
        : parseFloat(input);

    accounts.push({name, balance:b});
    save();
    renderHome();
}

function openAccount(i){
    currentIndex = i;

    document.getElementById("home").classList.add("hidden");
    document.getElementById("detail").classList.remove("hidden");

    let acc = accounts[i];

    document.getElementById("accName").innerText = acc.name;
    document.getElementById("editBalance").value = acc.balance;

    updateAccount();
}

function updateAccount(){

    let b = parseFloat(document.getElementById("editBalance").value);
    accounts[currentIndex].balance = b;

    save();

    let mult = getMultiplier(b);
    let profit = getProfit(mult);
    let dd = getDD(b);

    document.getElementById("mult").innerText = mult.toFixed(2) + "x";
    document.getElementById("daily").innerText = "$" + profit.dailyMin.toFixed(0) + " - $" + profit.dailyMax.toFixed(0);
    document.getElementById("weekly").innerText = "$" + (profit.dailyMin * 7).toFixed(0);
    document.getElementById("monthly").innerText = "$" + (profit.dailyMin * 30).toFixed(0);
    document.getElementById("dd").innerText = "$" + dd.toFixed(0);
}

function deleteAccount(){
    accounts.splice(currentIndex,1);
    save();
    renderHome();
}

function showHome(){
    renderHome();
}

function back(){
    renderHome();
}

renderHome();

</script>

</body>
</html>
