<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Trading Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: #0a0f1a;
    color: #e8ecf3;
    margin: 0;
    padding: 18px;
}

h2 {
    font-size: 22px;
    font-weight: 700;
}

.topbar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
}

.stat {
    background: #111a2b;
    border: 1px solid #1e2a3a;
    padding: 14px;
    border-radius: 14px;
    text-align: center;
}

.stat .label {
    font-size: 11px;
    color: #93a4b8;
}

.stat .value {
    font-size: 18px;
    font-weight: 700;
}

.card {
    background: #111823;
    border: 1px solid #1e2a3a;
    padding: 16px;
    margin-top: 12px;
    border-radius: 14px;
}

.account {
    padding: 14px;
    background: #111823;
    margin-top: 12px;
    border-radius: 14px;
    border: 1px solid #1e2a3a;
    cursor: pointer;
}

.green { color: #22c55e; }
.red { color: #ef4444; }
.small { font-size: 12px; color: #93a4b8; }
.big { font-size: 26px; font-weight: 700; }

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: #1f6feb;
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
}

input, select {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #263445;
    margin-top: 8px;
    background: #0f1622;
    color: #e8ecf3;
}

.hidden { display:none; }

.trade {
    padding: 10px;
    margin-top: 8px;
    border-radius: 10px;
    background: #0f1622;
    border: 1px solid #1e2a3a;
    font-size: 13px;
}
</style>
</head>

<body>

<h2>📊 Pro Trading Dashboard</h2>

<div class="topbar">
    <div class="stat">
        <div class="label">Portfolio</div>
        <div class="value" id="total">$0</div>
    </div>
    <div class="stat">
        <div class="label">Daily</div>
        <div class="value green" id="daily">$0</div>
    </div>
    <div class="stat">
        <div class="label">Drawdown</div>
        <div class="value red" id="dd">$0</div>
    </div>
</div>

<div id="accounts"></div>

<!-- DETAIL -->
<div id="detail" class="hidden">

<div class="card">
    <h3 id="name"></h3>

    <input id="balance" oninput="updateAccount()">

    <div class="card">
        <div class="small">Multiplier</div>
        <div class="big green" id="mult"></div>
    </div>

    <div class="card">
        <div class="small">Daily Profit</div>
        <div id="dailyp"></div>
    </div>

    <div class="card">
        <div class="small">Account Drawdown</div>
        <div class="big red" id="accdd"></div>
    </div>

    <!-- TRADE LOGGER -->
    <div class="card">
        <div class="big">📒 Trade Logger</div>

        <select id="type">
            <option value="win">Win</option>
            <option value="loss">Loss</option>
        </select>

        <input id="amount" placeholder="Profit / Loss amount">

        <button onclick="addTrade()">Add Trade</button>

        <div class="card">
            <div class="small">Account P/L</div>
            <div class="big" id="pl">$0</div>
        </div>

        <div id="trades"></div>
    </div>

    <button onclick="back()">Back</button>
</div>

</div>

<script>

/* =========================
   STORAGE
========================= */

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let trades = JSON.parse(localStorage.getItem("trades") || "{}");

let current = null;

/* =========================
   SAFE NUM
========================= */

function num(v){
    v = Number(v);
    return isNaN(v) ? 0 : v;
}

function mult(b){
    b = num(b);
    if (b < 90000) return b / 30000;
    if (b < 140000) return 3;
    if (b < 160000) return 3.5;
    if (b < 200000) return 4;
    return 5;
}

function daily(b){
    return mult(b) * 800;
}

function dd(b){
    return b * 0.4;
}

/* =========================
   RENDER ACCOUNTS
========================= */

function render(){

    let el = document.getElementById("accounts");
    el.innerHTML = "";

    let total=0,d=0,draw=0;

    accounts.forEach((a,i)=>{

        let b=num(a.balance);

        total+=b;
        d+=daily(b);
        draw+=dd(b);

        el.innerHTML+=`
        <div class="account" onclick="openA(${i})">
            <b>${a.name}</b><br>
            $${b}<br>
            <span class="small green">Daily $${daily(b).toFixed(0)}</span>
        </div>`;
    });

    document.getElementById("total").innerText="$"+total.toFixed(0);
    document.getElementById("daily").innerText="$"+d.toFixed(0);
    document.getElementById("dd").innerText="$"+draw.toFixed(0);
}

/* =========================
   OPEN ACCOUNT
========================= */

function openA(i){
    current=i;
    document.getElementById("detail").classList.remove("hidden");

    let a=accounts[i];

    document.getElementById("name").innerText=a.name;
    document.getElementById("balance").value=num(a.balance);

    renderAccount();
}

/* =========================
   ACCOUNT UPDATE
========================= */

function updateAccount(){

    if(current===null) return;

    let b=num(document.getElementById("balance").value);

    accounts[current].balance=b;
    localStorage.setItem("accounts",JSON.stringify(accounts));

    renderAccount();
    render();
}

/* =========================
   TRADE SYSTEM
========================= */

function addTrade(){

    if(current===null) return;

    let type=document.getElementById("type").value;
    let amount=num(document.getElementById("amount").value);

    if(!trades[current]) trades[current]=[];

    trades[current].push({
        type,
        amount,
        time:new Date().toLocaleString()
    });

    localStorage.setItem("trades",JSON.stringify(trades));

    document.getElementById("amount").value="";

    renderAccount();
}

/* =========================
   ACCOUNT VIEW
========================= */

function renderAccount(){

    let a=accounts[current];
    let b=num(a.balance);

    document.getElementById("mult").innerText=mult(b).toFixed(2)+"x";
    document.getElementById("dailyp").innerText="$"+daily(b).toFixed(0);
    document.getElementById("accdd").innerText="$"+dd(b).toFixed(0);

    // TRADE LOGS
    let list=trades[current]||[];
    let pl=0;

    let html="";

    list.forEach(t=>{

        let val=num(t.amount);
        if(t.type==="loss") val=-val;

        pl+=val;

        html+=`
        <div class="trade">
            ${t.type.toUpperCase()} $${t.amount}
            <br><span class="small">${t.time}</span>
        </div>`;
    });

    document.getElementById("pl").innerText="$"+pl.toFixed(0);
    document.getElementById("trades").innerHTML=html;
}

/* =========================
   BACK
========================= */

function back(){
    document.getElementById("detail").classList.add("hidden");
    current=null;
}

/* INIT */
render();

</script>

</body>
</html>
