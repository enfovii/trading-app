<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: #0b0f14;
    color: #e8ecf3;
    margin: 0;
    padding: 18px;
}

h2 { font-size: 22px; font-weight: 700; }

.card {
    background: #111823;
    border: 1px solid #1e2a3a;
    padding: 16px;
    margin-top: 12px;
    border-radius: 14px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: #1f6feb;
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #263445;
    margin-top: 8px;
    background: #0f1622;
    color: #e8ecf3;
}

.big { font-size: 26px; font-weight: 700; }
.small { font-size: 12px; color: #93a4b8; }

.lime { color: #22c55e; }
.red { color: #ef4444; }

.hidden { display:none; }

.account {
    padding: 14px;
    background: #111823;
    margin-top: 12px;
    border-radius: 14px;
    border: 1px solid #1e2a3a;
    cursor: pointer;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-top: 10px;
}

.day {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #1e2a3a;
    text-align: center;
    font-size: 12px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>📊 Trading Dashboard</h2>

<div class="card">
<button onclick="UI.show('home')">Accounts</button>
<button onclick="UI.show('journal')">Journal</button>
</div>

<!-- HOME -->
<div id="home" class="page">
<div class="card">
<div>Total Portfolio Balance</div>
<div id="totalBalance" class="big">$0</div>

<div class="small">Daily: $<span id="totalDaily">0</span></div>
<div class="small red">Drawdown: $<span id="totalDD">0</span></div>
</div>

<div id="accounts"></div>
</div>

<!-- DETAIL -->
<div id="detail" class="page hidden">
<div class="card">
<h3 id="accName"></h3>

<input id="editBalance" oninput="App.accounts.update()">

<div class="card"><div>Multiplier</div><div id="mult" class="big lime"></div></div>
<div class="card"><div>Daily Profit</div><div id="daily"></div></div>
<div class="card"><div>Weekly Profit</div><div id="weekly"></div></div>
<div class="card"><div>Monthly Profit</div><div id="monthly"></div></div>
<div class="card"><div>Drawdown</div><div id="dd" class="big red"></div></div>

<button onclick="UI.show('home')">Back</button>
</div>

<!-- JOURNAL -->
<div id="journal" class="page hidden">

<div class="card">
<div class="big" id="monthLabel"></div>

<button onclick="App.journal.changeMonth(-1)">⬅ Prev</button>
<button onclick="App.journal.changeMonth(1)">Next ➡</button>

<div class="card">
<div>Monthly P/L</div>
<div class="big lime" id="monthlyPL">$0</div>
</div>

<div id="calendar" class="calendar-grid"></div>
</div>

<div class="card">
<div id="selectedDay">Select a day</div>
<input id="profitInput" placeholder="Enter profit">
<button onclick="App.journal.save()">Save</button>
</div>

</div>

<script>

/* =========================
   CORE APP NAMESPACE (ISOLATION LAYER)
========================= */

const App = {};

/* =========================
   SAFE STORAGE LAYER
========================= */

App.store = {
    get(key, fallback){
        try {
            return JSON.parse(localStorage.getItem(key)) ?? fallback;
        } catch {
            return fallback;
        }
    },
    set(key, value){
        localStorage.setItem(key, JSON.stringify(value));
    }
};

/* =========================
   LOGIC LAYER (NO UI)
========================= */

App.logic = {
    multiplier(b){
        if (b < 90000) return b / 30000;
        if (b < 140000) return 3;
        if (b < 160000) return 3.5;
        if (b < 200000) return 4;
        return 5;
    },
    drawdown(b){ return b * 0.4; },
    daily(b){ return this.multiplier(b) * 800; }
};

/* =========================
   ACCOUNTS MODULE
========================= */

App.accounts = {
    data: App.store.get("accounts", []),
    current: null,

    render(){

        let el = document.getElementById("accounts");
        el.innerHTML = "";

        let total=0, daily=0, dd=0;

        this.data.forEach((a,i)=>{

            let b=a.balance;

            total+=b;
            daily+=App.logic.daily(b);
            dd+=App.logic.drawdown(b);

            el.innerHTML+=`
            <div class="account" onclick="App.accounts.open(${i})">
                <b>${a.name}</b><br>
                <span class="small">$${b}</span><br>
                <span class="small lime">Daily $${App.logic.daily(b).toFixed(0)}</span>
            </div>`;
        });

        document.getElementById("totalBalance").innerText="$"+total;
        document.getElementById("totalDaily").innerText=daily.toFixed(0);
        document.getElementById("totalDD").innerText=dd.toFixed(0);
    },

    open(i){
        this.current=i;
        UI.show('detail');

        let a=this.data[i];

        document.getElementById("accName").innerText=a.name;
        document.getElementById("editBalance").value=a.balance;

        this.update();
    },

    update(){
        let b=parseFloat(document.getElementById("editBalance").value)||0;

        this.data[this.current].balance=b;
        App.store.set("accounts",this.data);

        let m=App.logic.multiplier(b);
        let d=App.logic.daily(b);

        document.getElementById("mult").innerText=m.toFixed(2)+"x";
        document.getElementById("daily").innerText="$"+d.toFixed(0);
        document.getElementById("weekly").innerText="$"+(d*7).toFixed(0);
        document.getElementById("monthly").innerText="$"+(d*30).toFixed(0);
        document.getElementById("dd").innerText="$"+App.logic.drawdown(b).toFixed(0);
    }
};

/* =========================
   JOURNAL MODULE (ISOLATED)
========================= */

App.journal = {
    data: App.store.get("journal", {}),
    date: new Date(),
    selected:null,

    save(){
        App.store.set("journal",this.data);
        this.render();
    },

    changeMonth(d){
        this.date.setMonth(this.date.getMonth()+d);
        this.render();
    },

    render(){

        let y=this.date.getFullYear();
        let m=this.date.getMonth();

        document.getElementById("monthLabel").innerText=
            this.date.toLocaleString('default',{month:'long',year:'numeric'});

        let html="";
        let total=0;

        for(let i=1;i<=31;i++){

            let date=new Date(y,m,i);
            if(date.getMonth()!=m) break;

            let key=`${y}-${m+1}-${i}`;
            let val=Number(this.data[key]||0);

            total+=val;

            html+=`
            <div class="day"
                 onclick="App.journal.select('${key}')"
                 style="background:rgba(34,197,94,${Math.min(val/500,0.8)})">
                ${i}<br><span class="small">$${val}</span>
            </div>`;
        }

        document.getElementById("calendar").innerHTML=html;
        document.getElementById("monthlyPL").innerText="$"+total.toFixed(2);
    },

    select(k){
        this.selected=k;
        document.getElementById("selectedDay").innerText=k;
        document.getElementById("profitInput").value=this.data[k]||0;
    },

    saveDay(){
        if(!this.selected) return;

        this.data[this.selected]=Number(document.getElementById("profitInput").value)||0;
        this.save();
    }
};

/* =========================
   UI LAYER ONLY
========================= */

const UI = {
    show(page){

        document.querySelectorAll(".page")
            .forEach(p=>p.classList.add("hidden"));

        document.getElementById(page).classList.remove("hidden");

        if(page==="home") App.accounts.render();
        if(page==="journal") App.journal.render();
    }
};

/* =========================
   BOOT (SAFE ENTRY POINT)
========================= */

App.accounts.render();

</script>

</body>
</html>
