<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pro Trading Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    margin: 0;
    padding: 14px;
    padding-bottom: 140px;
    color: #eaf1ff;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    -webkit-text-size-adjust: 100%;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 15% 20%, rgba(0,140,255,0.20), transparent 45%),
        radial-gradient(circle at 85% 25%, rgba(80,180,255,0.12), transparent 50%),
        radial-gradient(circle at 50% 90%, rgba(0,90,255,0.10), transparent 55%),
        #050913;
    z-index: -1;
}

.title {
    display: flex;
    justify-content: center;
    margin: 12px 0 16px;
}

h2 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    text-align: center;
}

.page { display:none; }
.active { display:block; }

.topbar {
    display:flex;
    flex-direction:column;
    gap:12px;
}

.portfolioBox {
    background: linear-gradient(145deg, rgba(20,30,50,0.75), rgba(10,15,30,0.55));
    border: 1px solid rgba(120,170,255,0.25);
    backdrop-filter: blur(16px);
    padding: 18px;
    border-radius: 18px;
    text-align: center;
}

.statsRow {
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:10px;
}

.stat {
    background: rgba(20,30,50,0.5);
    border: 1px solid rgba(120,170,255,0.18);
    padding: 12px;
    border-radius: 16px;
    text-align: center;
}

.small { font-size:11px; color:#93a4b8; }
.big { font-size:20px; font-weight:700; }

.card {
    background: rgba(20,30,50,0.5);
    border: 1px solid rgba(120,170,255,0.18);
    padding: 14px;
    margin-top: 10px;
    border-radius: 16px;
}

.account {
    padding: 14px;
    margin-top: 10px;
    border-radius: 16px;
    background: rgba(20,30,50,0.5);
    border: 1px solid rgba(120,170,255,0.18);
}

.green { color:#2ee59d; }
.red { color:#ff5c7a; }

input {
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid rgba(120,170,255,0.25);
    background: rgba(8,12,25,0.65);
    color:white;
    font-size:18px;
}

/* ================= KEYPAD ================= */

#keypad {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10,15,30,0.97);
    border-top: 1px solid rgba(120,170,255,0.2);
    display: none;
    padding: 10px;
    z-index: 9999;
}

.keygrid {
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:8px;
}

.key {
    padding:18px;
    text-align:center;
    background: rgba(255,255,255,0.06);
    border-radius:10px;
    font-size:18px;
    user-select:none;
}

.key:active { background: rgba(255,255,255,0.15); }

.key.action { background: rgba(46,229,157,0.15); }
.key.danger { background: rgba(255,92,122,0.15); }

button {
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1f6feb;
    color:white;
    font-weight:600;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="title"><h2>Pro Trading Dashboard</h2></div>

<div id="home" class="page active">

<div class="topbar">

    <div class="portfolioBox" onclick="openPortfolio()">
        <div class="small">Portfolio</div>
        <div class="big" id="total">$0</div>
    </div>

    <div class="statsRow">
        <div class="stat"><div class="small">Daily</div><div class="big green" id="daily">$0</div></div>
        <div class="stat"><div class="small">Weekly</div><div class="big green" id="weeklyHome">$0</div></div>
        <div class="stat"><div class="small">Monthly</div><div class="big green" id="monthlyHome">$0</div></div>
    </div>

</div>

<div id="accounts"></div>
</div>

<div id="account" class="page">
<div class="card">

    <h3 id="name"></h3>

    <!-- keypad input -->
    <input id="balance" readonly onclick="openKeypad()">

    <div class="card"><div class="small">Multiplier</div><div class="big green" id="mult"></div></div>
    <div class="card"><div class="small">Daily Profit</div><div id="dailyP"></div></div>
    <div class="card"><div class="small">Weekly</div><div id="weekly"></div></div>
    <div class="card"><div class="small">Monthly</div><div id="monthly"></div></div>
    <div class="card"><div class="small">Drawdown</div><div class="big red" id="accdd"></div></div>

    <button onclick="back()">Back</button>

</div>
</div>

<!-- KEYPAD -->
<div id="keypad">
    <div class="keygrid">

        <div class="key" onclick="press('1')">1</div>
        <div class="key" onclick="press('2')">2</div>
        <div class="key" onclick="press('3')">3</div>

        <div class="key" onclick="press('4')">4</div>
        <div class="key" onclick="press('5')">5</div>
        <div class="key" onclick="press('6')">6</div>

        <div class="key" onclick="press('7')">7</div>
        <div class="key" onclick="press('8')">8</div>
        <div class="key" onclick="press('9')">9</div>

        <div class="key danger" onclick="backspace()">⌫</div>
        <div class="key" onclick="press('0')">0</div>
        <div class="key" onclick="press('.')">.</div>

        <div class="key danger" onclick="clearAll()">C</div>
        <div class="key action" onclick="done()">✓</div>
        <div class="key" style="opacity:0"></div>

    </div>
</div>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let current = null;
let activeInput = null;

/* ===== ORIGINAL LOGIC (UNCHANGED) ===== */

function num(v){
    if(!v) return 0;
    v = v.toString().toLowerCase().replace(/,/g,'');
    if(v.includes("k")) return parseFloat(v)*1000;
    if(v.includes("m")) return parseFloat(v)*1000000;
    return isNaN(Number(v)) ? 0 : Number(v);
}

function money(v){ return "$" + Number(v).toLocaleString(); }

function tier(b){
    if (b < 90000) return 3;
    if (b < 140000) return 3;
    if (b < 160000) return 3.5;
    if (b < 180000) return 4;
    if (b < 200000) return 4.5;
    let steps = Math.floor((b - 200000) / 20000);
    return 5 + (steps * 0.5);
}

function mult(b){ return tier(b); }
function daily(b){ return mult(b)*800; }
function dd(b){ return b*0.4; }

function show(page){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
}

function openAccount(i){
    current=i;
    let a=accounts[i];
    document.getElementById("name").innerText=a.name;
    document.getElementById("balance").value=num(a.balance);
    show("account");
    updateAccount();
}

function updateAccount(){
    if(current===null) return;

    let b=num(document.getElementById("balance").value);

    accounts[current].balance=b;
    localStorage.setItem("accounts",JSON.stringify(accounts));

    document.getElementById("mult").innerText=mult(b).toFixed(2)+"x";
    document.getElementById("dailyP").innerText=money(daily(b));
    document.getElementById("weekly").innerText=money(daily(b)*5);
    document.getElementById("monthly").innerText=money(daily(b)*22);
    document.getElementById("accdd").innerText=money(dd(b));
}

/* ===== KEYPAD (ADDED ONLY) ===== */

function openKeypad(){
    activeInput = document.getElementById("balance");
    document.getElementById("keypad").style.display="block";
}

function press(v){
    if(!activeInput) return;
    activeInput.value += v;
    updateAccount();
}

function backspace(){
    if(!activeInput) return;
    activeInput.value = activeInput.value.slice(0,-1);
    updateAccount();
}

function clearAll(){
    if(!activeInput) return;
    activeInput.value = "";
    updateAccount();
}

function done(){
    document.getElementById("keypad").style.display="none";
    activeInput=null;
}

/* NAV */

function back(){
    current=null;
    show("home");
    document.getElementById("keypad").style.display="none";
}

window.onload=function(){
    show("home");
};

</script>

</body>
</html>
