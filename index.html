<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Accounts</title>

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    margin: 0;
    padding: 20px;
}

.card {
    background: #1c1c1c;
    padding: 16px;
    margin-top: 12px;
    border-radius: 10px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #333;
    color: white;
    border: none;
    border-radius: 8px;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    margin-top: 8px;
}

.big {
    font-size: 22px;
    font-weight: bold;
}

.lime { color: lime; }
.red { color: red; }

.small {
    font-size: 13px;
    color: #aaa;
    margin-top: 4px;
    display: block;
}

.hidden { display: none; }

.account {
    padding: 12px;
    background: #222;
    margin-top: 10px;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>📊 Trading Dashboard</h2>

<div id="home">

<div class="card">
<button onclick="showAdd()">➕ Add New Account</button>
</div>

<div id="accounts"></div>

<div class="card">
<div>Total Portfolio Balance</div>
<div id="totalBalance" class="big lime">£0</div>

<div class="small">Portfolio Daily Profit: £<span id="portfolioDaily">0</span></div>
<div class="small">Max Portfolio Drawdown (40%): £<span id="portfolioDD">0</span></div>
</div>

</div>

<!-- ADD -->
<div id="addScreen" class="hidden">
<div class="card">
<h3>Add Account</h3>
<input id="name" placeholder="Account name">
<input id="balance" placeholder="Balance (e.g. 20k)">
<button onclick="addAccount()">Create</button>
<button onclick="back()">Back</button>
</div>
</div>

<!-- DETAIL -->
<div id="detail" class="hidden">
<div class="card">
<h3 id="accName"></h3>

<input id="editBalance" oninput="updateAccount()">

<div class="card">
<div>Multiplier</div>
<div id="mult" class="big lime">0x</div>
</div>

<div class="card">
<div>Daily Profit</div>
<div id="daily" class="big lime">£0</div>
</div>

<div class="card">
<div>Weekly Profit</div>
<div id="weekly" class="big lime">£0</div>
</div>

<div class="card">
<div>Monthly Profit</div>
<div id="monthly" class="big lime">£0</div>
</div>

<div class="card">
<div>Max Drawdown (40%)</div>
<div id="dd" class="big red">£0</div>
</div>

<button onclick="deleteAccount()">Delete Account</button>
<button onclick="back()">Back</button>
</div>
</div>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let currentIndex = null;

/* -------------------------
   SETTINGS
--------------------------*/
const MIN_PER_X = 800;
const MAX_PER_X = 1000;
const DD_RATE = 0.40;

/* -------------------------
   SAVE
--------------------------*/
function save() {
    localStorage.setItem("accounts", JSON.stringify(accounts));
}

/* -------------------------
   MULTIPLIER
--------------------------*/
function getMultiplier(b) {
    if (b <= 90000) return b / 30000;
    if (b <= 140000) return 3 + ((b - 90000) / 100000);
    if (b <= 160000) return 3.5 + ((b - 140000) / 20000) * 0.5;
    if (b <= 200000) return 4 + ((b - 160000) / 40000);
    return 5;
}

/* -------------------------
   PROJECTIONS
--------------------------*/
function getProfit(mult) {
    return {
        dailyMin: mult * MIN_PER_X,
        dailyMax: mult * MAX_PER_X
    };
}

/* -------------------------
   DRAW DOWN
--------------------------*/
function getDD(balance) {
    return balance * DD_RATE;
}

/* -------------------------
   RENDER HOME
--------------------------*/
function renderHome() {

    document.getElementById("home").classList.remove("hidden");
    document.getElementById("addScreen").classList.add("hidden");
    document.getElementById("detail").classList.add("hidden");

    let container = document.getElementById("accounts");
    container.innerHTML = "";

    let totalBalance = 0;
    let portfolioDaily = 0;
    let portfolioDD = 0;

    accounts.forEach((a, i) => {

        let b = a.balance;
        let mult = getMultiplier(b);
        let profit = getProfit(mult);
        let dd = getDD(b);

        totalBalance += b;
        portfolioDaily += profit.dailyMin;
        portfolioDD += dd;

        container.innerHTML += `
            <div class="account" onclick="openAccount(${i})">
                <b>${a.name}</b><br>
                £${b.toLocaleString()}<br>
                <span class="small">${mult.toFixed(2)}x | £${profit.dailyMin.toFixed(0)}+/day</span>
            </div>
        `;
    });

    document.getElementById("totalBalance").innerText = "£" + totalBalance.toLocaleString();
    document.getElementById("portfolioDaily").innerText = portfolioDaily.toFixed(0);
    document.getElementById("portfolioDD").innerText = portfolioDD.toFixed(0);
}

/* -------------------------
   ADD
--------------------------*/
function showAdd() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("addScreen").classList.remove("hidden");
}

function addAccount() {

    let name = document.getElementById("name").value;
    let input = document.getElementById("balance").value.toLowerCase().trim();

    let b;

    if (input.includes("k")) {
        b = parseFloat(input.replace("k", "")) * 1000;
    } else {
        b = parseFloat(input);
    }

    accounts.push({ name, balance: b });

    save();
    renderHome();
}

/* -------------------------
   OPEN ACCOUNT
--------------------------*/
function openAccount(i) {
    currentIndex = i;

    document.getElementById("home").classList.add("hidden");
    document.getElementById("detail").classList.remove("hidden");

    let acc = accounts[i];

    document.getElementById("accName").innerText = acc.name;
    document.getElementById("editBalance").value = acc.balance;

    updateAccount();
}

/* -------------------------
   UPDATE DETAIL
--------------------------*/
function updateAccount() {

    let b = parseFloat(document.getElementById("editBalance").value);
    accounts[currentIndex].balance = b;

    save();

    let mult = getMultiplier(b);
    let profit = getProfit(mult);
    let dd = getDD(b);

    document.getElementById("mult").innerText = mult.toFixed(2) + "x";
    document.getElementById("daily").innerText = "£" + profit.dailyMin.toFixed(0);
    document.getElementById("weekly").innerText = "£" + (profit.dailyMin * 7).toFixed(0);
    document.getElementById("monthly").innerText = "£" + (profit.dailyMin * 30).toFixed(0);
    document.getElementById("dd").innerText = "£" + dd.toFixed(0);
}

/* -------------------------
   DELETE
--------------------------*/
function deleteAccount() {
    accounts.splice(currentIndex, 1);
    save();
    renderHome();
}

/* -------------------------
   BACK
--------------------------*/
function back() {
    renderHome();
}

/* INIT */
renderHome();

</script>

</body>
</html>
