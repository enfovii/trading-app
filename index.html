<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pro Trading Dashboard">

<title>Pro Trading Dashboard</title>

<style>

* {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}
:root {
    --bg: #050913;

    --card: rgba(18, 28, 48, 0.70);
    --card2: rgba(10, 14, 28, 0.55);

    --primary: #4da3ff;
    --accent: #38e6b0;

    --profit: #2ee59d;
    --loss: #ff5c7a;

    --text: #eaf1ff;
    --muted: #8ea2bb;

    --border: rgba(120, 170, 255, 0.14);
}
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    margin: 0;
    padding: 14px;
    padding-bottom: 240px;
    color: #eaf1ff;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    -webkit-text-size-adjust: 100%;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 15% 20%, rgba(77,163,255,0.18), transparent 45%),
        radial-gradient(circle at 85% 25%, rgba(56,230,176,0.10), transparent 50%),
        radial-gradient(circle at 50% 90%, rgba(77,163,255,0.08), transparent 55%),
        var(--bg);
    z-index: -1;
}
body {
    color: var(--text);
}

.small {
    color: var(--muted);
}

.green {
    color: var(--profit);
}

.red {
    color: var(--loss);
}
.title {
    display: flex;
    justify-content: center;
    margin: 12px 0 16px;
}

h2 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    text-align: center;
    letter-spacing: 0.5px;
}

.page {
    display: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s ease, transform 0.2s ease;
}

.page.active {
    display: block;
    opacity: 1;
    transform: translateY(0);
}
