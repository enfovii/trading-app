<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: #0b0f14;
    color: #e8ecf3;
    margin: 0;
    padding: 18px;
}

/* HEADER TEXT */
h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    color: #e8ecf3;
}

/* CARDS */
.card {
    background: #111823;
    border: 1px solid #1e2a3a;
    padding: 16px;
    margin-top: 12px;
    border-radius: 14px;
}

/* BUTTONS */
button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: #1f6feb;
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
}

button:hover {
    background: #2b7cff;
}

/* INPUT */
input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #263445;
    margin-top: 8px;
    background: #0f1622;
    color: #e8ecf3;
    outline: none;
}

/* TEXT STYLES */
.big {
    font-size: 26px;
    font-weight: 700;
}

.small {
    font-size: 12px;
    color: #93a4b8;
}

.lime {
    color: #22c55e;
}

.red {
    color: #ef4444;
}

.hidden {
    display: none;
}

/* ACCOUNT CARDS */
.account {
    padding: 14px;
    background: #111823;
    margin-top: 12px;
    border-radius: 14px;
    border: 1px solid #1e2a3a;
    cursor: pointer;
    transition: 0.15s ease;
}

.account:hover {
    border-color: #2a3b52;
    transform: translateY(-1px);
}

/* TOP SUMMARY */
.summary {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
    font-size: 13px;
    color: #93a4b8;
}

</style>
</head>

<body>

<h2>Trading Dashboard</h2>

<!-- HOME -->
<div id="home">

<div class="card">
<div>Total Portfolio Balance</div>
<div id="totalBalance" class="big">$0</div>

<div class="summary">
<div>Daily Profit: <span class="lime">$<span id="totalDaily">0</span></span></div>
<div>Weekly Profit: <span class="lime">$<span id="totalWeekly">0</span></span></div>
<div>Max Drawdown: <span class="red">$<span id="totalDD">0</span></span></div>
</div>
</div>

<div id="accounts"></div>

</div>

<!-- DETAIL -->
<div id="detail" class="hidden">

<div class="card">
<h3 id="accName"></h3>

<input id="editBalance" oninput="updateAccount()">

<div class="card">
<div>Multiplier</div>
<div id="mult" class="big lime">0x</div>
</div>

<div class="card">
<div>Daily Profit</div>
<div id="daily"></div>
</div>

<div class="card">
<div>Weekly Profit</div>
<div id="weekly"></div>
</div>

<div class="card">
<div>Monthly Profit</div>
<div id="monthly"></div>
</div>

<div class="card">
<div>Next Tier</div>
<div id="nextTier"></div>
</div>

<div class="card">
<div>Drawdown</div>
<div id="dd" class="big red"></div>
</div>

<button onclick="back()">Back</button>

</div>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let currentIndex = null;

/* SAVE */
function save(){
    localStorage.setItem("accounts", JSON.stringify(accounts));
}

/* HOME */
function renderHome(){

    let container = document.getElementById("accounts");
    container.innerHTML = "";

    let total = 0;
    let totalDaily = 0;
    let totalWeekly = 0;
    let totalDD = 0;

    accounts.forEach((a,i)=>{

        let b = a.balance;

        let mult;
        if (b < 90000) mult = b / 30000;
        else if (b < 140000) mult = 3;
        else if (b < 160000) mult = 3.5;
        else if (b < 200000) mult = 4;
        else mult = 5;

        let dd = b * 0.4;

        let daily = mult * 800;
        let weekly = daily * 7;

        total += b;
        totalDaily += daily;
        totalWeekly += weekly;
        totalDD += dd;

        container.innerHTML += `
            <div class="account" onclick="openAccount(${i})">
                <b>${a.name}</b><br>
                <span class="small">$${b.toLocaleString()}</span><br>
                <span class="small">${mult.toFixed(2)}x</span><br>
                <span class="small">Daily $${daily.toFixed(0)} • Weekly $${weekly.toFixed(0)}</span>
            </div>
        `;
    });

    document.getElementById("totalBalance").innerText = "$" + total.toLocaleString();
    document.getElementById("totalDaily").innerText = totalDaily.toFixed(0);
    document.getElementById("totalWeekly").innerText = totalWeekly.toFixed(0);
    document.getElementById("totalDD").innerText = totalDD.toFixed(0);
}

/* DETAIL */
function openAccount(i){
    currentIndex = i;

    document.getElementById("home").classList.add("hidden");
    document.getElementById("detail").classList.remove("hidden");

    let acc = accounts[i];

    document.getElementById("accName").innerText = acc.name;
    document.getElementById("editBalance").value = acc.balance;

    updateAccount();
}

function updateAccount(){

    let b = parseFloat(document.getElementById("editBalance").value);
    accounts[currentIndex].balance = b;

    save();

    let mult;
    if (b < 90000) mult = b / 30000;
    else if (b < 140000) mult = 3;
    else if (b < 160000) mult = 3.5;
    else if (b < 200000) mult = 4;
    else mult = 5;

    let daily = mult * 800;

    document.getElementById("mult").innerText = mult.toFixed(2) + "x";
    document.getElementById("daily").innerText = "$" + daily.toFixed(0);
    document.getElementById("weekly").innerText = "$" + (daily*7).toFixed(0);
    document.getElementById("monthly").innerText = "$" + (daily*30).toFixed(0);
    document.getElementById("nextTier").innerText = getNextTier(b);
    document.getElementById("dd").innerText = "$" + (b * 0.4).toFixed(0);
}

/* NEXT TIER */
function getNextTier(b){

    if (b < 90000) return "$90,000";
    if (b < 140000) return "$140,000";
    if (b < 160000) return "$160,000";
    if (b < 200000) return "$200,000";

    let steps = Math.floor((b - 200000) / 20000) + 1;
    let next = 200000 + (steps * 20000);

    return "$" + next.toLocaleString();
}

/* BACK */
function back(){
    document.getElementById("detail").classList.add("hidden");
    document.getElementById("home").classList.remove("hidden");
}

/* INIT */
renderHome();

</script>

</body>
</html>
