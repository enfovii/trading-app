<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: #0b0f14;
    color: #e8ecf3;
    margin: 0;
    padding: 18px;
}

h2 { font-size: 22px; font-weight: 700; }

.card {
    background: #111823;
    border: 1px solid #1e2a3a;
    padding: 16px;
    margin-top: 12px;
    border-radius: 14px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: #1f6feb;
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #263445;
    margin-top: 8px;
    background: #0f1622;
    color: #e8ecf3;
}

.big { font-size: 26px; font-weight: 700; }
.small { font-size: 12px; color: #93a4b8; }

.lime { color: #22c55e; }
.red { color: #ef4444; }

.hidden { display:none; }

.account {
    padding: 14px;
    background: #111823;
    margin-top: 12px;
    border-radius: 14px;
    border: 1px solid #1e2a3a;
    cursor: pointer;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-top: 10px;
}

.day {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #1e2a3a;
    text-align: center;
    font-size: 12px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>📊 Trading Dashboard</h2>

<div class="card">
<button onclick="show('home')">Accounts</button>
<button onclick="show('journal')">Journal</button>
</div>

<!-- HOME -->
<div id="home">

<div class="card">
<div>Total Portfolio Balance</div>
<div id="totalBalance" class="big">$0</div>
<div class="small">Daily: $<span id="totalDaily">0</span></div>
<div class="small red">Drawdown: $<span id="totalDD">0</span></div>
</div>

<div id="accounts"></div>
</div>

<!-- DETAIL -->
<div id="detail" class="hidden">

<div class="card">
<h3 id="accName"></h3>

<input id="editBalance" oninput="updateAccount()">

<div class="card"><div>Multiplier</div><div id="mult" class="big lime"></div></div>
<div class="card"><div>Daily Profit</div><div id="daily"></div></div>
<div class="card"><div>Weekly Profit</div><div id="weekly"></div></div>
<div class="card"><div>Monthly Profit</div><div id="monthly"></div></div>
<div class="card"><div>Drawdown</div><div id="dd" class="big red"></div></div>

<button onclick="show('home')">Back</button>
</div>

<!-- JOURNAL -->
<div id="journal" class="hidden">

<div class="card">
<div class="big" id="monthLabel"></div>

<button onclick="changeMonth(-1)">⬅ Prev</button>
<button onclick="changeMonth(1)">Next ➡</button>

<div class="card">
<div>Monthly P/L</div>
<div class="big lime" id="monthlyPL">$0</div>
</div>

<div id="calendar" class="calendar-grid"></div>
</div>

<div class="card">
<div id="selectedDay">Select a day</div>
<input id="profitInput" placeholder="Enter profit">
<button onclick="saveDay()">Save</button>
</div>

</div>

<script>

/* =========================
   SAFE CORE (FIXED VERSION)
========================= */

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let journal = JSON.parse(localStorage.getItem("journal") || "{}");

let currentIndex = null;
let selectedDate = null;
let viewDate = new Date();

/* SAFE NUMBER FUNCTION (CRITICAL FIX) */
function num(v){
    v = Number(v);
    return isNaN(v) ? 0 : v;
}

/* LOGIC */
function getMultiplier(b){
    b = num(b);
    if (b < 90000) return b / 30000;
    if (b < 140000) return 3;
    if (b < 160000) return 3.5;
    if (b < 200000) return 4;
    return 5;
}

/* =========================
   NAV
========================= */

function show(page){
    document.getElementById("home").classList.add("hidden");
    document.getElementById("detail").classList.add("hidden");
    document.getElementById("journal").classList.add("hidden");

    document.getElementById(page).classList.remove("hidden");

    if(page === "home") renderHome();
    if(page === "journal") renderJournal();
}

/* =========================
   HOME
========================= */

function renderHome(){

    let container = document.getElementById("accounts");
    container.innerHTML = "";

    let total = 0;
    let totalDaily = 0;
    let totalDD = 0;

    accounts.forEach((a,i)=>{

        let b = num(a.balance);
        let m = getMultiplier(b);
        let d = m * 800;
        let dd = b * 0.4;

        total += b;
        totalDaily += d;
        totalDD += dd;

        container.innerHTML += `
        <div class="account" onclick="openAccount(${i})">
            <b>${a.name}</b><br>
            <span class="small">$${b}</span><br>
            <span class="small lime">Daily $${d.toFixed(0)}</span>
        </div>`;
    });

    document.getElementById("totalBalance").innerText = "$" + total.toFixed(0);
    document.getElementById("totalDaily").innerText = totalDaily.toFixed(0);
    document.getElementById("totalDD").innerText = totalDD.toFixed(0);
}

/* =========================
   ACCOUNT
========================= */

function openAccount(i){
    currentIndex = i;
    show('detail');

    let a = accounts[i];

    document.getElementById("accName").innerText = a.name;
    document.getElementById("editBalance").value = num(a.balance);

    updateAccount();
}

function updateAccount(){

    if(currentIndex === null || !accounts[currentIndex]) return;

    let b = num(document.getElementById("editBalance").value);

    accounts[currentIndex].balance = b;
    localStorage.setItem("accounts", JSON.stringify(accounts));

    let m = getMultiplier(b);
    let d = m * 800;

    document.getElementById("mult").innerText = m.toFixed(2) + "x";
    document.getElementById("daily").innerText = "$" + d.toFixed(0);
    document.getElementById("weekly").innerText = "$" + (d*7).toFixed(0);
    document.getElementById("monthly").innerText = "$" + (d*30).toFixed(0);
    document.getElementById("dd").innerText = "$" + (b*0.4).toFixed(0);
}

/* =========================
   JOURNAL (SAFE)
========================= */

function renderJournal(){

    let y = viewDate.getFullYear();
    let m = viewDate.getMonth();

    document.getElementById("monthLabel").innerText =
        viewDate.toLocaleString('default',{month:'long',year:'numeric'});

    let html = "";
    let total = 0;

    for(let d=1; d<=31; d++){

        let date = new Date(y,m,d);
        if(date.getMonth() !== m) break;

        let key = `${y}-${m+1}-${d}`;
        let val = num(journal[key]);

        total += val;

        html += `
        <div class="day"
            onclick="selectDay('${key}')"
            style="background:rgba(34,197,94,${Math.min(val/500,0.8)})">
            ${d}<br>
            <span class="small">$${val.toFixed(0)}</span>
        </div>`;
    }

    document.getElementById("calendar").innerHTML = html;
    document.getElementById("monthlyPL").innerText = "$" + total.toFixed(0);
}

function changeMonth(dir){
    viewDate.setMonth(viewDate.getMonth() + dir);
    renderJournal();
}

function selectDay(k){
    selectedDate = k;
    document.getElementById("selectedDay").innerText = k;
    document.getElementById("profitInput").value = num(journal[k]);
}

function saveDay(){

    if(!selectedDate) return;

    journal[selectedDate] = num(document.getElementById("profitInput").value);
    localStorage.setItem("journal", JSON.stringify(journal));

    renderJournal();
}

/* INIT */
renderHome();

</script>

</body>
</html>
