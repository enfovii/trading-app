<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Pro Trading Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    margin: 0;
    padding: 14px;
    padding-bottom: 90px;
    color: #eaf1ff;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    -webkit-text-size-adjust: 100%;
    touch-action: manipulation;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 15% 20%, rgba(0,140,255,0.20), transparent 45%),
        radial-gradient(circle at 85% 25%, rgba(80,180,255,0.12), transparent 50%),
        radial-gradient(circle at 50% 90%, rgba(0,90,255,0.10), transparent 55%),
        #050913;
    z-index: -1;
}

.title {
    display: flex;
    justify-content: center;
    margin: 12px 0 16px;
}

h2 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    text-align: center;
    letter-spacing: 0.5px;
}

.page { display:none; }
.active { display:block; }

.topbar {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.portfolioBox {
    background: linear-gradient(145deg, rgba(20,30,50,0.75), rgba(10,15,30,0.55));
    border: 1px solid rgba(120,170,255,0.25);
    backdrop-filter: blur(16px);
    padding: 18px;
    border-radius: 18px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
}

.statsRow {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.stat {
    background: linear-gradient(145deg, rgba(20,30,50,0.65), rgba(10,15,30,0.45));
    border: 1px solid rgba(120,170,255,0.18);
    backdrop-filter: blur(14px);
    padding: 12px;
    border-radius: 16px;
    text-align: center;
}

.small { font-size: 11px; color: #93a4b8; }

.big {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.3px;
}

.card {
    background: linear-gradient(145deg, rgba(20,30,50,0.65), rgba(10,15,30,0.45));
    border: 1px solid rgba(120,170,255,0.18);
    backdrop-filter: blur(14px);
    padding: 14px;
    margin-top: 10px;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

.account {
    padding: 14px;
    margin-top: 10px;
    border-radius: 16px;
    background: linear-gradient(145deg, rgba(20,30,50,0.6), rgba(10,15,30,0.4));
    border: 1px solid rgba(120,170,255,0.18);
    scroll-margin-bottom: 120px;
}

.account:active {
    transform: scale(0.99);
}

.green { color: #2ee59d; }
.red { color: #ff5c7a; }

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(120,170,255,0.25);
    margin-top: 8px;
    background: rgba(8,12,25,0.65);
    color: #eaf1ff;
    box-sizing: border-box;
    font-size: 16px;
}

input:focus {
    outline: none;
    border: 1px solid #2ee59d;
    box-shadow: 0 0 12px rgba(46,229,157,0.25);
}

button {
    width: calc(100% - 24px);
    margin-left: 12px;
    margin-right: 12px;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #1f6feb, #144a99);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
    box-shadow: 0 8px 20px rgba(0,120,255,0.25);
    touch-action: manipulation;
}

.addBtn {
    position: fixed;
    bottom: 18px;
    left: 12px;
    right: 12px;
    z-index: 10;
    backdrop-filter: blur(12px);
}

.modal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.65);
    padding: 16px;
    z-index: 20;
}

.modal-content {
    width: 100%;
    max-width: 360px;
    background: rgba(15,20,35,0.9);
    border: 1px solid rgba(120,170,255,0.25);
    backdrop-filter: blur(16px);
    padding: 16px;
    border-radius: 16px;
}

.danger {
    background: #ff5c7a !important;
}
</style>
</head>

<body>

<div class="title">
    <h2>Pro Trading Dashboard</h2>
</div>

<div id="home" class="page active">

<div class="topbar">

    <div class="portfolioBox" onclick="openPortfolio()">
        <div class="small">Portfolio</div>
        <div class="big" id="total">$0</div>
    </div>

    <div class="statsRow">

        <div class="stat">
            <div class="small">Daily</div>
            <div class="big green" id="daily">$0</div>
        </div>

        <div class="stat">
            <div class="small">Weekly</div>
            <div class="big green" id="weeklyHome">$0</div>
        </div>

        <div class="stat">
            <div class="small">Monthly</div>
            <div class="big green" id="monthlyHome">$0</div>
        </div>

    </div>

</div>

<div id="accounts"></div>
</div>

<div id="portfolio" class="page">
<div class="card">
    <h3>Portfolio Overview</h3>

    <div class="card">
        <div class="small">Total Balance</div>
        <div class="big" id="p_total"></div>
    </div>

    <div class="card">
        <div class="small">Daily Profit</div>
        <div class="big green" id="p_daily"></div>
    </div>

    <div class="card">
        <div class="small">Weekly</div>
        <div class="big green" id="p_week"></div>
    </div>

    <div class="card">
        <div class="small">Monthly</div>
        <div class="big green" id="p_month"></div>
    </div>

    <div class="card">
        <div class="small">Drawdown</div>
        <div class="big red" id="p_dd"></div>
    </div>

    <button onclick="backHome()">Back</button>
</div>
</div>

<div id="account" class="page">
<div class="card">
    <h3 id="name"></h3>

    <input id="balance" inputmode="decimal" pattern="[0-9]*"
        oninput="formatBalanceInput(this)"
        onblur="updateAccount()">

    <div class="card">
        <div class="small">Multiplier</div>
        <div class="big green" id="mult"></div>
    </div>

    <div class="card">
        <div class="small">Daily Profit</div>
        <div id="dailyP"></div>
    </div>

    <div class="card">
        <div class="small">Weekly</div>
        <div id="weekly"></div>
    </div>

    <div class="card">
        <div class="small">Monthly</div>
        <div id="monthly"></div>
    </div>

    <div class="card">
        <div class="small">Drawdown</div>
        <div class="big red" id="accdd"></div>
    </div>

    <button onclick="back()">Back</button>
    <button class="danger" onclick="confirmDelete()">Delete Account</button>
</div>
</div>

<button class="addBtn" onclick="openModal()">+ Add Account</button>

<div class="modal" id="modal">
    <div class="modal-content">
        <div class="big">Add Account</div>
        <input id="newName" placeholder="Account name">
        <input id="newBalance" placeholder="Starting balance">
        <button onclick="createAccount()">Create</button>
        <button onclick="closeModal()" style="background:rgba(255,255,255,0.08);">Cancel</button>
    </div>
</div>

<div class="modal" id="deleteModal">
    <div class="modal-content">
        <div class="big">Are you sure?</div>
        <button class="danger" onclick="deleteAccount()">Yes, Delete</button>
        <button onclick="closeDeleteModal()" style="background:rgba(255,255,255,0.08);">Cancel</button>
    </div>
</div>

<script>
let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let current = null;

function num(v){
    if(!v) return 0;
    v = v.toString().toLowerCase().replace(/,/g,'');
    if(v.includes("k")) return parseFloat(v)*1000;
    if(v.includes("m")) return parseFloat(v)*1000000;
    return isNaN(Number(v)) ? 0 : Number(v);
}

function money(v){
    return "$" + Number(v).toLocaleString();
}

function formatBalanceInput(el){
    let raw = el.value.replace(/,/g,'').replace(/[^\d]/g,'');
    if(raw === '') return;
    el.value = Number(raw).toLocaleString('en-US');
}

function updateAccount(){
    if(current===null) return;

    let b = num(document.getElementById("balance").value);

    accounts[current].balance = b;
    localStorage.setItem("accounts",JSON.stringify(accounts));

    document.getElementById("mult").innerText=mult(b).toFixed(2)+"x";
    document.getElementById("dailyP").innerText=money(daily(b));
    document.getElementById("weekly").innerText=money(daily(b)*5);
    document.getElementById("monthly").innerText=money(daily(b)*22);
    document.getElementById("accdd").innerText=money(dd(b));

    render();
}

function tier(b){
    if (b < 90000) return 3;
    if (b < 140000) return 3;
    if (b < 160000) return 3.5;
    if (b < 180000) return 4;
    if (b < 200000) return 4.5;
    let steps = Math.floor((b - 200000) / 20000);
    return 5 + (steps * 0.5);
}

function mult(b){ return tier(b); }
function daily(b){ return mult(b)*800; }
function dd(b){ return b*0.4; }

function show(page){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
    document.querySelector(".addBtn").style.display = (page==="home")?"block":"none";
}

function nextTargetFromBalance(x){
    if (x < 90000) return 90000;
    if (x < 140000) return 140000;
    if (x < 160000) return 160000;
    if (x < 180000) return 180000;
    if (x < 200000) return 200000;
    let steps = Math.floor((x - 200000) / 20000) + 1;
    return 200000 + (steps * 20000);
}

/* ONLY FIXED SECTION: progress bar rendering */
function render(){
    let html="";
    let t=0,d=0;

    accounts.forEach((a,i)=>{
        let b=num(a.balance);
        t+=b;
        d+=daily(b);

        let currentMult = mult(b);
        let nextTarget = nextTargetFromBalance(b);
        let nextMult = mult(nextTarget);
        let needed = Math.max(0, nextTarget - b);

        let tierStart = (b<90000)?0:(b<140000)?90000:(b<160000)?140000:(b<180000)?160000:(b<200000)?180000:200000;

        let progress = Math.min(100, ((b - tierStart) / (nextTarget - tierStart)) * 100);
        let glow = progress >= 90 ? "0 0 18px rgba(46,229,157,0.55)" : "none";

        html += `
        <div class="account" onclick="openAccount(${i})"
            style="display:flex;justify-content:space-between;gap:12px;align-items:center;">

            <div>
                <b>${a.name}</b><br>
                ${money(b)}<br>
                <span class="green">${currentMult.toFixed(2)}x</span><br>
                <span class="small">Daily ${money(daily(b))}</span>
            </div>

            <div style="min-width:140px;text-align:right;">

                <div class="small">Next ${nextMult.toFixed(2)}x</div>
                <div class="small">Need ${money(needed)}</div>

                <div style="
                    width:100%;
                    height:10px;
                    background:rgba(255,255,255,0.06);
                    border-radius:12px;
                    margin-top:8px;
                    overflow:hidden;
                    position:relative;
                ">
                    <div style="
                        width:${progress}%;
                        height:100%;
                        background:linear-gradient(90deg,#1f6feb,#2ee59d);
                        border-radius:12px;
                        transition:width 0.4s ease;
                        box-shadow:${glow};
                        position:relative;
                    ">
                        <div style="
                            position:absolute;
                            right:6px;
                            top:50%;
                            transform:translateY(-50%);
                            font-size:10px;
                            font-weight:700;
                            color:#fff;
                            background:rgba(0,0,0,0.45);
                            padding:2px 6px;
                            border-radius:8px;
                            white-space:nowrap;
                        ">
                            ${progress.toFixed(0)}%
                        </div>
                    </div>
                </div>

                <div style="font-size:11px;color:#93a4b8;margin-top:6px;">
                    ETA: ${(needed / Math.max(daily(b),1)).toFixed(1)} days
                </div>

            </div>
        </div>`;
    });

    document.getElementById("accounts").innerHTML=html;
}
</script>

</body>
</html>
