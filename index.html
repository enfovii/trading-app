<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Accounts</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: radial-gradient(circle at top, #0f1b33, #070b14);
    color: #e6eaf2;
    margin: 0;
    padding: 18px;
}

h2 {
    font-size: 22px;
    font-weight: 800;
}

.card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    padding: 16px;
    margin-top: 12px;
    border-radius: 18px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #2f81f7, #22c55e);
    color: white;
    border: none;
    border-radius: 14px;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    margin-top: 8px;
    background: rgba(255,255,255,0.04);
    color: white;
}

.big { font-size: 26px; font-weight: 800; }
.lime { color: #22c55e; }
.red { color: #ff4d4d; }
.small { font-size: 12px; color: rgba(230,234,242,0.6); }

.hidden { display:none; }

.account {
    padding: 14px;
    background: rgba(255,255,255,0.03);
    margin-top: 12px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
}

/* MINI BAR */
.mini-wrap {
    margin-top: 8px;
    background: rgba(255,255,255,0.08);
    height: 7px;
    border-radius: 999px;
    overflow: hidden;
}

.mini-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #2f81f7, #22c55e);
}

/* MAIN PROGRESS */
.progress-wrap {
    margin-top: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    height: 10px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #2f81f7, #22c55e);
    transition: width 0.5s ease;
}
</style>
</head>

<body>

<h2>📊 Trading Dashboard</h2>

<div id="home">

<div class="card">
<button onclick="showAdd()">➕ Add New Account</button>
</div>

<div id="accounts"></div>

<!-- TOTAL PANEL (RESTORED PROFITS) -->
<div class="card">
<div>Total Portfolio Balance</div>
<div id="totalBalance" class="big lime">$0</div>

<div class="small">Total Daily Profit: $<span id="totalDaily">0</span></div>
<div class="small">Total Weekly Profit: $<span id="totalWeekly">0</span></div>
</div>

</div>

<!-- ADD -->
<div id="addScreen" class="hidden">
<div class="card">
<h3>Add Account</h3>
<input id="name" placeholder="Account name">
<input id="balance" placeholder="Balance (e.g. 20k)">
<button onclick="addAccount()">Create</button>
<button onclick="back()">Back</button>
</div>
</div>

<!-- DETAIL -->
<div id="detail" class="hidden">
<div class="card">
<h3 id="accName"></h3>

<input id="editBalance" oninput="updateAccount()">

<div class="small">Progress to next tier</div>
<div class="small" id="tierLabel">-</div>

<div class="progress-wrap">
    <div id="progressBar" class="progress-bar"></div>
</div>

<div class="card">
<div>Multiplier</div>
<div id="mult" class="big lime">0x</div>
</div>

<div class="card">
<div>Next Locked Milestone</div>
<div id="nextMilestone" class="big">-</div>
</div>

<div class="card">
<div>Daily Profit</div>
<div id="daily" class="big lime">$0</div>
</div>

<div class="card">
<div>Weekly Profit</div>
<div id="weekly" class="big lime">$0</div>
</div>

<div class="card">
<div>Monthly Profit</div>
<div id="monthly" class="big lime">$0</div>
</div>

<div class="card">
<div>Max Drawdown</div>
<div id="dd" class="big red">$0</div>
</div>

<button onclick="deleteAccount()">Delete Account</button>
<button onclick="back()">Back</button>

</div>
</div>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let currentIndex = null;

const MIN_PER_X = 800;
const MAX_PER_X = 1000;
const DD_RATE = 0.40;

/* SAVE */
function save(){
    localStorage.setItem("accounts", JSON.stringify(accounts));
}

/* TIER SYSTEM */
function getTier(b) {
    if (b < 140000) return { mult: 3.5, prev: 90000, next: 140000 };
    if (b < 160000) return { mult: 4, prev: 140000, next: 160000 };
    if (b < 200000) return { mult: 4.5, prev: 160000, next: 200000 };
    if (b < 240000) return { mult: 5, prev: 200000, next: 240000 };
    return { mult: 5, prev: 240000, next: 240000 };
}

function getMultiplier(b) {
    return getTier(b).mult;
}

function getProgress(b) {
    let t = getTier(b);
    if (t.next === t.prev) return 100;

    let p = ((b - t.prev) / (t.next - t.prev)) * 100;
    return Math.max(0, Math.min(100, p));
}

function getNextMilestone(b){
    return "$" + getTier(b).next.toLocaleString();
}

/* PROFIT */
function getProfit(mult){
    return {
        dailyMin: mult * MIN_PER_X,
        dailyMax: mult * MAX_PER_X
    };
}

function getDD(b){
    return b * DD_RATE;
}

/* HOME */
function renderHome(){

    document.getElementById("home").classList.remove("hidden");
    document.getElementById("addScreen").classList.add("hidden");
    document.getElementById("detail").classList.add("hidden");

    let container = document.getElementById("accounts");
    container.innerHTML = "";

    let total = 0;
    let totalDaily = 0;
    let totalWeekly = 0;

    accounts.forEach((a,i)=>{

        let b = a.balance;
        let mult = getMultiplier(b);
        let profit = getProfit(mult);
        let p = getProgress(b);

        total += b;
        totalDaily += profit.dailyMin;
        totalWeekly += profit.dailyMin * 7;

        container.innerHTML += `
            <div class="account" onclick="openAccount(${i})">

                <b>${a.name}</b><br>
                <span class="small">$${b.toLocaleString()}</span><br>

                <span class="small">${mult.toFixed(2)}x • $${profit.dailyMin.toFixed(0)}/day</span>

                <div class="mini-wrap">
                    <div class="mini-bar" style="width:${p}%"></div>
                </div>

                <div class="small">${p.toFixed(0)}% to next tier</div>

            </div>
        `;
    });

    document.getElementById("totalBalance").innerText =
        "$" + total.toLocaleString();

    document.getElementById("totalDaily").innerText =
        totalDaily.toFixed(0);

    document.getElementById("totalWeekly").innerText =
        totalWeekly.toFixed(0);
}

/* ADD */
function showAdd(){
    document.getElementById("home").classList.add("hidden");
    document.getElementById("addScreen").classList.remove("hidden");
}

function addAccount(){

    let name = document.getElementById("name").value;
    let input = document.getElementById("balance").value.toLowerCase();

    let b = input.includes("k")
        ? parseFloat(input.replace("k","")) * 1000
        : parseFloat(input);

    accounts.push({name, balance:b});
    save();
    renderHome();
}

/* OPEN */
function openAccount(i){
    currentIndex = i;

    document.getElementById("home").classList.add("hidden");
    document.getElementById("detail").classList.remove("hidden");

    let acc = accounts[i];

    document.getElementById("accName").innerText = acc.name;
    document.getElementById("editBalance").value = acc.balance;

    updateAccount();
}

/* UPDATE */
function updateAccount(){

    let b = parseFloat(document.getElementById("editBalance").value);
    accounts[currentIndex].balance = b;

    save();

    let mult = getMultiplier(b);
    let profit = getProfit(mult);
    let dd = getDD(b);

    document.getElementById("mult").innerText =
        mult.toFixed(2) + "x";

    document.getElementById("daily").innerText =
        "$" + profit.dailyMin.toFixed(0) + " - $" + profit.dailyMax.toFixed(0);

    document.getElementById("weekly").innerText =
        "$" + (profit.dailyMin * 7).toFixed(0);

    document.getElementById("monthly").innerText =
        "$" + (profit.dailyMin * 30).toFixed(0);

    document.getElementById("dd").innerText =
        "$" + dd.toFixed(0);

    document.getElementById("tierLabel").innerText =
        "Next: " + getNextMilestone(b);

    document.getElementById("nextMilestone").innerText =
        getNextMilestone(b);

    document.getElementById("progressBar").style.width =
        getProgress(b) + "%";
}

/* DELETE */
function deleteAccount(){
    accounts.splice(currentIndex,1);
    save();
    renderHome();
}

/* BACK */
function back(){
    renderHome();
}

renderHome();

</script>

</body>
</html>
