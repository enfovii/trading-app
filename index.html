<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Trading Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    margin: 0;
    padding: 14px;
    color: #e8ecf3;
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
}

/* BACKGROUND */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 20%, rgba(60,120,255,0.18), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(0,180,255,0.10), transparent 45%),
        #070b14;
    z-index: -1;
}

/* TITLE */
.title {
    display: flex;
    justify-content: center;
    margin: 10px 0 14px;
}

h2 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    text-align: center;
}

/* PAGES */
.page { display:none; }
.active { display:block; }

/* 📱 RESPONSIVE TOPBAR (FIX) */
.topbar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
}

/* on small screens stack better */
@media (max-width: 420px) {
    .topbar {
        grid-template-columns: 1fr;
    }
}

/* STAT BOX */
.stat {
    background: rgba(17,24,35,0.55);
    border: 1px solid rgba(120,170,255,0.18);
    backdrop-filter: blur(12px);
    padding: 12px;
    border-radius: 14px;
    text-align: center;
    min-width: 0;
}

.stat .small {
    font-size: 11px;
    color: #93a4b8;
}

.stat .value {
    font-size: 18px;
    font-weight: 700;
}

/* CARDS */
.card {
    background: rgba(17,24,35,0.55);
    border: 1px solid rgba(120,170,255,0.18);
    backdrop-filter: blur(12px);
    padding: 14px;
    margin-top: 10px;
    border-radius: 14px;
}

/* ACCOUNT CARD */
.account {
    padding: 14px;
    margin-top: 10px;
    border-radius: 14px;
    background: rgba(17,24,35,0.55);
    border: 1px solid rgba(120,170,255,0.18);
}

/* TEXT */
.small { font-size: 12px; color: #93a4b8; }
.big { font-size: 24px; font-weight: 700; }

/* COLORS */
.green { color: #2ee59d; }
.red { color: #ff5c7a; }

/* INPUT */
input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(120,170,255,0.25);
    margin-top: 8px;
    background: rgba(10,18,32,0.6);
    color: #e8ecf3;
    box-sizing: border-box;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #1f6feb, #144a99);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
}

/* ADD BUTTON SAFE FOR iPHONE */
.addBtn {
    position: fixed;
    bottom: 16px;
    left: 16px;
    right: 16px;
}

/* MODAL SAFE AREA */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
}

.modal-content {
    width: 100%;
    max-width: 380px;
    background: rgba(17,24,35,0.7);
    border: 1px solid rgba(120,170,255,0.2);
    backdrop-filter: blur(14px);
    padding: 16px;
    border-radius: 14px;
}
</style>
</head>

<body>

<div class="title">
    <h2>Pro Trading Dashboard</h2>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="topbar">
    <div class="stat">
        <div class="small">Portfolio</div>
        <div class="big" id="total">$0</div>
    </div>
    <div class="stat">
        <div class="small">Daily</div>
        <div class="big green" id="daily">$0</div>
    </div>
    <div class="stat">
        <div class="small">Drawdown</div>
        <div class="big red" id="dd">$0</div>
    </div>
</div>

<div id="accounts"></div>

</div>

<!-- ACCOUNT -->
<div id="account" class="page">

<div class="card">
    <h3 id="name"></h3>

    <input id="balance" oninput="updateAccount()">

    <div class="card">
        <div class="small">Multiplier</div>
        <div class="big green" id="mult"></div>
    </div>

    <div class="card">
        <div class="small">Daily Profit</div>
        <div id="dailyP"></div>
    </div>

    <div class="card">
        <div class="small">Weekly</div>
        <div id="weekly"></div>
    </div>

    <div class="card">
        <div class="small">Monthly</div>
        <div id="monthly"></div>
    </div>

    <div class="card">
        <div class="small">Drawdown</div>
        <div class="big red" id="accdd"></div>
    </div>

    <button onclick="back()">Back</button>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">

        <div class="big">Add Account</div>

        <input id="newName" placeholder="Account name">
        <input id="newBalance" placeholder="Starting balance">

        <button onclick="createAccount()">Create</button>
        <button onclick="closeModal()" style="background:rgba(255,255,255,0.08);">Cancel</button>

    </div>
</div>

<!-- ADD BUTTON -->
<button class="addBtn" id="addBtn" onclick="openModal()">+ Add Account</button>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let current = null;

function num(v){
    v = Number(v);
    return isNaN(v) ? 0 : v;
}

function mult(b){
    b = num(b);
    if (b < 90000) return b / 30000;
    if (b < 140000) return 3;
    if (b < 160000) return 3.5;
    if (b < 200000) return 4;
    return 5;
}

function daily(b){ return mult(b) * 800; }
function dd(b){ return b * 0.4; }

/* NAV */
function show(page){

    document.querySelectorAll(".page")
        .forEach(p => p.classList.remove("active"));

    document.getElementById(page).classList.add("active");

    document.getElementById("addBtn").style.display =
        page === "home" ? "block" : "none";
}

/* RENDER */
function render(){

    let el = document.getElementById("accounts");
    el.innerHTML = "";

    let t=0,d=0,draw=0;

    accounts.forEach((a,i)=>{

        let b=num(a.balance);

        t+=b;
        d+=daily(b);
        draw+=dd(b);

        el.innerHTML+=`
        <div class="account" onclick="openAccount(${i})">
            <b>${a.name}</b><br>
            $${b}<br>
            <span class="small green">Daily $${daily(b).toFixed(0)}</span>
        </div>`;
    });

    document.getElementById("total").innerText="$"+t.toFixed(0);
    document.getElementById("daily").innerText="$"+d.toFixed(0);
    document.getElementById("dd").innerText="$"+draw.toFixed(0);
}

/* OPEN */
function openAccount(i){

    current=i;

    let a=accounts[i];

    document.getElementById("name").innerText=a.name;
    document.getElementById("balance").value=num(a.balance);

    show("account");

    updateAccount();
}

/* UPDATE */
function updateAccount(){

    if(current===null) return;

    let b=num(document.getElementById("balance").value);

    accounts[current].balance=b;
    localStorage.setItem("accounts",JSON.stringify(accounts));

    let m=mult(b);
    let d=daily(b);

    document.getElementById("mult").innerText=m.toFixed(2)+"x";
    document.getElementById("dailyP").innerText="$"+d.toFixed(0);
    document.getElementById("weekly").innerText="$"+(d*7).toFixed(0);
    document.getElementById("monthly").innerText="$"+(d*30).toFixed(0);
    document.getElementById("accdd").innerText="$"+dd(b).toFixed(0);

    render();
}

/* BACK */
function back(){
    current=null;
    show("home");
}

/* MODAL */
function openModal(){ document.getElementById("modal").style.display="flex"; }
function closeModal(){ document.getElementById("modal").style.display="none"; }

/* CREATE */
function createAccount(){

    let name=document.getElementById("newName").value.trim();
    let balance=num(document.getElementById("newBalance").value);

    if(!name) return;

    accounts.push({name,balance});

    localStorage.setItem("accounts",JSON.stringify(accounts));

    document.getElementById("newName").value="";
    document.getElementById("newBalance").value="";

    closeModal();
    render();
}

/* INIT */
show("home");
render();

</script>

</body>
</html>
