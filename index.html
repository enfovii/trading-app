<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: radial-gradient(circle at top, #0f1b33, #070b14);
    color: #e6eaf2;
    margin: 0;
    padding: 18px;
}

h2 { font-size: 22px; font-weight: 800; }

.card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    padding: 16px;
    margin-top: 12px;
    border-radius: 18px;
}

/* ================= NAV BAR UPGRADE ================= */

.navBar {
    position: relative;
    display: flex;
    gap: 10px;
    padding: 6px;
}

.navBar button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: transparent;
    color: #e6eaf2;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    z-index: 2;
}

.navIndicator {
    position: absolute;
    bottom: 6px;
    left: 6px;
    width: calc(50% - 6px);
    height: calc(100% - 12px);
    background: rgba(47,129,247,0.25);
    border: 1px solid rgba(47,129,247,0.5);
    border-radius: 12px;
    transition: transform 0.25s ease;
    z-index: 1;
}

.active {
    color: #22c55e;
}

/* ================= END NAV ================= */

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #2f81f7, #22c55e);
    color: white;
    border: none;
    border-radius: 14px;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    margin-top: 8px;
    background: rgba(255,255,255,0.04);
    color: white;
}

.big { font-size: 26px; font-weight: 800; }
.lime { color: #22c55e; }
.small { font-size: 12px; color: rgba(230,234,242,0.6); }

.hidden { display:none; }

.account {
    padding: 14px;
    background: rgba(255,255,255,0.03);
    margin-top: 12px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
}

.dayBox {
    width: 30%;
    display:inline-block;
    margin: 1%;
    padding: 14px;
    border-radius: 12px;
    text-align:center;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>📊 Trading Dashboard</h2>

<div class="card navBar">
<div class="navIndicator" id="navIndicator"></div>
<button onclick="showHome()">🏠 Accounts</button>
<button onclick="showJournal()">📅 Journal</button>
</div>

<!-- HOME -->
<div id="home">

<div class="card">
<div>Total Portfolio Balance</div>
<div id="totalBalance" class="big lime">$0</div>
<div class="small">Total Daily Profit: $<span id="totalDaily">0</span></div>
<div class="small">Total Weekly Profit: $<span id="totalWeekly">0</span></div>
</div>

<div id="accounts"></div>

</div>

<!-- DETAIL -->
<div id="detail" class="hidden">

<div class="card">
<h3 id="accName"></h3>

<input id="editBalance" oninput="updateAccount()">

<div class="card">
<div>Multiplier</div>
<div id="mult" class="big lime">0x</div>
</div>

<div class="card">
<div>Daily Profit</div>
<div id="daily" class="big lime"></div>
</div>

<div class="card">
<div>Weekly Profit</div>
<div id="weekly" class="big lime"></div>
</div>

<div class="card">
<div>Monthly Profit</div>
<div id="monthly" class="big lime"></div>
</div>

<div class="card">
<div>Next Tier</div>
<div id="nextTier" class="big"></div>
</div>

<button onclick="back()">Back</button>

</div>

<!-- JOURNAL -->
<div id="journal" class="hidden">

<div class="card">
<h3>📅 Journal</h3>

<div style="display:flex;justify-content:space-between;">
<button style="width:48%" onclick="changeMonth(-1)">⬅ Prev</button>
<button style="width:48%" onclick="changeMonth(1)">Next ➡</button>
</div>

<div class="big" style="text-align:center;margin-top:10px;" id="monthLabel"></div>

<div class="card">
<div>Monthly P/L</div>
<div id="monthlyPL" class="big lime">$0</div>
</div>

<div id="calendar"></div>
</div>

<div class="card">
<h3>Selected Day</h3>
<div id="selectedDay" class="big">-</div>
<input id="dayProfit" placeholder="Enter profit for day">
<button onclick="saveDay()">Save</button>
</div>

</div>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let journal = JSON.parse(localStorage.getItem("journal") || "{}");

let viewDate = new Date();
let selectedDate = null;
let currentIndex = null;

/* NAV STATE */
let activeTab = "home";

/* SAVE */
function save(){
    localStorage.setItem("accounts", JSON.stringify(accounts));
}

function saveJournal(){
    localStorage.setItem("journal", JSON.stringify(journal));
}

/* NAV ANIMATION */
function updateNav(tab){

    activeTab = tab;

    let indicator = document.getElementById("navIndicator");

    if(tab === "home"){
        indicator.style.transform = "translateX(0%)";
    } else {
        indicator.style.transform = "translateX(100%)";
    }
}

/* NAV */
function showHome(){
    document.getElementById("home").classList.remove("hidden");
    document.getElementById("detail").classList.add("hidden");
    document.getElementById("journal").classList.add("hidden");

    updateNav("home");
    renderHome();
}

function showJournal(){
    document.getElementById("home").classList.add("hidden");
    document.getElementById("detail").classList.add("hidden");
    document.getElementById("journal").classList.remove("hidden");

    updateNav("journal");
    requestAnimationFrame(() => {
        renderCalendar();
    });
}

/* MULTIPLIER */
function getMultiplier(b) {

    if (b < 90000) return b / 30000;
    if (b < 140000) return 3;
    if (b < 160000) return 3.5;
    if (b < 200000) return 4;

    let extra = b - 200000;
    let steps = Math.floor(extra / 20000);

    return 5 + (steps * 0.5);
}

/* NEXT TIER */
function getNextTier(b){

    if (b < 90000) return "$90,000";
    if (b < 140000) return "$140,000";
    if (b < 160000) return "$160,000";
    if (b < 200000) return "$200,000";

    let base = 200000;
    let steps = Math.floor((b - base) / 20000) + 1;
    let next = base + (steps * 20000);

    return "$" + next.toLocaleString();
}

/* HOME */
function renderHome(){

    let container = document.getElementById("accounts");
    container.innerHTML = "";

    let total = 0;
    let totalDaily = 0;
    let totalWeekly = 0;

    accounts.forEach((a,i)=>{

        let b = a.balance;
        let mult = getMultiplier(b);

        total += b;
        totalDaily += mult * 800;
        totalWeekly += mult * 800 * 7;

        container.innerHTML += `
            <div class="account" onclick="openAccount(${i})">
                <b>${a.name}</b><br>
                <span class="small">$${b.toLocaleString()}</span><br>
                <span class="small">${mult.toFixed(2)}x • $${(mult*800).toFixed(0)}/day</span>
            </div>
        `;
    });

    document.getElementById("totalBalance").innerText = "$" + total.toLocaleString();
    document.getElementById("totalDaily").innerText = totalDaily.toFixed(0);
    document.getElementById("totalWeekly").innerText = totalWeekly.toFixed(0);
}

/* JOURNAL FUNCTIONS (UNCHANGED) */
function changeMonth(dir){
    viewDate.setMonth(viewDate.getMonth() + dir);
    renderCalendar();
}

function isWeekend(d){
    return d.getDay() === 0 || d.getDay() === 6;
}

function getMonthlyTotal(year, month){

    let total = 0;

    for(let d=1; d<=31; d++){

        let date = new Date(year, month, d);
        if(date.getMonth() !== month) break;

        if(isWeekend(date)) continue;

        let key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        if(journal[key]){
            total += parseFloat(journal[key]);
        }
    }

    return total;
}

function getColor(v){
    if(!v) return "rgba(255,255,255,0.04)";
    if(v > 0) return "rgba(34,197,94,0.3)";
    return "rgba(255,77,77,0.3)";
}

function renderCalendar(){

    let year = viewDate.getFullYear();
    let month = viewDate.getMonth();

    document.getElementById("monthLabel").innerText =
        viewDate.toLocaleString('default', { month:'long', year:'numeric' });

    document.getElementById("monthlyPL").innerText =
        "$" + getMonthlyTotal(year, month).toFixed(2);

    let cal = "";

    for(let d=1; d<=31; d++){

        let date = new Date(year, month, d);
        if(date.getMonth() !== month) break;
        if(isWeekend(date)) continue;

        let key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        let val = journal[key] || 0;

        cal += `
        <div class="dayBox"
            style="background:${getColor(val)}"
            onclick="selectDay('${key}')">
            ${d}<br>
            <span class="small">$${val}</span>
        </div>`;
    }

    document.getElementById("calendar").innerHTML = cal;
}

function selectDay(key){
    selectedDate = key;
    document.getElementById("selectedDay").innerText = key;
    document.getElementById("dayProfit").value = journal[key] || "";
}

function saveDay(){
    if(!selectedDate) return;
    journal[selectedDate] = parseFloat(document.getElementById("dayProfit").value) || 0;
    saveJournal();
    renderCalendar();
}

function back(){
    showHome();
}

/* INIT */
showHome();
updateNav("home");

</script>

</body>
</html>
