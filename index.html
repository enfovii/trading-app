<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pro Trading Dashboard">

<title>Pro Trading Dashboard</title>

<style>

* {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}
:root {
    --bg: #050913;

    --card: rgba(18, 28, 48, 0.70);
    --card2: rgba(10, 14, 28, 0.55);

    --primary: #4da3ff;
    --accent: #38e6b0;

    --profit: #2ee59d;
    --loss: #ff5c7a;

    --text: #eaf1ff;
    --muted: #8ea2bb;

    --border: rgba(120, 170, 255, 0.14);
}
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    margin: 0;
    padding: 14px;
    padding-bottom: 240px;
    color: #eaf1ff;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    -webkit-text-size-adjust: 100%;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 15% 20%, rgba(77,163,255,0.18), transparent 45%),
        radial-gradient(circle at 85% 25%, rgba(56,230,176,0.10), transparent 50%),
        radial-gradient(circle at 50% 90%, rgba(77,163,255,0.08), transparent 55%),
        var(--bg);
    z-index: -1;
}
body {
    color: var(--text);
}

.small {
    color: var(--muted);
}

.green {
    color: var(--profit);
}

.red {
    color: var(--loss);
}
.title {
    display: flex;
    justify-content: center;
    margin: 12px 0 16px;
}

h2 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    text-align: center;
    letter-spacing: 0.5px;
}

.page {
    display: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s ease, transform 0.2s ease;
}

.page.active {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

.topbar {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.portfolioBox {
    background: linear-gradient(145deg, rgba(20,30,50,0.75), rgba(10,15,30,0.55));
    border: 1px solid rgba(120,170,255,0.25);
    backdrop-filter: blur(16px);
    padding: 18px;
    border-radius: 18px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    will-change: transform;
}

.statsRow {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.stat {
    background:
        linear-gradient(
            145deg,
            rgba(18,28,48,0.82),
            rgba(8,12,24,0.72)
        );

    border: 1px solid rgba(120,170,255,0.12);

    backdrop-filter: blur(18px);

    padding: 14px 10px;

    border-radius: 20px;

    text-align: center;
    will-change: transform;
}
    .stat .small {
    margin-bottom: 6px;
}
    .stat div div {
    opacity: 0.65;
    font-size: 10px !important;
}

.small { font-size: 11px; color: #93a4b8; }

.big {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.3px;
}

.card {
   background: linear-gradient(145deg, var(--card), var(--card2));
border: 1px solid var(--border);
    backdrop-filter: blur(14px);
    padding: 14px;
    margin-top: 10px;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    will-change: transform;
}
    /* ===== PREMIUM CARD UPGRADE (ADD ONLY) ===== */

.portfolioBox,
.stat,
.card,
.account {
    position: relative;
    overflow: hidden;
}

/* left accent strip */
.portfolioBox::before,
.stat::before,
.card::before,
.account::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 4px;
    height: 100%;
    background: linear-gradient(180deg, #1f6feb, #2ee59d);
    opacity: 0.9;
}

/* cleaner spacing rhythm */
.card,
.account {
    margin-top: 12px;
}

/* tap feedback (does NOT affect functionality) */
.card:active,
.account:active,
.stat:active,
.portfolioBox:active {
    transform: scale(0.99);
    transition: transform 0.12s ease;
}
    .card,
.account,
.stat,
.portfolioBox {
    box-shadow: 0 10px 28px rgba(0,0,0,0.35);
    border: 1px solid rgba(120,170,255,0.14);
    backdrop-filter: blur(18px);
}

.account {
    display: grid;
    grid-template-columns: 1.8fr 1fr 1fr 1.2fr 1.6fr;
    gap: 12px;
    align-items: start;

    padding: 14px;
    margin-top: 10px;
    border-radius: 16px;

    background: linear-gradient(145deg, rgba(20,30,50,0.6), rgba(10,15,30,0.4));
    border: 1px solid rgba(120,170,255,0.18);

    scroll-margin-bottom: 120px;
    will-change: transform;
}

.green { color: #2ee59d; }
.red { color: #ff5c7a; }

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(120,170,255,0.25);
    margin-top: 8px;
    background: rgba(8,12,25,0.65);
    color: #eaf1ff;
    box-sizing: border-box;
    font-size: 16px;
}

input:focus {
    outline: none;
    border: 1px solid #2ee59d;
    box-shadow: 0 0 12px rgba(46,229,157,0.25);
}

button {
    width: calc(100% - 24px);
    margin-left: 12px;
    margin-right: 12px;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #1f6feb, #144a99);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
    box-shadow: 0 8px 20px rgba(0,120,255,0.25);
}
   .stickyBackBtn{
    position: fixed !important;
    left: 12px;
    right: 12px;
    bottom: calc(env(safe-area-inset-bottom) + 12px);
    z-index: 10000;

    width: auto !important;
    margin: 0 !important;

    padding: 16px;
    border: none;
    border-radius: 18px;

    background: linear-gradient(135deg, #1f6feb, #144a99);
    color: white;
    font-weight: 700;

    box-shadow: 0 10px 30px rgba(0,120,255,0.35);
    backdrop-filter: blur(18px);
}

.addBtn {
    position: fixed;
    bottom: 78px;
    left: 12px;
    right: 12px;
    z-index: 10;
    backdrop-filter: blur(12px);
}

.modal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.65);
    padding: 16px;
    z-index: 20;
}

.modal-content {
    width: 100%;
    max-width: 360px;
    background: rgba(15,20,35,0.9);
    border: 1px solid rgba(120,170,255,0.25);
    backdrop-filter: blur(16px);
    padding: 16px;
    border-radius: 16px;
}

.danger {
    background: #ff5c7a !important;
}

/* ===== REFINED RENAME UI (cleaner only) ===== */

.nameRow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
}

.nameRow h3 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
}

.editBtn {
    background: transparent;
    border: none;
    color: #93a4b8;
    font-size: 18px;
    width: auto;
    margin: 0;
    padding: 6px 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.15s ease;
}

.editBtn:active {
    transform: scale(0.95);
}

.editBtn:hover {
    background: rgba(255,255,255,0.06);
    color: #eaf1ff;
}

.accountRow {
    display: grid;
    grid-template-columns:
        minmax(105px, 1.8fr)
        minmax(58px, 0.9fr)
        minmax(58px, 0.9fr)
        minmax(72px, 1fr)
        minmax(42px, 0.6fr);

    gap: 4px;
    align-items: start;

    padding: 12px 6px;
    box-sizing: border-box;
    overflow: hidden;
}

/* NEW STRUCTURE (replace old cell system) */
.col {
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* account column */
.col.name {
    align-items: flex-start;
}

/* numeric columns */
.col.num {
    display: flex;
    flex-direction: column;
    align-items: flex-start; /* 👈 KEY CHANGE */
    text-align: left;
    padding-top: 6px;
}
    .col.num .value {
    font-variant-numeric: tabular-nums;
}

/* labels stay same idea as your old cellTitle */
.label {
    font-size: 9px;
    color: #93a4b8;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    opacity: 0.8;


    white-space: nowrap;
}


/* THIS replaces cellStrong (KEEP IT) */
.strong {
    font-size: 16px;
    font-weight: 700;
}
   .value {
    margin-top: 16px;
    line-height: 1.2;
    font-size: 14px;
}
    .dailyLarge {
    transform: translateX(-10px);
}

.accountBalance {
    font-size: 14px;
    font-weight: 700;
    margin-top: 8px;
    color: #93a4b8;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
}
   .cell {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    min-width: 0;
}

.cellLeft {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
}

.cellValue {
    font-size: 11.5px;
    font-weight: 500;
    margin-top: 10px;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    line-height: 1.2;
}
    .cellTitle {
    font-size: 10px;
    color: #93a4b8;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    opacity: 0.8;
    white-space: nowrap;
    text-align: left;
}
    .big {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.3px;
}
    .bonus {
    display: block;
    font-size: 11px;
    margin-top: 3px;
    color: #93a4b8;
    font-weight: 500;
}

.bottomNav{
    position: fixed !important;
    left: 12px;
    right: 12px;
    bottom: 12px;

    display: flex !important;
    flex-direction: row !important;
    gap: 10px;

    z-index: 9999;
}

/* IMPORTANT: kill global button styling inside nav */
.bottomNav button{
    width: auto !important;
    margin: 0 !important;
    flex: 1 !important;
}

.navBtn{
    padding: 14px;
    border: none;
    border-radius: 16px;

    background: linear-gradient(
        145deg,
        rgba(20,30,50,0.75),
        rgba(10,15,30,0.55)
    );

    border: 1px solid rgba(120,170,255,0.18);

    color: #eaf1ff;
    font-size: 15px;
    font-weight: 600;

    backdrop-filter: blur(18px);
}
    .fixedBack{
    position: fixed;
    left: 12px;
    right: 12px;
    bottom: 78px; /* sits just above your bottomNav */
    z-index: 9999;
}

.fixedBack button{
    width: 100%;
    margin: 0;
    padding: 14px;
    border-radius: 16px;
    background: linear-gradient(145deg, rgba(20,30,50,0.75), rgba(10,15,30,0.55));
    border: 1px solid rgba(120,170,255,0.18);
    color: #eaf1ff;
    font-weight: 600;
    backdrop-filter: blur(18px);
}

.activeNav{
    border:1px solid rgba(56,230,176,0.45);
}
    body.hideNav .bottomNav,
body.hideNav .addBtn {
    display: none !important;
}
    
</style>
</head>

<body>

<div class="title">
    <h2>Pro Trading Dashboard</h2>
</div>

<div id="home" class="page active">

<div class="topbar">

    <div class="portfolioBox" onclick="openPortfolio()">
        <div class="small">Portfolio</div>

    <div class="statsRow">

        <div class="stat">

        </div>

        <div class="stat">
            <div class="small">Weekly</div>

        </div>

        <div class="stat">
            <div class="small">Monthly</div>
            <div class="big green" id="monthlyHome">$0</div>

</div>

<div id="accounts"></div>

</div>

<div id="portfolio" class="page">
<div class="card">
    <h3>Portfolio Overview</h3>

    <div class="card">

    </div>

</div>

<div class="card">
    <h3>Projection Calculator</h3>

    <div class="small">Select Mode</div>

    <select id="projMode" onchange="setupProjection()"
        style="width:100%;padding:14px;margin-top:8px;
        border-radius:12px;background:rgba(8,12,25,0.65);
        color:#eaf1ff;border:1px solid rgba(120,170,255,0.25);">

        <option value="portfolio">Total Portfolio</option>

</div>

</div>
    <button class="stickyBackBtn" onclick="backHome()">

</button>

<div class="card">

    <div class="nameRow">

       inputmode="decimal"

<button class="addBtn" onclick="openModal()">+ Add Account</button>

<div class="modal" id="modal">
    <div class="modal-content">
        <div class="big">Add Account</div>
        <input id="newName" placeholder="Account name">
        <input
    id="newBalance"
    placeholder="Starting balance"
    inputmode="decimal"
    pattern="[0-9]*"
    autocomplete="off"

    oninput="formatBalanceInput(this)"
>
        <button onclick="createAccount()">Create</button>

    </div>
</div>

<div class="modal" id="deleteModal">
    <div class="modal-content">
        <div class="big">Are you sure?</div>

    </div>
</div>

    <div class="modal-content">

            Rename Account
        </div>

            id="renameInput"
            placeholder="Enter new name"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="none"
            spellcheck="false"
        >

        <button onclick="confirmRename()">
            Save
        </button>

            onclick="closeRenameModal()"
            style="background:rgba(255,255,255,0.08);"
        >
            Cancel
        </button>

<script>
let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let current = null;

function num(v){
    if(!v) return 0;
    v = v.toString().toLowerCase().replace(/,/g,'');
    if(v.includes("k")) return parseFloat(v)*1000;
    if(v.includes("m")) return parseFloat(v)*1000000;
    return isNaN(Number(v)) ? 0 : Number(v);
}

function money(v){
    v = Number(v);

    if (v >= 1000000) {
        return "$" + (v / 1000000).toFixed(
            v >= 10000000 ? 0 : 1
        ) + "M";
    }

    return "$" + v.toLocaleString();
}
    function openProjection(){
    show("projection");
    setupProjection();
}

/* unchanged logic */
function renameAccount(){
    if(current === null) return;

    document.getElementById("renameInput").value =
        accounts[current].name;

    document.getElementById("renameModal")
        .style.display = "flex";

    setTimeout(() => {
        let input =
            document.getElementById("renameInput");

        input.focus();

        // Place cursor at end instead of highlighting
        let length = input.value.length;
        input.setSelectionRange(length, length);
    }, 100);
}

function closeRenameModal(){
    document.getElementById("renameModal")
        .style.display = "none";
}

function confirmRename(){
    if(current === null) return;

    let newName =
        document.getElementById("renameInput")
        .value.trim();

    if(!newName) return;

    accounts[current].name = newName;

    localStorage.setItem(
        "accounts",
        JSON.stringify(accounts)
    );

    document.getElementById("name")
        .innerText = newName;

    closeRenameModal();
    render();
}

function formatBalanceInput(el){
    let raw = el.value.replace(/,/g,'').replace(/[^\d]/g,'');

    if(raw === ''){
        updateAccount();
        return;
    }

    el.value = Number(raw).toLocaleString('en-US');
    updateAccount();
}

function tier(b){

    if (b < 25000) return 0;

    return 1 + Math.floor((b - 25000) / 25000);
}
    

function mult(b){ return tier(b); }
function daily(b){ return mult(b)*800; }
function dd(b){ return b*0.4; }



function openPortfolio(){
    show("portfolio");
    renderPortfolio();
}
function show(page){

    document.querySelectorAll(".page")
        .forEach(p => p.classList.remove("active"));

    document.getElementById(page)
        .classList.add("active");

    const stickyBtn =
        document.querySelector(".stickyBackBtn");

    if(page === "projection"){
        stickyBtn.style.display = "block";
    } else {
        stickyBtn.style.display = "none";
    }

    const isHome = (page === "home");

    if (isHome) {
        document.body.classList.remove("hideNav");
    } else {
        document.body.classList.add("hideNav");
    }
}
function renderPortfolio(){
    let t=0,d=0,draw=0;

    accounts.forEach(a=>{
        let b=num(a.balance);
        t+=b;
        d+=daily(b);
        draw+=dd(b);
    });

    document.getElementById("p_total").innerText = money(t.toFixed(0));
    document.getElementById("p_daily").innerText = money(d.toFixed(0));
    document.getElementById("p_week").innerText = money((d*5).toFixed(0));
    document.getElementById("p_month").innerText = money((d*22).toFixed(0));
    document.getElementById("p_dd").innerText = money(draw.toFixed(0));
}

function render(){
    let el = document.getElementById("accounts");

    let html = "";
    let t = 0;
    let d = 0;

    accounts.forEach((a,i)=>{
        let b = num(a.balance);
        t += b;
        d += daily(b);

        let currentMult = mult(b);

       function nextTargetFromBalance(b){

    if (b < 25000) return 25000;

    let steps = Math.floor((b - 25000) / 25000) + 1;

    return 25000 + (steps * 25000);
}

        let nextTarget = nextTargetFromBalance(b);
        let nextMult = mult(nextTarget);
        let needed = Math.max(0, nextTarget - b);

   let tierStart;

// Below 25k = no trading
if (b < 25000) {
    tierStart = 0;
} else {

   let steps = Math.floor((b - 25000) / 25000);
tierStart = 25000 + (steps * 25000);
}

        let progress = Math.min(100, ((b - tierStart) / (nextTarget - tierStart)) * 100);

        html += `
<div class="accountRow" onclick="openAccount(${i})">

    <!-- ACCOUNT -->
    <div class="col name">
        <div class="label">Account</div>
        <div class="value strong">${a.name}</div>
        <div class="accountBalance">${money(b)}</div>
    </div>

   <!-- DAILY -->
<div class="col num">
    <div class="label">Daily</div>
    <div class="value ${daily(b) >= 100000 ? 'dailyLarge' : ''}">
        ${money(daily(b))}
    </div>
</div>

    <!-- MULTIPLIER -->
    <div class="col num">
        <div class="label">Multi</div>
        <div class="value">${currentMult.toFixed(2)}x</div>
    </div>

    <!-- TARGET -->
    <div class="col num">
       <div class="label">Δ NEXT</div>
        <div class="value">${money(needed)}</div>
    </div>

    <!-- ETA -->
    <div class="col num muted">
        <div class="label">ETA</div>
        <div class="value">
            ${(() => {
                let dp = daily(b);
                if (dp <= 0) return "~";
                let days = needed / dp;
                return isFinite(days) ? "~" + days.toFixed(1) + "d" : "~";
            })()}
        </div>
    </div>

</div>`;
            });

function openAccount(i){
    current=i;
    let a=accounts[i];
    document.getElementById("name").innerText=a.name;
    document.getElementById("balance").value=num(a.balance);
    show("account");
    updateAccount();

    setTimeout(() => {
        let input = document.getElementById("balance");
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
        input.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 100);
}

function updateAccount(){
    if(current===null) return;

    let inputEl = document.getElementById("balance");
    let raw = inputEl.value;

    if(raw === "" || raw === null) return;

    let b = num(raw);

    accounts[current].balance = b;
    localStorage.setItem("accounts",JSON.stringify(accounts));

    document.getElementById("mult").innerText=mult(b).toFixed(2)+"x";
    document.getElementById("dailyP").innerText=money(daily(b));
    document.getElementById("weekly").innerText=money(daily(b)*5);
    document.getElementById("monthly").innerText=money(daily(b)*22);
    document.getElementById("accdd").innerText=money(dd(b));

    let elInput = document.getElementById("balance");

    let pos = elInput.selectionStart;
    elInput.value = Number(b).toLocaleString('en-US');
    elInput.setSelectionRange(elInput.value.length, elInput.value.length);

    requestAnimationFrame(render);
}

function back(){ current=null; show("home"); }
function backHome(){ show("home"); }

function openModal(){

    // Clear old values every time
    document.getElementById("newName").value = "";
    document.getElementById("newBalance").value = "";

    document.getElementById("modal").style.display = "flex";

    // Auto focus name field
    setTimeout(() => {
        document.getElementById("newName").focus();
    }, 100);
}
function closeModal(){

    document.getElementById("modal").style.display = "none";

    // Reset inputs
    document.getElementById("newName").value = "";
    document.getElementById("newBalance").value = "";
}
function createAccount(){
    let name=document.getElementById("newName").value.trim();
    let balance=num(document.getElementById("newBalance").value);
    if(!name) return;

    accounts.push({name,balance});
    localStorage.setItem("accounts",JSON.stringify(accounts));

    closeModal();
    render();
}

function confirmDelete(){ document.getElementById("deleteModal").style.display="flex"; }
function closeDeleteModal(){ document.getElementById("deleteModal").style.display="none"; }

function deleteAccount(){
    if(current===null) return;
    accounts.splice(current,1);
    localStorage.setItem("accounts",JSON.stringify(accounts));
    current=null;
    closeDeleteModal();
    show("home");
    render();
}
    function setupProjection(){

    let mode = document.getElementById("projMode").value;
    let extra = document.getElementById("projExtra");

    extra.innerHTML = "";

    if(mode === "account"){
        let options = "";

        accounts.forEach((a,i)=>{
            options += `<option value="${i}">${a.name}</option>`;
        });

        extra.innerHTML = `
            <div class="small" style="margin-top:10px;">Select Account</div>
            <select id="projAccount" onchange="renderProjection()"
                style="width:100%;padding:14px;margin-top:8px;
                border-radius:12px;background:rgba(8,12,25,0.65);
                color:#eaf1ff;border:1px solid rgba(120,170,255,0.25);">
                ${options}
            </select>
        `;
    }

    if(mode === "custom"){
        extra.innerHTML = `
            <div class="small" style="margin-top:10px;">Custom Balance</div>
            <input id="projCustom"
    placeholder="Enter balance"
    inputmode="decimal"
    oninput="renderProjection()"
    style="margin-top:8px;">
        `;
    }

    renderProjection();
}
    function getBaseBalance(){

    let mode = document.getElementById("projMode").value;

    if(mode === "portfolio"){
        return accounts.reduce((t,a)=>t + num(a.balance),0);
    }

    if(mode === "account"){
        let i = document.getElementById("projAccount").value;
        return num(accounts[i].balance);
    }

    if(mode === "custom"){
        return num(document.getElementById("projCustom").value);
    }

    return 0;
}

function renderProjection(){

    let balance = getBaseBalance();
    let html = "";

    for(let m = 1; m <= 12; m++){

        let monthStartBalance = balance;

        let monthlyWithdraw = 0;
        let monthlyReinvest = 0;

        // 4 weeks per month (simplified trading cycle)
        for(let w = 0; w < 4; w++){

            let d = daily(balance);
            let weeklyProfit = d * 5;

            let withdraw = weeklyProfit * 0.5;
            let reinvest = weeklyProfit * 0.5;

            monthlyWithdraw += withdraw;
            monthlyReinvest += reinvest;

            balance += reinvest;
        }

        let dNow = daily(balance);
        let wNow = dNow * 5;
        let moNow = dNow * 22;

        html += `
        <div class="card">
            <div class="small">Month ${m}</div>

            <div class="big">${money(balance.toFixed(0))}</div>

            <div class="small">
                Weekly Withdraw: ${money(monthlyWithdraw)} • 
                Reinvested: ${money(monthlyReinvest)}
            </div>

            <div class="small">
                Daily ${money(dNow)} • Weekly ${money(wNow)} • Monthly ${money(moNow)}
            </div>
        </div>
        `;
    }

    document.getElementById("projResults").innerHTML = html;
}

window.onload=function(){
    show("home");
    render();
};
