<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Accounts</title>

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    margin: 0;
    padding: 20px;
}

.card {
    background: #1c1c1c;
    padding: 16px;
    margin-top: 12px;
    border-radius: 10px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #333;
    color: white;
    border: none;
    border-radius: 8px;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    margin-top: 8px;
}

.big {
    font-size: 22px;
    font-weight: bold;
    color: lime;
}

.small {
    font-size: 13px;
    color: #aaa;
    margin-top: 4px;
    display: block;
}

.hidden { display: none; }

.account {
    padding: 12px;
    background: #222;
    margin-top: 10px;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen" style="
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #0f0f0f;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    z-index: 9999;
">
    Loading accounts...
</div>

<h2>📊 Trading Accounts</h2>

<!-- HOME -->
<div id="home">

<div class="card">
<button onclick="showAdd()">➕ Add New Account</button>
</div>

<div id="accounts"></div>

<div class="card">
<div>Total Balance</div>
<div id="totalBalance" class="big">£0</div>
<div class="small">Total Multiplier: <span id="totalX">0x</span></div>
</div>

</div>

<!-- ADD -->
<div id="addScreen" class="hidden">
<div class="card">
<h3>Add Account</h3>
<input id="name" placeholder="Account name">
<input id="balance" placeholder="Balance (e.g. 20k)">
<button onclick="addAccount()">Create</button>
<button onclick="back()">Back</button>
</div>
</div>

<!-- DETAIL -->
<div id="detail" class="hidden">
<div class="card">
<h3 id="accName"></h3>

<input id="editBalance" oninput="updateAccount()">

<div class="card">
<div>Multiplier</div>
<div id="mult" class="big">0x</div>
</div>

<button onclick="deleteAccount()">Delete Account</button>
<button onclick="back()">Back</button>
</div>
</div>

# 🔥 APP LOGIC (STEP 8 INSTANT MODE)

<script>

let accounts = JSON.parse(localStorage.getItem("accounts_cache") || "[]");
let currentIndex = null;

let userId = null;
let isReady = false;

/* -------------------------
   AUTH
--------------------------*/
auth.signInAnonymously()
    .then((userCredential) => {
        userId = userCredential.user.uid;
        loadAccounts();
    })
    .catch((error) => {
        console.log("Auth error:", error);
    });

/* -------------------------
   INSTANT LOAD (CACHE FIRST)
--------------------------*/
function loadAccounts() {
    if (!userId) return;

    isReady = true;

    // hide loading instantly
    document.getElementById("loadingScreen").style.display = "none";

    // render from cache immediately
    renderHome();

    // sync Firebase in background
    db.collection("users").doc(userId).get().then(doc => {
        if (doc.exists) {
            accounts = doc.data().accounts || [];

            localStorage.setItem("accounts_cache", JSON.stringify(accounts));

            renderHome();
        }
    });
}

/* -------------------------
   SAVE (CACHE + CLOUD)
--------------------------*/
function save() {
    if (!userId || !isReady) return;

    // instant local save
    localStorage.setItem("accounts_cache", JSON.stringify(accounts));

    // cloud sync in background
    db.collection("users").doc(userId).set({
        accounts: accounts
    });
}

/* -------------------------
   UI RENDER
--------------------------*/
function renderHome() {
    if (!isReady) return;

    document.getElementById("home").classList.remove("hidden");
    document.getElementById("addScreen").classList.add("hidden");
    document.getElementById("detail").classList.add("hidden");

    let container = document.getElementById("accounts");
    container.innerHTML = "";

    let totalBalance = 0;
    let totalX = 0;

    accounts.forEach((a, i) => {

        let b = a.balance;
        let mult = getMultiplier(b);

        totalBalance += b;
        totalX += mult;

        container.innerHTML += `
            <div class="account" onclick="openAccount(${i})">
                <b>${a.name}</b><br>
                £${b.toLocaleString()}<br>
                <span class="small">${mult.toFixed(2)}x</span>
            </div>
        `;
    });

    document.getElementById("totalBalance").innerText = "£" + totalBalance.toLocaleString();
    document.getElementById("totalX").innerText = totalX.toFixed(2) + "x";
}

/* -------------------------
   MULTIPLIER
--------------------------*/
function getMultiplier(b) {
    if (b <= 90000) return b / 30000;
    if (b <= 140000) return 3 + ((b - 90000) / 100000);
    if (b <= 160000) return 3.5 + ((b - 140000) / 20000) * 0.5;
    if (b <= 200000) return 4 + ((b - 160000) / 40000);
    return 5;
}

/* -------------------------
   ADD
--------------------------*/
function showAdd() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("addScreen").classList.remove("hidden");
}

function addAccount() {
    let name = document.getElementById("name").value;
    let input = document.getElementById("balance").value.toLowerCase().trim();

    let b;

    if (input.includes("k")) {
        b = parseFloat(input.replace("k", "")) * 1000;
    } else {
        b = parseFloat(input);
    }

    accounts.push({ name, balance: b });

    save();
    renderHome();
}

/* -------------------------
   OPEN
--------------------------*/
function openAccount(i) {
    currentIndex = i;

    document.getElementById("home").classList.add("hidden");
    document.getElementById("detail").classList.remove("hidden");

    let acc = accounts[i];

    document.getElementById("accName").innerText = acc.name;
    document.getElementById("editBalance").value = acc.balance;

    updateAccount();
}

/* -------------------------
   UPDATE
--------------------------*/
function updateAccount() {
    let input = document.getElementById("editBalance").value;
    let b = parseFloat(input);

    accounts[currentIndex].balance = b;

    save();

    let mult = getMultiplier(b);
    document.getElementById("mult").innerText = mult.toFixed(2) + "x";
}

/* -------------------------
   DELETE
--------------------------*/
function deleteAccount() {
    accounts.splice(currentIndex, 1);
    save();
    renderHome();
}

/* -------------------------
   BACK
--------------------------*/
function back() {
    renderHome();
}

</script>

</body>
</html>
