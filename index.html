<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Trading Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    margin: 0;
    padding: 14px;
    color: #e8ecf3;
    overflow-x: hidden;
}

/* BACKGROUND */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 20%, rgba(60,120,255,0.18), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(0,180,255,0.10), transparent 45%),
        #070b14;
    z-index: -1;
}

/* TITLE */
.title {
    display: flex;
    justify-content: center;
    margin: 10px 0 14px;
}

h2 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    text-align: center;
}

/* TOPBAR */
.topbar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.topbar .stat:first-child {
    grid-column: 1 / -1;
}

/* STAT */
.stat {
    background: rgba(17,24,35,0.55);
    border: 1px solid rgba(120,170,255,0.18);
    backdrop-filter: blur(12px);
    padding: 12px;
    border-radius: 14px;
    text-align: center;
}

.small { font-size: 11px; color: #93a4b8; }

.big {
    font-size: 24px;
    font-weight: 700;
    transition: all 0.3s ease;
}

/* CARDS */
.card {
    background: rgba(17,24,35,0.55);
    border: 1px solid rgba(120,170,255,0.18);
    backdrop-filter: blur(12px);
    padding: 14px;
    margin-top: 10px;
    border-radius: 14px;
}

/* ACCOUNT */
.account {
    padding: 14px;
    margin-top: 10px;
    border-radius: 14px;
    background: rgba(17,24,35,0.55);
    border: 1px solid rgba(120,170,255,0.18);
}

/* COLORS */
.green { color: #2ee59d; }
.red { color: #ff5c7a; }

/* INPUT */
input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(120,170,255,0.25);
    margin-top: 8px;
    background: rgba(10,18,32,0.6);
    color: #e8ecf3;
    box-sizing: border-box;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #1f6feb, #144a99);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
}

/* FLOAT BUTTON */
.addBtn {
    position: fixed;
    bottom: 16px;
    left: 16px;
    right: 16px;
}

/* CURRENCY SWITCH */
.currencyBtn {
    position: fixed;
    top: 16px;
    right: 16px;
    width: auto;
    padding: 8px 12px;
    font-size: 12px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="title">
    <h2>Pro Trading Dashboard</h2>
</div>

<button class="currencyBtn" onclick="toggleCurrency()" id="currencyBtn">$ USD</button>

<!-- HOME -->
<div id="home" class="page active">

<div class="topbar">
    <div class="stat">
        <div class="small">Portfolio</div>
        <div class="big" id="total">$0</div>
    </div>

    <div class="stat">
        <div class="small">Daily</div>
        <div class="big green" id="daily">$0</div>
    </div>

    <div class="stat">
        <div class="small">Drawdown</div>
        <div class="big red" id="dd">$0</div>
    </div>
</div>

<div id="accounts"></div>

</div>

<!-- ACCOUNT -->
<div id="account" class="page">

<div class="card">
    <h3 id="name"></h3>

    <input id="balance" oninput="updateAccount()">

    <div class="card">
        <div class="small">Multiplier</div>
        <div class="big green" id="mult"></div>
    </div>

    <div class="card">
        <div class="small">Daily Profit</div>
        <div id="dailyP"></div>
    </div>

    <div class="card">
        <div class="small">Weekly</div>
        <div id="weekly"></div>
    </div>

    <div class="card">
        <div class="small">Monthly</div>
        <div id="monthly"></div>
    </div>

    <div class="card">
        <div class="small">Drawdown</div>
        <div class="big red" id="accdd"></div>
    </div>

    <button onclick="back()">Back</button>
</div>

</div>

<!-- ADD -->
<button class="addBtn" onclick="openModal()">+ Add Account</button>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let current = null;

/* =========================
   CURRENCY SYSTEM
========================= */

let currency = localStorage.getItem("currency") || "USD";

function toggleCurrency(){
    currency = currency === "USD" ? "GBP" : "USD";
    localStorage.setItem("currency", currency);
    document.getElementById("currencyBtn").innerText =
        currency === "USD" ? "$ USD" : "£ GBP";
    render();
}

function symbol(){
    return currency === "USD" ? "$" : "£";
}

/* FORMAT (with k/m support) */
function money(v){

    v = Number(v);

    let abs = Math.abs(v);

    if(abs >= 1000000){
        return symbol() + (v/1000000).toFixed(2) + "m";
    }

    if(abs >= 1000){
        return symbol() + (v/1000).toFixed(1) + "k";
    }

    return symbol() + v.toLocaleString();
}

/* ANIMATION */
function animate(el, value){
    let start = 0;
    let end = Number(value);
    let duration = 300;
    let stepTime = 10;
    let steps = duration / stepTime;
    let inc = end / steps;

    let i = 0;
    let interval = setInterval(()=>{
        i++;
        start += inc;
        if(i >= steps){
            clearInterval(interval);
            start = end;
        }
        el.innerText = money(start.toFixed(0));
    }, stepTime);
}

/* LOGIC */
function num(v){ return isNaN(Number(v)) ? 0 : Number(v); }

function mult(b){
    b=num(b);
    if(b<90000) return b/30000;
    if(b<140000) return 3;
    if(b<160000) return 3.5;
    if(b<200000) return 4;
    return 5;
}

function daily(b){ return mult(b)*800; }
function dd(b){ return b*0.4; }

/* NAV */
function show(page){
    document.querySelectorAll(".page")
        .forEach(p=>p.classList.remove("active"));

    document.getElementById(page).classList.add("active");
}

/* RENDER */
function render(){

    let el=document.getElementById("accounts");
    el.innerHTML="";

    let t=0,d=0,draw=0;

    accounts.forEach((a,i)=>{

        let b=num(a.balance);

        t+=b;
        d+=daily(b);
        draw+=dd(b);

        el.innerHTML+=`
        <div class="account" onclick="openAccount(${i})">
            <b>${a.name}</b><br>
            ${money(b)}<br>
            <span class="small green">Daily ${money(daily(b))}</span>
        </div>`;
    });

    animate(document.getElementById("total"), t);
    animate(document.getElementById("daily"), d);
    animate(document.getElementById("dd"), draw);
}

/* OPEN */
function openAccount(i){
    current=i;
    let a=accounts[i];

    document.getElementById("name").innerText=a.name;
    document.getElementById("balance").value=num(a.balance);

    show("account");
    updateAccount();
}

/* UPDATE */
function updateAccount(){

    if(current===null) return;

    let b=num(document.getElementById("balance").value);

    accounts[current].balance=b;
    localStorage.setItem("accounts",JSON.stringify(accounts));

    let m=mult(b);
    let d=daily(b);

    document.getElementById("mult").innerText=m.toFixed(2)+"x";
    document.getElementById("dailyP").innerText=money(d);
    document.getElementById("weekly").innerText=money(d*7);
    document.getElementById("monthly").innerText=money(d*30);
    document.getElementById("accdd").innerText=money(dd(b));

    render();
}

/* BACK */
function back(){
    current=null;
    show("home");
}

/* MODAL PLACEHOLDER */
function openModal(){ alert("Add modal already in your full version"); }

/* INIT */
document.getElementById("currencyBtn").innerText =
    currency === "USD" ? "$ USD" : "£ GBP";

show("home");
render();

</script>

</body>
</html>
