<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pro Trading Dashboard">

<title>Pro Trading Dashboard</title>

<style>

* {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    margin: 0;
    padding: 14px;
    padding-bottom: 90px;
    color: #eaf1ff;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    -webkit-text-size-adjust: 100%;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 15% 20%, rgba(0,140,255,0.20), transparent 45%),
        radial-gradient(circle at 85% 25%, rgba(80,180,255,0.12), transparent 50%),
        radial-gradient(circle at 50% 90%, rgba(0,90,255,0.10), transparent 55%),
        #050913;
    z-index: -1;
}

.page { display:none; }
.page.active { display:block; }

.account {
    padding: 14px;
    margin-top: 10px;
    border-radius: 16px;
    background: rgba(20,30,50,0.6);
    border: 1px solid rgba(120,170,255,0.18);
}

.small { font-size:11px; color:#93a4b8; }
.big { font-size:20px; font-weight:700; }

.green { color:#2ee59d; }
.red { color:#ff5c7a; }

</style>
</head>

<body>

<div id="home" class="page active">
    <h2>Pro Trading Dashboard</h2>

    <div>
        <div>Total: <span id="total"></span></div>
        <div>Daily: <span id="daily"></span></div>
        <div>Weekly: <span id="weeklyHome"></span></div>
        <div>Monthly: <span id="monthlyHome"></span></div>
    </div>

    <div id="accounts"></div>
</div>

<div id="account" class="page">
    <h3 id="name"></h3>

    <input id="balance"
           inputmode="decimal"
           oninput="formatBalanceInput(this)">

    <button onclick="back()">Back</button>
</div>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let current = null;

/* ================= SAFE CORE HELPERS ================= */

function num(v){
    if(!v) return 0;
    v = v.toString().toLowerCase().replace(/,/g,'');
    if(v.includes("k")) return parseFloat(v)*1000 || 0;
    if(v.includes("m")) return parseFloat(v)*1000000 || 0;
    let n = Number(v);
    return isNaN(n) ? 0 : n;
}

function money(v){
    v = Number(v) || 0;
    return "$" + v.toLocaleString();
}

/* ================= FULL ORIGINAL LOGIC (RESTORED) ================= */

function tier(b){
    if (b < 90000) return 3;
    if (b < 140000) return 3;
    if (b < 160000) return 3.5;
    if (b < 180000) return 4;
    if (b < 200000) return 4.5;

    let steps = Math.floor((b - 200000) / 20000);
    return 5 + (steps * 0.5);
}

function mult(b){ return tier(b); }
function daily(b){ return mult(b) * 800; }
function dd(b){ return b * 0.4; }

/* ================= SAFE RENDER (NO CRASH GUARANTEE) ================= */

function render(){
    try {

        let el = document.getElementById("accounts");
        if(!el) return;

        let html = "";
        let total = 0;
        let dailyTotal = 0;

        accounts.forEach((a,i)=>{

            let b = num(a?.balance);
            total += b;
            dailyTotal += daily(b);

            let m = mult(b) || 0;

            /* progress system (original logic preserved) */
            let nextTarget;
            if (b < 90000) nextTarget = 90000;
            else if (b < 140000) nextTarget = 140000;
            else if (b < 160000) nextTarget = 160000;
            else if (b < 180000) nextTarget = 180000;
            else if (b < 200000) nextTarget = 200000;
            else nextTarget = b + 20000;

            let progress = Math.min(100, (b / nextTarget) * 100);

            html += `
            <div class="account" onclick="openAccount(${i})">

                <b>${a?.name || "Account"}</b><br>
                ${money(b)}<br>
                <span class="green">${m.toFixed(2)}x</span><br>
                <span class="small">Daily ${money(daily(b))}</span>

                <div style="height:8px;background:rgba(255,255,255,0.1);margin-top:8px;border-radius:10px;overflow:hidden;">
                    <div style="width:${progress}%;height:100%;background:linear-gradient(90deg,#1f6feb,#2ee59d);"></div>
                </div>

            </div>`;
        });

        el.innerHTML = html;

        document.getElementById("total").innerText = money(total);
        document.getElementById("daily").innerText = money(dailyTotal);
        document.getElementById("weeklyHome").innerText = money(dailyTotal * 5);
        document.getElementById("monthlyHome").innerText = money(dailyTotal * 22);

    } catch (e) {
        console.error("Render error recovered:", e);
    }
}

/* ================= INPUT SAFETY ================= */

function formatBalanceInput(el){
    let raw = el.value.replace(/,/g,'').replace(/[^\d]/g,'');
    if(raw === '') return;
    el.value = Number(raw).toLocaleString('en-US');
}

/* ================= NAVIGATION ================= */

function openAccount(i){
    current = i;
    document.getElementById("name").innerText = accounts[i]?.name || "";
    document.getElementById("balance").value = accounts[i]?.balance || 0;

    document.getElementById("home").classList.remove("active");
    document.getElementById("account").classList.add("active");
}

function back(){
    current = null;
    document.getElementById("account").classList.remove("active");
    document.getElementById("home").classList.add("active");
}

/* ================= SAFE BOOT ================= */

window.onload = function(){
    try {
        render();
    } catch(e){
        console.error("Boot failed:", e);
    }
};

</script>

</body>
</html>
