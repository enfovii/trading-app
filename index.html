<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pro Trading Dashboard">

<title>Pro Trading Dashboard</title>

<style>

* {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    margin: 0;
    padding: 14px;
    padding-bottom: 90px;
    color: #eaf1ff;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    -webkit-text-size-adjust: 100%;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 15% 20%, rgba(0,140,255,0.20), transparent 45%),
        radial-gradient(circle at 85% 25%, rgba(80,180,255,0.12), transparent 50%),
        radial-gradient(circle at 50% 90%, rgba(0,90,255,0.10), transparent 55%),
        #050913;
    z-index: -1;
}

.title {
    display: flex;
    justify-content: center;
    margin: 12px 0 16px;
}

h2 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    text-align: center;
    letter-spacing: 0.5px;
}

.page {
    display: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s ease, transform 0.2s ease;
}

.page.active {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

.topbar {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.portfolioBox {
    background: linear-gradient(145deg, rgba(20,30,50,0.75), rgba(10,15,30,0.55));
    border: 1px solid rgba(120,170,255,0.25);
    backdrop-filter: blur(16px);
    padding: 18px;
    border-radius: 18px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
}

.statsRow {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.stat {
    background: linear-gradient(145deg, rgba(20,30,50,0.65), rgba(10,15,30,0.45));
    border: 1px solid rgba(120,170,255,0.18);
    backdrop-filter: blur(14px);
    padding: 12px;
    border-radius: 16px;
    text-align: center;
}

.small { font-size: 11px; color: #93a4b8; }

.big {
    font-size: 20px;
    font-weight: 700;
}

.card {
    background: linear-gradient(145deg, rgba(20,30,50,0.65), rgba(10,15,30,0.45));
    border: 1px solid rgba(120,170,255,0.18);
    backdrop-filter: blur(14px);
    padding: 14px;
    margin-top: 10px;
    border-radius: 16px;
}

.account {
    padding: 14px;
    margin-top: 10px;
    border-radius: 16px;
    background: linear-gradient(145deg, rgba(20,30,50,0.6), rgba(10,15,30,0.4));
    border: 1px solid rgba(120,170,255,0.18);
}

.green { color: #2ee59d; }
.red { color: #ff5c7a; }

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(120,170,255,0.25);
    margin-top: 8px;
    background: rgba(8,12,25,0.65);
    color: #eaf1ff;
    box-sizing: border-box;
    font-size: 16px;
}

button {
    width: calc(100% - 24px);
    margin-left: 12px;
    margin-right: 12px;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #1f6feb, #144a99);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
    box-shadow: 0 8px 20px rgba(0,120,255,0.25);
}

.addBtn {
    position: fixed;
    bottom: 18px;
    left: 12px;
    right: 12px;
    z-index: 10;
    backdrop-filter: blur(12px);
}

.modal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.65);
    padding: 16px;
    z-index: 20;
}

.modal-content {
    width: 100%;
    max-width: 360px;
    background: rgba(15,20,35,0.9);
    border: 1px solid rgba(120,170,255,0.25);
    backdrop-filter: blur(16px);
    padding: 16px;
    border-radius: 16px;
}

.danger {
    background: #ff5c7a !important;
}

.nameRow {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.editBtn {
    background: transparent;
    border: none;
    color: #93a4b8;
    font-size: 18px;
    width: auto;
    margin: 0;
    padding: 6px 8px;
}

</style>
</head>

<body>

<div class="title">
    <h2>Pro Trading Dashboard</h2>
</div>

<div id="home" class="page active">

<div class="topbar">

    <div class="portfolioBox" onclick="openPortfolio()">
        <div class="small">Portfolio</div>
        <div class="big" id="total">$0</div>
    </div>

    <div class="statsRow">

        <div class="stat">
            <div class="small">Daily</div>
            <div class="big green" id="daily">$0</div>
        </div>

        <div class="stat">
            <div class="small">Weekly</div>
            <div class="big green" id="weeklyHome">$0</div>
        </div>

        <div class="stat">
            <div class="small">Monthly</div>
            <div class="big green" id="monthlyHome">$0</div>
        </div>

    </div>

</div>

<div id="accounts"></div>
</div>

<div id="account" class="page">
<div class="card">

    <div class="nameRow">
        <h3 id="name"></h3>
        <button class="editBtn" onclick="renameAccount()">✏️</button>
    </div>

    <input id="balance"
       inputmode="decimal"
       pattern="[0-9]*"
       autocomplete="off"
       autocorrect="off"
       autocapitalize="none"
       spellcheck="false"
       onfocus="this.select()"
       oninput="formatBalanceInput(this)">

    <button onclick="back()">Back</button>
    <button class="danger" onclick="confirmDelete()">Delete Account</button>
</div>
</div>

<!-- ADD ACCOUNT -->
<div class="modal" id="modal">
    <div class="modal-content">
        <input id="newName">
        <input id="newBalance">
        <button onclick="createAccount()">Create</button>
        <button onclick="closeModal()">Cancel</button>
    </div>
</div>

<!-- DELETE -->
<div class="modal" id="deleteModal">
    <div class="modal-content">
        <div class="big">Are you sure?</div>
        <button class="danger" onclick="deleteAccount()">Yes</button>
        <button onclick="closeDeleteModal()">Cancel</button>
    </div>
</div>

<!-- RENAME -->
<div class="modal" id="renameModal">
    <div class="modal-content">
        <div class="big">Rename Account</div>

        <input id="renameInput"
               placeholder="Account name">

        <button onclick="confirmRename()">Save</button>
        <button onclick="closeRenameModal()">Cancel</button>
    </div>
</div>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let current = null;

function num(v){
    if(!v) return 0;
    v = v.toString().toLowerCase().replace(/,/g,'');
    if(v.includes("k")) return parseFloat(v)*1000;
    if(v.includes("m")) return parseFloat(v)*1000000;
    return isNaN(Number(v)) ? 0 : Number(v);
}

function money(v){
    return "$" + Number(v).toLocaleString();
}

/* ===== FULL RESTORE LOGIC ===== */

function tier(b){
    if (b < 90000) return 3;
    if (b < 140000) return 3;
    if (b < 160000) return 3.5;
    if (b < 180000) return 4;
    if (b < 200000) return 4.5;

    let steps = Math.floor((b - 200000) / 20000);
    return 5 + (steps * 0.5);
}

function mult(b){ return tier(b); }
function daily(b){ return mult(b) * 800; }
function dd(b){ return b * 0.4; }

function render(){
    let el=document.getElementById("accounts");

    let html = "";
    let t=0,d=0;

    accounts.forEach((a,i)=>{
        let b=num(a.balance);
        t+=b;
        d+=daily(b);

        html += `
        <div class="account" onclick="openAccount(${i})"
            style="display:flex;justify-content:space-between;gap:12px;align-items:center;">

            <div>
                <b>${a.name}</b><br>
                ${money(b)}<br>
                <span class="green">${mult(b).toFixed(2)}x</span><br>
                <span class="small">Daily ${money(daily(b))}</span>
            </div>
        </div>`;
    });

    document.getElementById("total").innerText=money(t.toFixed(0));
    document.getElementById("daily").innerText=money(d.toFixed(0));
    document.getElementById("weeklyHome").innerText=money((d*5).toFixed(0));
    document.getElementById("monthlyHome").innerText=money((d*22).toFixed(0));

    el.innerHTML = html;
}

/* ===== RENAME (ONLY FEATURE ADDED) ===== */

function renameAccount(){
    if(current === null) return;
    document.getElementById("renameInput").value = accounts[current].name;
    document.getElementById("renameModal").style.display = "flex";
}

function confirmRename(){
    let newName = document.getElementById("renameInput").value.trim();
    if(!newName) return;

    accounts[current].name = newName;
    localStorage.setItem("accounts", JSON.stringify(accounts));

    document.getElementById("name").innerText = newName;

    closeRenameModal();
    render();
}

function closeRenameModal(){
    document.getElementById("renameModal").style.display = "none";
}

/* ===== CORE FUNCTIONS (UNCHANGED LOGIC) ===== */

function openAccount(i){
    current=i;
    document.getElementById("name").innerText=accounts[i].name;
    document.getElementById("balance").value=accounts[i].balance;
    document.getElementById("home").classList.remove("active");
    document.getElementById("account").classList.add("active");
}

function back(){
    current=null;
    document.getElementById("account").classList.remove("active");
    document.getElementById("home").classList.add("active");
}

window.onload=function(){
    render();
};

</script>

</body>
</html>
