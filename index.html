<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: #070b14;
    color: #e6edf7;
    margin: 0;
    padding: 18px;
}

/* TITLE */
h2 {
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
    color: #e6edf7;
}

/* TOP STATS */
.topbar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
}

.stat {
    background: #0e1626;
    border: 1px solid #1b2a3d;
    padding: 14px;
    border-radius: 14px;
    text-align: center;
    transition: 0.2s ease;
}

.stat:hover {
    border-color: #2b4a6f;
}

.stat .label {
    font-size: 11px;
    color: #8aa0b8;
    text-transform: uppercase;
    letter-spacing: 0.6px;
}

.stat .value {
    font-size: 18px;
    font-weight: 700;
    color: #e6edf7;
}

/* CARDS */
.card {
    background: #0e1626;
    border: 1px solid #1b2a3d;
    padding: 16px;
    margin-top: 12px;
    border-radius: 14px;
}

/* ACCOUNTS */
.account {
    padding: 14px;
    background: #0e1626;
    margin-top: 12px;
    border-radius: 14px;
    border: 1px solid #1b2a3d;
    cursor: pointer;
    transition: 0.2s ease;
}

.account:hover {
    border-color: #2b4a6f;
    transform: translateY(-1px);
}

/* TEXT */
.small {
    font-size: 12px;
    color: #8aa0b8;
}

.big {
    font-size: 26px;
    font-weight: 700;
}

/* COLOURS */
.green { color: #2ee59d; }
.red { color: #ff5c7a; }

/* INPUTS */
input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #1b2a3d;
    margin-top: 8px;
    background: #0a1220;
    color: #e6edf7;
    outline: none;
}

input:focus {
    border-color: #2b4a6f;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #1b4d6b, #14324a);
    color: #e6edf7;
    border: 1px solid #2b4a6f;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s ease;
}

button:hover {
    border-color: #3b6b9c;
    transform: translateY(-1px);
}
</style>
</head>

<body>

<h2>Trading Dashboard</h2>

<!-- HOME -->
<div id="home" class="page active">

<div class="topbar">
    <div class="stat">
        <div class="label">Portfolio</div>
        <div class="value" id="total">$0</div>
    </div>
    <div class="stat">
        <div class="label">Daily</div>
        <div class="value green" id="daily">$0</div>
    </div>
    <div class="stat">
        <div class="label">Drawdown</div>
        <div class="value red" id="dd">$0</div>
    </div>
</div>

<div id="accounts"></div>

</div>

<!-- ACCOUNT PAGE -->
<div id="account" class="page">

<div class="card">
    <h3 id="name"></h3>

    <input id="balance" oninput="updateAccount()">

    <div class="card">
        <div class="small">Multiplier</div>
        <div class="big green" id="mult"></div>
    </div>

    <div class="card">
        <div class="small">Daily Profit</div>
        <div id="dailyP"></div>
    </div>

    <div class="card">
        <div class="small">Weekly Profit</div>
        <div id="weekly"></div>
    </div>

    <div class="card">
        <div class="small">Monthly Profit</div>
        <div id="monthly"></div>
    </div>

    <div class="card">
        <div class="small">Account Drawdown</div>
        <div class="big red" id="accdd"></div>
    </div>

    <button onclick="back()">Back</button>
</div>

</div>

<script>

/* DATA */
let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let current = null;

/* SAFE NUM */
function num(v){
    v = Number(v);
    return isNaN(v) ? 0 : v;
}

/* LOGIC */
function mult(b){
    b = num(b);
    if (b < 90000) return b / 30000;
    if (b < 140000) return 3;
    if (b < 160000) return 3.5;
    if (b < 200000) return 4;
    return 5;
}

function daily(b){
    return mult(b) * 800;
}

function dd(b){
    return b * 0.4;
}

/* NAV */
function show(page){
    document.querySelectorAll(".page")
        .forEach(p => p.classList.remove("active"));

    document.getElementById(page).classList.add("active");
}

/* HOME */
function render(){

    let el = document.getElementById("accounts");
    el.innerHTML = "";

    let t=0,d=0,draw=0;

    accounts.forEach((a,i)=>{

        let b=num(a.balance);

        t+=b;
        d+=daily(b);
        draw+=dd(b);

        el.innerHTML+=`
        <div class="account" onclick="openAccount(${i})">
            <b>${a.name}</b><br>
            $${b}<br>
            <span class="small green">Daily $${daily(b).toFixed(0)}</span>
        </div>`;
    });

    document.getElementById("total").innerText="$"+t.toFixed(0);
    document.getElementById("daily").innerText="$"+d.toFixed(0);
    document.getElementById("dd").innerText="$"+draw.toFixed(0);
}

/* OPEN */
function openAccount(i){

    current=i;

    let a=accounts[i];

    document.getElementById("name").innerText=a.name;
    document.getElementById("balance").value=num(a.balance);

    show("account");

    updateAccount();
}

/* UPDATE */
function updateAccount(){

    if(current===null) return;

    let b=num(document.getElementById("balance").value);

    accounts[current].balance=b;
    localStorage.setItem("accounts",JSON.stringify(accounts));

    let m=mult(b);
    let d=daily(b);

    document.getElementById("mult").innerText=m.toFixed(2)+"x";
    document.getElementById("dailyP").innerText="$"+d.toFixed(0);
    document.getElementById("weekly").innerText="$"+(d*7).toFixed(0);
    document.getElementById("monthly").innerText="$"+(d*30).toFixed(0);
    document.getElementById("accdd").innerText="$"+dd(b).toFixed(0);

    render();
}

/* BACK */
function back(){
    current=null;
    show("home");
}

/* INIT */
render();

</script>

</body>
</html>
