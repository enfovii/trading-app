<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Trading Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: #0a0f1a;
    color: #e8ecf3;
    margin: 0;
    padding: 18px;
}

/* TITLE */
.title {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
}

h2 {
    font-size: 22px;
    font-weight: 700;
    margin: 0;
}

/* PAGES */
.page { display:none; }
.active { display:block; }

/* TOPBAR */
.topbar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
}

.stat {
    background: #111a2b;
    border: 1px solid #1e2a3a;
    padding: 14px;
    border-radius: 14px;
    text-align: center;
}

.stat .label {
    font-size: 11px;
    color: #93a4b8;
}

.stat .value {
    font-size: 18px;
    font-weight: 700;
}

/* CARDS */
.card {
    background: #111823;
    border: 1px solid #1e2a3a;
    padding: 16px;
    margin-top: 12px;
    border-radius: 14px;
}

/* ACCOUNT */
.account {
    padding: 14px;
    background: #111823;
    margin-top: 12px;
    border-radius: 14px;
    border: 1px solid #1e2a3a;
    cursor: pointer;
}

/* TEXT */
.small { font-size: 12px; color: #93a4b8; }
.big { font-size: 26px; font-weight: 700; }

/* COLORS */
.green { color: #22c55e; }
.red { color: #ef4444; }

/* INPUTS */
input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #263445;
    margin-top: 8px;
    background: #0f1622;
    color: #e8ecf3;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: #1f6feb;
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
}

/* ADD BUTTON (BOTTOM FLOAT STYLE) */
.addBtn {
    position: fixed;
    bottom: 18px;
    left: 18px;
    right: 18px;
    background: linear-gradient(135deg, #1b4d6b, #14324a);
    border: 1px solid #2b4a6f;
}

/* MODAL */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
}

.modal-content {
    width: 90%;
    max-width: 360px;
    background: #111823;
    border: 1px solid #1e2a3a;
    padding: 16px;
    border-radius: 14px;
}
</style>
</head>

<body>

<div class="title">
    <h2>Pro Trading Dashboard</h2>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="topbar">
    <div class="stat">
        <div class="label">Portfolio</div>
        <div class="value" id="total">$0</div>
    </div>
    <div class="stat">
        <div class="label">Daily</div>
        <div class="value green" id="daily">$0</div>
    </div>
    <div class="stat">
        <div class="label">Drawdown</div>
        <div class="value red" id="dd">$0</div>
    </div>
</div>

<div id="accounts"></div>

</div>

<!-- ACCOUNT PAGE -->
<div id="account" class="page">

<div class="card">
    <h3 id="name"></h3>

    <input id="balance" oninput="updateAccount()">

    <div class="card">
        <div class="small">Multiplier</div>
        <div class="big green" id="mult"></div>
    </div>

    <div class="card">
        <div class="small">Daily Profit</div>
        <div id="dailyP"></div>
    </div>

    <div class="card">
        <div class="small">Weekly Profit</div>
        <div id="weekly"></div>
    </div>

    <div class="card">
        <div class="small">Monthly Profit</div>
        <div id="monthly"></div>
    </div>

    <div class="card">
        <div class="small">Account Drawdown</div>
        <div class="big red" id="accdd"></div>
    </div>

    <button onclick="back()">Back</button>
</div>

</div>

<!-- ADD ACCOUNT MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">

        <div class="big">Add Account</div>

        <input id="newName" placeholder="Account name">
        <input id="newBalance" placeholder="Starting balance">

        <button onclick="createAccount()">Create</button>
        <button onclick="closeModal()" style="background:#263445;">Cancel</button>

    </div>
</div>

<!-- ADD BUTTON -->
<button class="addBtn" onclick="openModal()">+ Add Account</button>

<script>

/* DATA */
let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let current = null;

/* SAFE NUM */
function num(v){
    v = Number(v);
    return isNaN(v) ? 0 : v;
}

/* LOGIC */
function mult(b){
    b = num(b);
    if (b < 90000) return b / 30000;
    if (b < 140000) return 3;
    if (b < 160000) return 3.5;
    if (b < 200000) return 4;
    return 5;
}

function daily(b){
    return mult(b) * 800;
}

function dd(b){
    return b * 0.4;
}

/* NAV */
function show(page){
    document.querySelectorAll(".page")
        .forEach(p => p.classList.remove("active"));

    document.getElementById(page).classList.add("active");
}

/* RENDER */
function render(){

    let el = document.getElementById("accounts");
    el.innerHTML = "";

    let t=0,d=0,draw=0;

    accounts.forEach((a,i)=>{

        let b=num(a.balance);

        t+=b;
        d+=daily(b);
        draw+=dd(b);

        el.innerHTML+=`
        <div class="account" onclick="openAccount(${i})">
            <b>${a.name}</b><br>
            $${b}<br>
            <span class="small green">Daily $${daily(b).toFixed(0)}</span>
        </div>`;
    });

    document.getElementById("total").innerText="$"+t.toFixed(0);
    document.getElementById("daily").innerText="$"+d.toFixed(0);
    document.getElementById("dd").innerText="$"+draw.toFixed(0);
}

/* OPEN ACCOUNT */
function openAccount(i){

    current=i;

    let a=accounts[i];

    document.getElementById("name").innerText=a.name;
    document.getElementById("balance").value=num(a.balance);

    show("account");

    updateAccount();
}

/* UPDATE */
function updateAccount(){

    if(current===null) return;

    let b=num(document.getElementById("balance").value);

    accounts[current].balance=b;
    localStorage.setItem("accounts",JSON.stringify(accounts));

    let m=mult(b);
    let d=daily(b);

    document.getElementById("mult").innerText=m.toFixed(2)+"x";
    document.getElementById("dailyP").innerText="$"+d.toFixed(0);
    document.getElementById("weekly").innerText="$"+(d*7).toFixed(0);
    document.getElementById("monthly").innerText="$"+(d*30).toFixed(0);
    document.getElementById("accdd").innerText="$"+dd(b).toFixed(0);

    render();
}

/* BACK */
function back(){
    current=null;
    show("home");
}

/* MODAL */
function openModal(){
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

/* CREATE ACCOUNT */
function createAccount(){

    let name=document.getElementById("newName").value.trim();
    let balance=num(document.getElementById("newBalance").value);

    if(!name) return;

    accounts.push({name,balance});

    localStorage.setItem("accounts",JSON.stringify(accounts));

    document.getElementById("newName").value="";
    document.getElementById("newBalance").value="";

    closeModal();
    render();
}

/* INIT */
render();

</script>

</body>
</html>
